name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Pin Node 20 LTS per JOSS reproducibility expectations. The project's package
# manager is pnpm (packageManager pnpm@10.34.3 in frontend/package.json), so CI
# installs with `pnpm install --frozen-lockfile` against pnpm-lock.yaml, the
# lockfile developers actually maintain. (We previously ran `npm ci` against a
# secondary package-lock.json, which kept drifting and rejected peer-dep sets
# that pnpm resolves, e.g. @opennextjs/cloudflare vs next.)

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm run lint
      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit

  vitest:
    name: Vitest + coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          if-no-files-found: warn

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        # The webServer (next dev, started by playwright.config.ts) inherits this
        # env. Locally these come from .env.local (gitignored). NEXT_PUBLIC_SHARING_ENABLED
        # turns on the sharing UI that privacy.spec's read-side gate test exercises;
        # the dummy AUTH_SECRET only lets NextAuth initialize so /api/auth/session
        # returns an empty session instead of 500-ing (it signs nothing real).
        # These are dev-only feature flags, not secrets. NOTE: the two Share-dialog
        # tests in privacy.spec are skipped (see the TODO there) because they need a
        # seeded sharing identity the fixture does not provide; enabling AUTH_DEV_MOCK
        # was verified safe for the other specs but did NOT satisfy that gate, so it
        # is left off until the fixture seeds an identity.
        env:
          AUTH_SECRET: ci-playwright-dummy-secret-not-used-in-production
          NEXT_PUBLIC_SHARING_ENABLED: "true"
          SHARING_ENABLED: "true"
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: warn
