name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Pin Node 20 LTS per JOSS reproducibility expectations. The project's package
# manager is pnpm (packageManager pnpm@10.34.3 in frontend/package.json), so CI
# installs with `pnpm install --frozen-lockfile` against pnpm-lock.yaml, the
# lockfile developers actually maintain. (We previously ran `npm ci` against a
# secondary package-lock.json, which kept drifting and rejected peer-dep sets
# that pnpm resolves, e.g. @opennextjs/cloudflare vs next.)

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm run lint
      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit

  vitest:
    name: Vitest + coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          if-no-files-found: warn

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
        with:
          # Kit-template source PDFs (frontend/public/method-catalog/sources/*.pdf)
          # are stored in Git LFS; method-catalog-sources.test.ts verifies each
          # bundled PDF against a declared sha256. Without lfs:true the runner
          # checks out pointer files and the digest test fails.
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        # The webServer (next dev, started by playwright.config.ts) inherits this
        # env. Locally these come from .env.local (gitignored), so without them
        # the CI dev server runs with sharing disabled and unauthenticated, which
        # fails the sharing-gated privacy.spec: its Share-button tests need a
        # ready sharing identity, which the dev-mock auth provisions. These are
        # dev-only feature flags, not secrets. AUTH_DEV_MOCK is honored only when
        # NODE_ENV !== production (it can never ship), and the dummy AUTH_SECRET
        # only lets NextAuth initialize. If this auto-login turns out to disturb
        # the logged-out state the dashboard / onboarding-tour specs assume, drop
        # the three AUTH_DEV_MOCK lines.
        env:
          AUTH_SECRET: ci-playwright-dummy-secret-not-used-in-production
          NEXT_PUBLIC_SHARING_ENABLED: "true"
          SHARING_ENABLED: "true"
          AUTH_DEV_MOCK: "1"
          NEXT_PUBLIC_AUTH_DEV_MOCK: "1"
          AUTH_DEV_MOCK_EMAIL: pi@researchos.test
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: warn
