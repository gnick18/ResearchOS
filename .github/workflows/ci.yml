name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Pin Node 20 LTS per JOSS reproducibility expectations. The project's package
# manager is pnpm (packageManager pnpm@10.34.3 in frontend/package.json), so CI
# installs with `pnpm install --frozen-lockfile` against pnpm-lock.yaml, the
# lockfile developers actually maintain. (We previously ran `npm ci` against a
# secondary package-lock.json, which kept drifting and rejected peer-dep sets
# that pnpm resolves, e.g. @opennextjs/cloudflare vs next.)

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm run lint
      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit

  vitest:
    name: Vitest + coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          if-no-files-found: warn

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: warn
