name: Build and Release Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: installer
        run: npm install

      - name: Build installer
        working-directory: installer
        run: npm run make

      - name: List output files (debug)
        run: find installer/out -type f -name "*.zip" 2>/dev/null || true

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: installer/out/make/zip/darwin/**/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: installer
        run: npm install

      - name: Build installer
        working-directory: installer
        run: npm run make
        continue-on-error: true

      - name: List output files (debug)
        run: Get-ChildItem -Path installer\out -Recurse -Filter "*.exe" | Format-Table FullName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/out/make/zip/win32/**/*.zip
          if-no-files-found: warn

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: artifacts/mac
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows
        continue-on-error: true

      - name: List artifacts (debug)
        run: |
          echo "Mac artifacts:"
          ls -la artifacts/mac 2>/dev/null || echo "No Mac artifacts"
          echo "Windows artifacts:"
          ls -la artifacts/windows 2>/dev/null || echo "No Windows artifacts"

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ResearchOS ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ResearchOS ${{ steps.get_version.outputs.VERSION }}
            
            ### Downloads
            - **macOS**: Download `researchos-installer-darwin-arm64-*.zip`
            - **Windows**: Download `ResearchOSInstallerSetup.exe` (if available)
            
            ### What's Changed
            See commit history for details.
          files: |
            artifacts/mac/**/*.zip
            artifacts/windows/**/*.zip
          draft: false
          prerelease: false
