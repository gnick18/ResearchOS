name: Bug report
description: Something in ResearchOS broke or behaved unexpectedly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you can give, the faster it gets fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concrete description of what you saw.
      placeholder: I clicked X and Y happened instead of Z.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected ResearchOS to ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps so we can recreate the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser and operating system. If the feedback modal prefilled this, leave it as-is.
      placeholder: |
        Browser: Chrome on macOS
        URL when error happened: ...
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: Error log
      description: Console error, stack trace, or other captured error output. Leave blank if there was no error message.
      render: text

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else worth knowing. Screenshots, related issues, recent changes you made, etc.
