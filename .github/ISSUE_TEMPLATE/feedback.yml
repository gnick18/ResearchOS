name: Feedback
description: Share thoughts, suggestions, praise, or complaints about ResearchOS.
title: "[Feedback] "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Anything goes here. No need to write a full bug report or feature spec — casual notes are welcome.

  - type: textarea
    id: feedback
    attributes:
      label: What's on your mind?
      description: Thoughts, suggestions, praise, complaints, anything else.
      placeholder: I like ..., I wish ..., I noticed ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Additional context, screenshots, or thoughts.
