name: Feature request
description: Suggest a new capability or improvement for ResearchOS.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Tell us what you want and why. Concrete examples beat abstract wishes.

  - type: textarea
    id: feature
    attributes:
      label: What feature would you like?
      description: A clear description of the capability or change.
      placeholder: I'd like ResearchOS to ...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this be useful?
      description: What problem does it solve, or what workflow does it unlock? Real examples from your own work help a lot.
      placeholder: Today I have to ..., which is slow because ...
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: How could it work?
      description: A sketch of the interaction or behavior. Bullet points are fine. Skip if you're not sure.
      placeholder: |
        - A new button in ...
        - When clicked, it ...
        - The result is shown as ...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've tried to solve this, or other approaches you weighed.
