# Clip 02: The hero capture flow (snap a bench photo, caption it, send to the lab).
#
# Demo mode now bypasses the real camera: onTakePhoto (app/(tabs)/notebook.tsx)
# short-circuits to the fixture image (DEMO_IMAGE_URI) when pairing.demo is true,
# so there is no camera or permission dialog and the flow is fully deterministic.
# "Send to Inbox" stages the capture, clears the preview, and sendCapture's demo
# guard marks it sent + fires the "Sent to inbox" success (no relay).
#
# NOTE: the destination chooser (route into Lab Notes / Results / an experiment)
# only appears for a real pairing that carries an X25519 routing key; the demo
# pairing has none, so the capture goes straight to the inbox here. To film the
# chooser, record against a real laptop pairing.
#
# Records: demo Notebook -> Take a photo (fixture) -> caption -> Send to Inbox ->
# success -> back on the Notebook actions.
appId: app.researchos.companion
---
- runFlow: subflows/enter-demo.yaml
# Snap a bench photo. In demo this stages the fixture capture (no camera).
- tapOn:
    id: "notebook-take-photo"
- assertVisible:
    id: "notebook-photo-preview"
- assertVisible:
    id: "notebook-caption-input"
# Caption it the way you would at the bench.
- tapOn:
    id: "notebook-caption-input"
- inputText: "Plate 4, GFP channel, 20x. Strong signal in wells C3 to C6."
- hideKeyboard
# Send it to the lab. In demo this lands in the inbox and fires the success
# burst; the preview clears and we return to the Notebook actions.
- tapOn:
    id: "notebook-send-to-inbox"
- extendedWaitUntil:
    visible:
      id: "notebook-take-photo"
    timeout: 10000
