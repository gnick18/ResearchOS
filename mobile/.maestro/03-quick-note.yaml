# Clip 03: Quick note compose at the bench (with a clean success).
#
# Records: demo Notebook -> tap "Quick note" -> inline compose panel -> type a
# realistic bench title + body -> Send to lab -> success (the panel closes).
#
# Demo mode now short-circuits sendTextNote (lib/notes.ts) when pairing.demo is
# true: it skips the relay fetch and reports success + fires the same burst a
# paired phone would, so the panel closes cleanly. (The demo pairing has no
# X25519 routing key, so the destination chooser does not appear and the note
# takes the plain-send path.)
appId: app.researchos.companion
---
- runFlow: subflows/enter-demo.yaml
# Open the inline quick-note compose panel.
- tapOn:
    id: "notebook-quick-note"
- assertVisible:
    id: "notebook-quicknote-body"
# Type a realistic bench note.
- tapOn:
    id: "notebook-quicknote-title"
- inputText: "HEK293 passage 18"
- tapOn:
    id: "notebook-quicknote-body"
- inputText: "Split 1:6 into 6 wells. 0.25% trypsin 3 min at 37C, quenched with 2 mL DMEM + 10% FBS. Confluency looked ~85%."
- hideKeyboard
- assertVisible: "HEK293 passage 18"
# Send. In demo this succeeds and the compose panel closes (inputs clear), so the
# body field is gone and the Notebook actions return.
- tapOn:
    id: "notebook-quicknote-send"
- extendedWaitUntil:
    notVisible:
      id: "notebook-quicknote-body"
    timeout: 10000
- assertVisible:
    id: "notebook-take-photo"
