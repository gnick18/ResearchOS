<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <!-- ResearchOS LinkedIn cover, Option D (dark). Deep ink, rainbow OS (luminous
       ramp for dark surfaces), rainbow hairline, tagline. Font: Geist 800. -->
  <defs>
    <linearGradient id="osLum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#4ade80"/><stop offset="75%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="#11161f"/>
  <text x="66" y="96" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="78" letter-spacing="-2.3" fill="#f1f5f9">Research</text>
  <text x="430" y="96" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="78" letter-spacing="-2.3" fill="url(#osLum)">OS</text>
  <rect x="70" y="116" width="434" height="6" rx="3" fill="url(#osLum)"/>
  <text x="71" y="156" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="22" fill="#9aa6b6">Local-first. Open source. Free for every researcher.</text>
</svg>
