<svg viewBox="-26 -24 52 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="liq-comp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD2B0"/>
      <stop offset="25%" stop-color="#FFF1A8"/>
      <stop offset="50%" stop-color="#B7EBB1"/>
      <stop offset="75%" stop-color="#A6D2F4"/>
      <stop offset="100%" stop-color="#D6B5F0"/>
    </linearGradient>
    <linearGradient id="liq-comp-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD2B0"/>
      <stop offset="25%" stop-color="#FFF1A8"/>
      <stop offset="50%" stop-color="#B7EBB1"/>
      <stop offset="75%" stop-color="#A6D2F4"/>
      <stop offset="100%" stop-color="#D6B5F0"/>
    </linearGradient>
  </defs>
  <!-- shadow ellipse -->
  <ellipse cx="0" cy="19" rx="17" ry="2.4" fill="#1AA0E6" opacity=".10"/>
  <!-- BeakerBot (scaled 0.92, shifted up y=-5) -->
  <g transform="translate(0 -5) scale(.92)" stroke="#1AA0E6" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6 Z" fill="white" stroke="none"/>
    <path d="M -8 1 Q -6 -0.2, -4 1 T 0 1 T 4 1 T 8 1 L 8 6 C 8 12, 4 14, 0 14 C -4 14, -8 12, -8 6 L -8 1 Z" fill="url(#liq-comp)" stroke="none"/>
    <path d="M 2 -10 C 2 -12, 4 -14, 6 -12"/>
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6"/>
    <path d="M -9 -6 L 9 -6"/>
    <circle cx="-3" cy="0" r="1.2" fill="#1AA0E6" stroke="none"/>
    <circle cx="3" cy="0" r="1.2" fill="#1AA0E6" stroke="none"/>
    <path d="M -2 4 Q 0 6, 2 4"/>
    <path d="M -6 8 L -4.5 8"/>
    <path d="M 4.5 8 L 6 8"/>
  </g>
  <!-- wifi/sharing arcs -->
  <g stroke="#1AA0E6" stroke-width="1.1" stroke-linecap="round" fill="none" opacity=".75">
    <path d="M 11 -12 q 4 0 4 4"/>
    <path d="M 13.5 -13.5 q 6 0 6 6"/>
  </g>
  <!-- laptop body -->
  <g stroke="#1AA0E6" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" fill="white">
    <rect x="-11" y="6" width="22" height="13.5" rx="1.6"/>
    <path d="M -15 19.5 L 15 19.5 L 12.5 22.5 L -12.5 22.5 Z"/>
  </g>
  <!-- girl BeakerBot on screen (lips + lashes), centered at (0, 12.7), scaled 0.42 -->
  <g transform="translate(0 12.7) scale(.42)" stroke="#1AA0E6" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6 Z" fill="white" stroke="none"/>
    <path d="M -8 1 Q -6 -0.2, -4 1 T 0 1 T 4 1 T 8 1 L 8 6 C 8 12, 4 14, 0 14 C -4 14, -8 12, -8 6 L -8 1 Z" fill="url(#liq-comp-screen)" stroke="none"/>
    <path d="M 2 -10 C 2 -12, 4 -14, 6 -12"/>
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6"/>
    <path d="M -9 -6 L 9 -6"/>
    <circle cx="-3" cy="0" r="1.2" fill="#1AA0E6" stroke="none"/>
    <circle cx="3" cy="0" r="1.2" fill="#1AA0E6" stroke="none"/>
    <!-- lashes -->
    <g stroke="#1AA0E6" stroke-width="0.5" stroke-linecap="round">
      <path d="M -4.4 -1.3 l -0.9 -0.7"/>
      <path d="M -3 -1.6 l -0.3 -0.9"/>
      <path d="M 4.4 -1.3 l 0.9 -0.7"/>
      <path d="M 3 -1.6 l 0.3 -0.9"/>
    </g>
    <!-- lips (coral) -->
    <path d="M -2.4 4 Q 0 6.6 2.4 4 Q 0 5.2 -2.4 4 Z" fill="#FF6F61" stroke="none"/>
    <path d="M -2.4 4 Q -1.2 3.2 0 4 Q 1.2 3.2 2.4 4" stroke="#FF6F61" stroke-width="0.5" fill="none"/>
    <path d="M -6 8 L -4.5 8"/>
    <path d="M 4.5 8 L 6 8"/>
  </g>
</svg>
