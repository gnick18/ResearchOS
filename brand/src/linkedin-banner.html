<!doctype html>
<!-- ResearchOS LinkedIn COMPANY PAGE cover (1128x191, ~6:1). LinkedIn crops the
     cover to a very wide thin strip and overlays the square logo at the bottom-
     left, so the lockup is centered + nudged right to clear the logo. Same
     BeakerBot mark + Geist wordmark + rainbow as the rest of brand/. Render at
     1128x191 deviceScale 2 (~2256x382). No em-dashes, no emojis, no mid-sentence
     colons. -->
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1128px; height: 191px; }
  .card {
    position: relative; width: 1128px; height: 191px; overflow: hidden;
    background: linear-gradient(110deg, #FFD2B0 0%, #FFF1A8 26%, #B7EBB1 50%, #A6D2F4 74%, #D6B5F0 100%);
    font-family: Geist, Inter, system-ui, -apple-system, sans-serif;
  }
  .veil { position: absolute; inset: 0; background: radial-gradient(120% 140% at 58% 50%, rgba(255,255,255,0.5), rgba(255,255,255,0) 62%); }
  .lockup { position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 16px; }
  .mark { width: 88px; height: 114px; }
  .word { font-size: 72px; font-weight: 800; letter-spacing: -2.2px; color: #111827; line-height: 1; }
</style>
</head>
<body>
  <div class="card">
    <div class="veil"></div>
    <div class="lockup">
      <svg class="mark" viewBox="8 3 24 31" fill="none" stroke="#1AA0E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFD2B0" /><stop offset="25%" stop-color="#FFF1A8" />
            <stop offset="50%" stop-color="#B7EBB1" /><stop offset="75%" stop-color="#A6D2F4" />
            <stop offset="100%" stop-color="#D6B5F0" />
          </linearGradient>
        </defs>
        <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z" fill="white" stroke="none" />
        <path d="M 12 19 Q 14 17.8, 16 19 T 20 19 T 24 19 T 28 19 L 28 24 C 28 30, 24 32, 20 32 C 16 32, 12 30, 12 24 L 12 19 Z" fill="url(#liq)" stroke="none" />
        <path d="M22 8 C 22 6, 24 4, 26 6" />
        <path d="M12 12 L12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L28 12" />
        <path d="M11 12 L29 12" />
        <circle cx="17" cy="18" r="1.2" fill="#1AA0E6" stroke="none" />
        <circle cx="23" cy="18" r="1.2" fill="#1AA0E6" stroke="none" />
        <path d="M18 22 Q 20 24, 22 22" />
        <path d="M14 26 L15.5 26" /><path d="M24.5 26 L26 26" />
      </svg>
      <div class="word">ResearchOS</div>
    </div>
  </div>
</body>
</html>
