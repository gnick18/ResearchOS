<!doctype html>
<!-- ResearchOS social-share / OpenGraph card generator (1200x630). Composed from
     the real BeakerBot mark + the Geist wordmark, same brand geometry/colors as
     the rest of brand/. Render with Chrome/Playwright at 1200x630 (deviceScale 2)
     to og.png. No em-dashes, no emojis, no mid-sentence colons. -->
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    position: relative; width: 1200px; height: 630px; overflow: hidden;
    background: linear-gradient(160deg, #ffffff 0%, #f4f8fd 100%);
    font-family: Geist, Inter, system-ui, -apple-system, sans-serif;
  }
  /* brand rainbow hairline across the top */
  .rail {
    position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: linear-gradient(to right, #FFD2B0, #FFF1A8, #B7EBB1, #A6D2F4, #D6B5F0);
  }
  /* soft rainbow glow, top-right corner */
  .glow {
    position: absolute; top: -180px; right: -120px; width: 620px; height: 420px;
    background: linear-gradient(to right, #FFD2B0, #FFF1A8, #B7EBB1, #A6D2F4, #D6B5F0);
    filter: blur(90px); opacity: 0.30;
  }
  .body { position: absolute; inset: 0; padding: 86px 90px; display: flex; flex-direction: column; }
  .lockup { display: flex; align-items: center; gap: 26px; }
  .mark { width: 132px; height: 170px; }
  .word { font-size: 116px; font-weight: 800; letter-spacing: -3.5px; color: #111827; line-height: 1; }
  .tagline { margin-top: 56px; font-size: 50px; font-weight: 700; letter-spacing: -1px; color: #1f2937; max-width: 1000px; line-height: 1.12; }
  .sub { margin-top: 24px; font-size: 29px; font-weight: 400; color: #64748b; max-width: 940px; line-height: 1.45; }
  .foot { position: absolute; left: 90px; bottom: 64px; display: flex; align-items: center; gap: 14px; font-size: 24px; color: #94a3b8; font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #1AA0E6; }
</style>
</head>
<body>
  <div class="card">
    <div class="rail"></div>
    <div class="glow"></div>
    <div class="body">
      <div class="lockup">
        <svg class="mark" viewBox="8 3 24 31" fill="none" stroke="#1AA0E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFD2B0" /><stop offset="25%" stop-color="#FFF1A8" />
              <stop offset="50%" stop-color="#B7EBB1" /><stop offset="75%" stop-color="#A6D2F4" />
              <stop offset="100%" stop-color="#D6B5F0" />
            </linearGradient>
          </defs>
          <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z" fill="white" stroke="none" />
          <path d="M 12 19 Q 14 17.8, 16 19 T 20 19 T 24 19 T 28 19 L 28 24 C 28 30, 24 32, 20 32 C 16 32, 12 30, 12 24 L 12 19 Z" fill="url(#liq)" stroke="none" />
          <path d="M22 8 C 22 6, 24 4, 26 6" />
          <path d="M12 12 L12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L28 12" />
          <path d="M11 12 L29 12" />
          <circle cx="17" cy="18" r="1.2" fill="#1AA0E6" stroke="none" />
          <circle cx="23" cy="18" r="1.2" fill="#1AA0E6" stroke="none" />
          <path d="M18 22 Q 20 24, 22 22" />
          <path d="M14 26 L15.5 26" /><path d="M24.5 26 L26 26" />
        </svg>
        <div class="word">ResearchOS</div>
      </div>
      <div class="tagline">The local-first workspace for research labs.</div>
      <div class="sub">Plan experiments, design and annotate sequences, run your methods library, and keep every file on your own computer.</div>
      <div class="foot"><span class="dot"></span>research-os.app</div>
    </div>
  </div>
</body>
</html>
