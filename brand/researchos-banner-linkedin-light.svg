<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <!-- ResearchOS LinkedIn cover, Option D (light). White surface, rainbow OS
       (vivid ramp for light surfaces), rainbow hairline, tagline. Font: Geist 800. -->
  <defs>
    <linearGradient id="osViv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/><stop offset="22%" stop-color="#e8920b"/>
      <stop offset="48%" stop-color="#16a34a"/><stop offset="72%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="#ffffff"/>
  <text x="66" y="96" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="78" letter-spacing="-2.3" fill="#111827">Research</text>
  <text x="430" y="96" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="78" letter-spacing="-2.3" fill="url(#osViv)">OS</text>
  <rect x="70" y="116" width="434" height="6" rx="3" fill="url(#osViv)"/>
  <text x="71" y="156" font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="22" fill="#5b6675">Local-first. Open source. Free for every researcher.</text>
</svg>
