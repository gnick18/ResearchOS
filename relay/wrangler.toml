# ResearchOS notes collaboration relay worker.
# Run locally with `npm run dev` (no Cloudflare account needed for local dev).
name = "researchos-collab-relay"
main = "src/worker.ts"

# 2024-12-01 enables the WebSocket Hibernation API + SQLite-backed DOs.
compatibility_date = "2024-12-01"

# Cost-enforcement gate: the collab DO reads the Vercel cost-breaker state from
# ${APP_BASE_URL}/api/billing/breaker-state to pause durable persistence when the
# breaker trips (Cloudflare has no hard spend cap, so this is the backstop). Set
# the prod value before flipping LAB_TIER_ENABLED. Unset (local dev) = fail open.
# The matching shared secret is a SECRET, set with:
#   wrangler secret put RELAY_BREAKER_SECRET
# (and RELAY_BREAKER_SECRET in the Vercel env). Leave both unset for local dev.
[vars]
# Stable custom domain, so the breaker/owner-state reads survive deploy-alias
# churn (a per-deploy *.vercel.app URL would go stale on the next push).
APP_BASE_URL = "https://research-os.app"

[[durable_objects.bindings]]
name = "COLLAB_ROOM"
class_name = "CollabRoom"

# Per-recipient inbox for external-collab discovery (chunk 3). One DO instance
# per recipient emailHash holds the pending live-collab invites addressed to that
# recipient. Routing metadata only; never collab content.
[[durable_objects.bindings]]
name = "RECIPIENT_INBOX"
class_name = "RecipientInbox"

# Per-user capture inbox (mobile capture relay, piece A). One DO instance per
# user identity pubkey hex holds that user's bound devices + the index of pending
# bench captures. The blobs live in the CAPTURES R2 bucket and are deleted on ack.
[[durable_objects.bindings]]
name = "CAPTURE_INBOX"
class_name = "CaptureInbox"

# Per-lab record store (lab tier Phase 2). One DO instance per labId is the
# authoritative server-side home of a lab: the head pubkey, the head-signed
# hash-chained membership log, and the per-generation sealed lab-key envelopes.
# The DO is BLIND to the lab key (it stores only sealed copies + signed public
# metadata). ADDITIVE and dormant; the client gate is LAB_TIER_ENABLED.
[[durable_objects.bindings]]
name = "LAB_RECORD"
class_name = "LabRecordDO"

# R2 bucket for periodic per-doc snapshot backups (disaster-recovery net for the
# DO SQLite store, storage-migration phase 1 chunk 4). The DO writes its current
# compacted snapshot here on a throttled alarm cadence.
[[r2_buckets]]
binding = "COLLAB_BACKUPS"
bucket_name = "researchos-collab-backups"

# R2 bucket for transient bench-capture blobs (mobile capture relay, piece A).
# The phone uploads a capture at `<userPubkey>/<captureId>`; the laptop pulls it
# into the data folder, then acks, which deletes the blob. Never a permanent store.
[[r2_buckets]]
binding = "CAPTURES"
bucket_name = "researchos-captures"

# R2 bucket for server-blind lab data (lab tier Phase 3 chunk 1). Stores opaque
# lab-key ciphertext keyed `${labId}/${owner}/${recordType}/${recordId}`. The
# relay never decrypts; it only verifies the signer is a lab member before
# writing. Reads are open at the transport (useless without the lab key).
[[r2_buckets]]
binding = "LAB_DATA"
bucket_name = "researchos-lab-data"

# Reverse membership index for lab-membership discovery (Phase 2 add-on).
# Key = hex Ed25519 public key of a lab member.
# Value = JSON string[] of labIds that member belongs to.
# Written best-effort on /lab/create (head) and /lab/append (add entries).
# Read by POST /lab/discover-memberships to answer "what labs am I in?".
# Create the KV namespace first:
#   wrangler kv namespace create LAB_MEMBERSHIP_INDEX
# Then set the resulting id below.
[[kv_namespaces]]
binding = "LAB_MEMBERSHIP_INDEX"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# new_sqlite_classes is required for the WebSocket Hibernation API on a fresh
# DO class (SQLite-backed DOs are the current default storage backend).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollabRoom"]

# external-collab chunk 3: the per-recipient inbox DO.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecipientInbox"]

# mobile capture relay piece A: the per-user capture inbox DO.
[[migrations]]
tag = "v3"
new_sqlite_classes = ["CaptureInbox"]

# lab tier Phase 2: the per-lab record store DO.
[[migrations]]
tag = "v4"
new_sqlite_classes = ["LabRecordDO"]
