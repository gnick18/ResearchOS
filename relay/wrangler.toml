# ResearchOS notes collaboration relay worker.
# Run locally with `npm run dev` (no Cloudflare account needed for local dev).
name = "researchos-collab-relay"
main = "src/worker.ts"

# 2024-12-01 enables the WebSocket Hibernation API + SQLite-backed DOs.
compatibility_date = "2024-12-01"

[[durable_objects.bindings]]
name = "COLLAB_ROOM"
class_name = "CollabRoom"

# Per-recipient inbox for external-collab discovery (chunk 3). One DO instance
# per recipient emailHash holds the pending live-collab invites addressed to that
# recipient. Routing metadata only; never collab content.
[[durable_objects.bindings]]
name = "RECIPIENT_INBOX"
class_name = "RecipientInbox"

# R2 bucket for periodic per-doc snapshot backups (disaster-recovery net for the
# DO SQLite store, storage-migration phase 1 chunk 4). The DO writes its current
# compacted snapshot here on a throttled alarm cadence.
[[r2_buckets]]
binding = "COLLAB_BACKUPS"
bucket_name = "researchos-collab-backups"

# new_sqlite_classes is required for the WebSocket Hibernation API on a fresh
# DO class (SQLite-backed DOs are the current default storage backend).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollabRoom"]

# external-collab chunk 3: the per-recipient inbox DO.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecipientInbox"]
