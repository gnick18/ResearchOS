<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ResearchOS teaser page-word wall</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#f5f7fb;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .wrap{text-align:center;animation:pulse 1.2s cubic-bezier(.4,0,.2,1) 2s both}
  .wall{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:26px 64px;justify-items:center;align-items:center;max-width:1100px}
  .wall span{font-size:42px;font-weight:700;letter-spacing:-1px;opacity:0;transform:translateY(20px) scale(.88);white-space:nowrap;animation:pop .42s cubic-bezier(.2,.8,.2,1) forwards}
  .sky{color:#1283c9}
  .rb{background:linear-gradient(92deg,#ff6a35,#f7c948,#62bf2f,#1d9e75,#1aa0e6,#7f77dd);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tail{margin-top:54px;font-size:28px;font-weight:500;color:#5f6b7a;opacity:0;animation:fade .9s ease 2.5s forwards}
  @keyframes pop{to{opacity:1;transform:none}}
  @keyframes fade{to{opacity:1}}
  @keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.035)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="wall">
    <span style="animation-delay:.25s">Lab notes</span>
    <span class="sky" style="animation-delay:.55s">Data Hub</span>
    <span style="animation-delay:.80s">BeakerBot</span>
    <span style="animation-delay:1.00s">Sequences</span>
    <span class="rb" style="animation-delay:1.16s">Chemistry</span>
    <span style="animation-delay:1.29s">GANTT</span>
    <span style="animation-delay:1.39s">Methods</span>
    <span class="sky" style="animation-delay:1.47s">Phylo trees</span>
    <span style="animation-delay:1.54s">Figures</span>
    <span style="animation-delay:1.60s">Lab sites</span>
    <span class="rb" style="animation-delay:1.65s">Network</span>
    <span style="animation-delay:1.69s">Calendar</span>
    <span style="animation-delay:1.72s">Inventory</span>
    <span class="sky" style="animation-delay:1.75s">Purchases</span>
  </div>
  <div class="tail">…and everything in between.</div>
</div>
</body>
</html>
