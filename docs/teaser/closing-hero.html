<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ResearchOS teaser closing</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#f5f7fb;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 28px}
  .stage{text-align:center;max-width:920px}
  .bot{opacity:0;transform:translateY(14px) scale(.94);transform-origin:center;animation:botIn 1s cubic-bezier(.2,.7,.2,1) .2s forwards}
  .bot .b{opacity:0}
  .bot .b1{animation:bub 2.4s ease-in 1.2s infinite}
  .bot .b2{animation:bub 2.9s ease-in 1.8s infinite}
  .bot .b3{animation:bub 2.6s ease-in 2.4s infinite}
  .word{margin-top:12px;font-size:clamp(44px,11vw,92px);font-weight:800;letter-spacing:-3px;line-height:1.1}
  .word b{display:inline-block;opacity:0;transform:translateY(26px);font-weight:800;padding:0 2px}
  .w1{animation:wIn .75s cubic-bezier(.2,.75,.2,1) 1.1s forwards}
  .w2{animation:wIn .75s cubic-bezier(.2,.75,.2,1) 1.35s forwards;background:linear-gradient(95deg,#ff6a35,#f7c948,#62bf2f,#1d9e75,#1aa0e6,#7f77dd);-webkit-background-clip:text;background-clip:text;color:transparent}
  .kick{margin-top:28px;font-size:clamp(22px,5vw,36px);font-weight:600;opacity:0;transform:translateY(16px);animation:rise 1s cubic-bezier(.2,.7,.2,1) 2.3s forwards}
  .kick .free{color:#1283c9}
  .cta{margin-top:38px;opacity:0;transform:translateY(12px);animation:rise .9s cubic-bezier(.2,.7,.2,1) 3.3s forwards}
  .cta .start{font-size:clamp(16px,3vw,22px);font-weight:600}
  .cta .url{font-size:clamp(15px,2.6vw,20px);color:#5f6b7a;margin-top:10px;letter-spacing:1px}
  @keyframes botIn{to{opacity:1;transform:none}}
  @keyframes wIn{to{opacity:1;transform:none}}
  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes bub{0%{cy:31px;opacity:0}18%{opacity:.8}100%{cy:19.5px;opacity:0}}
</style>
</head>
<body>
<div class="stage">
  <svg class="bot" viewBox="8 3 24 31" width="128" height="165" fill="none" stroke="#1AA0E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <defs>
      <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFD2B0"/><stop offset="25%" stop-color="#FFF1A8"/><stop offset="50%" stop-color="#B7EBB1"/><stop offset="75%" stop-color="#A6D2F4"/><stop offset="100%" stop-color="#D6B5F0"/>
      </linearGradient>
      <clipPath id="bkin"><path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z"/></clipPath>
    </defs>
    <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z" fill="white" stroke="none"/>
    <path d="M 12 19 Q 14 17.8, 16 19 T 20 19 T 24 19 T 28 19 L 28 24 C 28 30, 24 32, 20 32 C 16 32, 12 30, 12 24 L 12 19 Z" fill="url(#liq)" stroke="none"/>
    <g clip-path="url(#bkin)">
      <circle class="b b1" cx="18" cy="31" r="0.85" fill="#ffffff" stroke="none"/>
      <circle class="b b2" cx="22.5" cy="31" r="0.7" fill="#ffffff" stroke="none"/>
      <circle class="b b3" cx="20" cy="31" r="0.8" fill="#ffffff" stroke="none"/>
    </g>
    <path d="M22 8 C 22 6, 24 4, 26 6"/>
    <path d="M12 12 L12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L28 12"/>
    <path d="M11 12 L29 12"/>
    <circle cx="17" cy="18" r="1.2" fill="#1AA0E6" stroke="none"/>
    <circle cx="23" cy="18" r="1.2" fill="#1AA0E6" stroke="none"/>
    <path d="M18 22 Q 20 24, 22 22"/>
    <path d="M14 26 L15.5 26"/><path d="M24.5 26 L26 26"/>
  </svg>
  <div class="word"><b class="w1">Research</b><b class="w2">OS</b></div>
  <div class="kick">Open source. <span class="free">Free forever.</span></div>
  <div class="cta"><div class="start">Start today</div><div class="url">research-os.app</div></div>
</div>
</body>
</html>
