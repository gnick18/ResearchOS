<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Chemistry</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:820px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}

  /* Header */
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#22c55e 0%,#1aa0e6 100%);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .hd b{font-size:17px;font-weight:600}
  .hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#0e7a44;background:#e6f7ef;padding:3px 10px;border-radius:999px}

  /* Split layout */
  .split{display:flex;height:320px}

  /* Left rail */
  .rail{width:188px;flex:0 0 188px;border-right:1px solid #eef1f7;display:flex;flex-direction:column;background:#fafbfe}
  .rail-head{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between}
  .rail-head span{font-size:12px;font-weight:600;color:#7a869b;text-transform:uppercase;letter-spacing:.04em}
  .mol-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;opacity:0;transform:translateX(-8px)}
  .mol-item.sel{background:#f0f6ff;border-left-color:#1aa0e6}
  .mol-thumb{width:36px;height:36px;border-radius:8px;background:#f0f6ff;border:1px solid #e2e8f3;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .mol-name{font-size:13px;font-weight:500;color:#15243b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mol-formula{font-size:11px;color:#7a869b}
  .m1{animation:slide .35s ease .3s forwards}
  .m2{animation:slide .35s ease .45s forwards}
  .m3{animation:slide .35s ease .6s forwards}
  .m4{animation:slide .35s ease .75s forwards}

  /* Main pane */
  .main{flex:1;display:flex;flex-direction:column;padding:18px 22px}
  .mol-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .mol-title{font-size:18px;font-weight:700;color:#15243b}
  .mol-iupac{font-size:12px;color:#7a869b;font-style:italic}
  .prop-row{display:flex;gap:14px;margin-bottom:18px}
  .prop{font-size:12px;color:#7a869b}
  .prop b{color:#15243b;font-weight:600}

  /* SVG canvas */
  .mol-canvas{flex:1;display:flex;align-items:center;justify-content:center;background:#fafbfe;border:1px solid #e7edf6;border-radius:14px;padding:16px;position:relative;overflow:hidden}

  /* Bond animations - stroke-dashoffset draw-in */
  .mol-svg line, .mol-svg path{
    stroke:#15243b;
    stroke-width:2.2;
    stroke-linecap:round;
    fill:none;
  }
  /* Benzene ring bonds (6) */
  .b1{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease .50s forwards}
  .b2{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease .68s forwards}
  .b3{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease .86s forwards}
  .b4{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease 1.04s forwards}
  .b5{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease 1.22s forwards}
  .b6{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.28s ease 1.40s forwards}
  /* Inner aromatic double-bond lines (Kekule), same dark color, full-length dashes */
  .bd1{stroke-dasharray:42;stroke-dashoffset:42;animation:draw 0.25s ease 1.55s forwards;stroke:#15243b;stroke-width:2}
  .bd2{stroke-dasharray:42;stroke-dashoffset:42;animation:draw 0.25s ease 1.65s forwards;stroke:#15243b;stroke-width:2}
  .bd3{stroke-dasharray:42;stroke-dashoffset:42;animation:draw 0.25s ease 1.75s forwards;stroke:#15243b;stroke-width:2}
  /* Substituent bonds: COOH, NH2, OH (dash >= line length so they draw fully) */
  .bs1{stroke-dasharray:52;stroke-dashoffset:52;animation:draw 0.24s ease 1.90s forwards}
  .bs2{stroke-dasharray:34;stroke-dashoffset:34;animation:draw 0.20s ease 2.10s forwards}
  .bs3{stroke-dasharray:40;stroke-dashoffset:40;animation:draw 0.22s ease 2.00s forwards}
  /* C=O double bond (two parallel lines) */
  .bs5{stroke-dasharray:34;stroke-dashoffset:34;animation:draw 0.20s ease 2.18s forwards}
  .bs6{stroke-dasharray:26;stroke-dashoffset:26;animation:draw 0.18s ease 2.28s forwards}

  /* Atom labels */
  .atom-label{font-size:13px;font-weight:700;fill:#15243b;opacity:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .atom-label.blue{fill:#1283c9}
  .atom-label.green{fill:#16a34a}
  .atom-label.red{fill:#dc2626}
  .a1{animation:fade .25s ease 1.90s forwards}
  .a2{animation:fade .25s ease 2.00s forwards}
  .a3{animation:fade .25s ease 2.10s forwards}
  .a4{animation:fade .25s ease 2.18s forwards}
  .a5{animation:fade .25s ease 2.26s forwards}
  .a6{animation:fade .25s ease 2.34s forwards}

  /* Reaction arrow below */
  .rxn-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:12px}
  .rxn-label{font-size:11px;font-weight:600;color:#7a869b;opacity:0;animation:fade .3s ease 2.50s forwards}
  .rxn-arrow{width:60px;height:2px;background:transparent;position:relative;opacity:0;animation:fade .25s ease 2.55s forwards}
  .rxn-arrow::before{content:"";position:absolute;top:0;left:0;height:2px;background:#7a869b;width:0;animation:groww 0.4s ease 2.55s forwards}
  .rxn-arrow::after{content:"";position:absolute;right:-1px;top:-4px;border:5px solid transparent;border-left-color:#7a869b;opacity:0;animation:fade .2s ease 2.90s forwards}
  .rxn-product{font-size:11px;font-weight:600;color:#7a869b;opacity:0;animation:fade .3s ease 2.80s forwards}

  /* Property pills */
  .prop-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;opacity:0}
  .pill-mw{background:#e6f7ef;color:#0e7a44;animation:fade .3s ease 2.40s forwards}
  .pill-logp{background:#e6f1fb;color:#1283c9;animation:fade .3s ease 2.52s forwards}
  .pill-drug{background:#fff0e6;color:#c05c00;animation:fade .3s ease 2.64s forwards}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{to{opacity:1}}
  @keyframes slide{to{opacity:1;transform:none}}
  @keyframes push{to{transform:scale(1.04)}}
  @keyframes groww{to{width:100%}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">

    <!-- Header -->
    <div class="hd">
      <div class="hd-icon">
        <!-- Chemistry flask icon (inline SVG) -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M7 2v6L3.5 14.5a1.2 1.2 0 001.1 1.7h8.8a1.2 1.2 0 001.1-1.7L11 8V2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="6" y1="2" x2="12" y2="2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="6.5" cy="12" r="1" fill="#B7EBB1" opacity=".9"/>
          <circle cx="10" cy="13.5" r="0.8" fill="#A6D2F4" opacity=".9"/>
        </svg>
      </div>
      <div><b>Chemistry</b><div class="sub">4-Aminobenzoic acid</div></div>
      <div class="hd-right"><span class="badge">PubChem match</span></div>
    </div>

    <!-- Split pane -->
    <div class="split">

      <!-- Rail -->
      <div class="rail">
        <div class="rail-head"><span>Library</span></div>

        <div class="mol-item sel m1">
          <div class="mol-thumb">
            <!-- tiny benzene hint -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <polygon points="12,3 20,8 20,16 12,21 4,16 4,8" stroke="#1aa0e6" stroke-width="1.5" fill="#e6f1fb"/>
            </svg>
          </div>
          <div>
            <div class="mol-name">4-Aminobenzoic acid</div>
            <div class="mol-formula">C&#x2087;H&#x2087;NO&#x2082;</div>
          </div>
        </div>

        <div class="mol-item m2">
          <div class="mol-thumb">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="7" stroke="#22c55e" stroke-width="1.5" fill="#e6f7ef"/>
            </svg>
          </div>
          <div>
            <div class="mol-name">Caffeine</div>
            <div class="mol-formula">C&#x2088;H&#x2081;&#x2080;N&#x2084;O&#x2082;</div>
          </div>
        </div>

        <div class="mol-item m3">
          <div class="mol-thumb">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 12 L12 5 L18 12 L12 19 Z" stroke="#D6B5F0" stroke-width="1.5" fill="#f5f0ff"/>
            </svg>
          </div>
          <div>
            <div class="mol-name">Aspirin</div>
            <div class="mol-formula">C&#x2089;H&#x2088;O&#x2084;</div>
          </div>
        </div>

        <div class="mol-item m4">
          <div class="mol-thumb">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 8 L18 8 L15 16 L9 16 Z" stroke="#FFD2B0" stroke-width="1.5" fill="#fff5ee"/>
            </svg>
          </div>
          <div>
            <div class="mol-name">Glucose</div>
            <div class="mol-formula">C&#x2086;H&#x2081;&#x2082;O&#x2086;</div>
          </div>
        </div>
      </div>

      <!-- Main detail pane -->
      <div class="main">
        <div class="mol-title-row">
          <div class="mol-title">4-Aminobenzoic acid</div>
          <div class="mol-iupac">PABA</div>
        </div>
        <div class="prop-row">
          <div class="prop"><b>MW</b> 137.14</div>
          <div class="prop"><b>CID</b> 978</div>
          <div class="prop"><b>InChI</b> 1S/C7H7NO2</div>
        </div>

        <!-- Molecule canvas with draw-in SVG -->
        <div class="mol-canvas">
          <!--
            4-Aminobenzoic acid skeletal structure:
            Benzene ring in the center, COOH at C1 (right), NH2 at C4 (left).
            Ring vertices (center ~cx=200, cy=115, radius=50):
              C1 (right):   250, 115
              C2 (right-up):225, 72
              C3 (left-up): 175, 72
              C4 (left):    150, 115
              C5 (left-dn): 175, 158
              C6 (right-dn):225, 158
          -->
          <svg class="mol-svg" viewBox="70 30 310 170" width="100%" height="100%" aria-label="4-Aminobenzoic acid skeletal structure">

            <!-- Benzene ring bonds (outer) -->
            <!-- C1-C2 -->
            <line class="b1" x1="250" y1="115" x2="225" y2="72"/>
            <!-- C2-C3 -->
            <line class="b2" x1="225" y1="72" x2="175" y2="72"/>
            <!-- C3-C4 -->
            <line class="b3" x1="175" y1="72" x2="150" y2="115"/>
            <!-- C4-C5 -->
            <line class="b4" x1="150" y1="115" x2="175" y2="158"/>
            <!-- C5-C6 -->
            <line class="b5" x1="175" y1="158" x2="225" y2="158"/>
            <!-- C6-C1 -->
            <line class="b6" x1="225" y1="158" x2="250" y2="115"/>

            <!-- Inner aromatic double-bond lines on alternating edges (b1,b3,b5) -->
            <line class="bd1" x1="240" y1="114" x2="221" y2="81"/>
            <line class="bd2" x1="179" y1="81" x2="160" y2="114"/>
            <line class="bd3" x1="181" y1="150" x2="219" y2="150"/>

            <!-- COOH substituent at right vertex (carboxyl carbon at 298,115) -->
            <line class="bs1" x1="250" y1="115" x2="298" y2="115"/>
            <!-- C=O double bond (two parallel lines up-right to O) -->
            <line class="bs5" x1="298" y1="115" x2="320" y2="96"/>
            <line class="bs6" x1="303" y1="115" x2="319" y2="101"/>
            <!-- C-OH single bond down-right -->
            <line class="bs2" x1="298" y1="115" x2="320" y2="134"/>

            <!-- NH2 substituent at left vertex (bond terminates at the N label) -->
            <line class="bs3" x1="150" y1="115" x2="116" y2="115"/>

            <!-- Atom labels -->
            <!-- O= at top right of COOH -->
            <text class="atom-label red a1" x="324" y="90" text-anchor="middle" dominant-baseline="auto">O</text>
            <!-- OH at bottom right -->
            <text class="atom-label red a2" x="325" y="138" text-anchor="start" dominant-baseline="middle">OH</text>
            <!-- H2N at left, bond terminates at the N -->
            <text class="atom-label blue a3" x="112" y="115" text-anchor="end" dominant-baseline="middle">H&#x2082;N</text>
            <!-- The C at junction of COOH -->
            <!-- no label needed - implicit C -->

            <!-- optional: small descriptor labels at ring vertices for N highlight -->
            <!-- (omitted for clean skeletal look) -->
          </svg>
        </div>

        <!-- Property pills and reaction hint -->
        <div class="prop-pills">
          <span class="pill pill-mw">MW 137.14</span>
          <span class="pill pill-logp">LogP 0.83</span>
          <span class="pill pill-drug">Drug-like</span>
        </div>
        <div class="rxn-row">
          <span class="rxn-label">Acetylation</span>
          <div class="rxn-arrow"></div>
          <span class="rxn-product">Procaine precursor</span>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
