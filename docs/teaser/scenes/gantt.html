<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: GANTT</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:820px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}

  /* Header */
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1aa0e6 0%,#7f77dd 100%);display:flex;align-items:center;justify-content:center}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#0e7a44;background:#e6f7ef;padding:3px 10px;border-radius:999px}

  /* Gantt grid */
  .gantt{padding:14px 22px 22px}
  .months{display:grid;grid-template-columns:158px repeat(4,1fr);align-items:end;margin-bottom:6px}
  .months .corner{}
  .months .m{font-size:12px;font-weight:600;color:#7a869b;text-transform:uppercase;letter-spacing:.04em;padding-left:10px;border-left:1px solid #eef1f7}
  .row{display:grid;grid-template-columns:158px 1fr;align-items:center;height:40px}
  .row .task{font-size:14px;font-weight:500;color:#15243b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px}
  .track{position:relative;height:100%;display:flex;align-items:center;border-left:1px solid #eef1f7;background:
    linear-gradient(90deg,#eef1f7 0 1px,transparent 1px) 0 0 / 25% 100% repeat-x}
  .bar{position:absolute;height:22px;border-radius:7px;transform:scaleX(0);transform-origin:left center;box-shadow:0 3px 8px rgba(20,40,80,.10);display:flex;align-items:center}
  .bar span{font-size:11px;font-weight:600;color:#3a475c;padding-left:9px;opacity:0;white-space:nowrap}
  .g1{animation:grow .5s cubic-bezier(.2,.9,.3,1) .45s forwards}
  .g2{animation:grow .5s cubic-bezier(.2,.9,.3,1) .65s forwards}
  .g3{animation:grow .5s cubic-bezier(.2,.9,.3,1) .85s forwards}
  .g4{animation:grow .5s cubic-bezier(.2,.9,.3,1) 1.05s forwards}
  .g5{animation:grow .5s cubic-bezier(.2,.9,.3,1) 1.25s forwards}
  .l1 span{animation:fade .3s ease 1.0s forwards}
  .l2 span{animation:fade .3s ease 1.2s forwards}
  .l3 span{animation:fade .3s ease 1.4s forwards}
  .l4 span{animation:fade .3s ease 1.6s forwards}
  .l5 span{animation:fade .3s ease 1.8s forwards}

  /* Today marker */
  .today{position:absolute;top:30px;bottom:14px;left:0;width:2px;background:#1283c9;opacity:0;animation:fade .4s ease 2.0s forwards}
  .today::before{content:"Today";position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#1283c9;background:#e6f1fb;padding:1px 7px;border-radius:999px;white-space:nowrap}

  @keyframes grow{to{transform:scaleX(1)}}
  @keyframes fade{to{opacity:1}}
  @keyframes push{to{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="scene">
  <div class="card" style="position:relative">

    <div class="hd">
      <div class="hd-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="9" height="3" rx="1.5" fill="#fff" opacity=".95"/>
          <rect x="5" y="7.5" width="11" height="3" rx="1.5" fill="#fff" opacity=".9"/>
          <rect x="3" y="12" width="7" height="3" rx="1.5" fill="#fff" opacity=".85"/>
        </svg>
      </div>
      <div><b>GANTT</b><div class="sub">Spring sequencing project</div></div>
      <div class="hd-right"><span class="badge">On track</span></div>
    </div>

    <div class="gantt">
      <div class="months">
        <div class="corner"></div>
        <div class="m">April</div><div class="m">May</div><div class="m">June</div><div class="m">July</div>
      </div>

      <div class="row">
        <div class="task">Sample prep</div>
        <div class="track">
          <div class="bar g1 l1" style="left:1%;width:24%;background:#B7EBB1"><span>Sample prep</span></div>
        </div>
      </div>
      <div class="row">
        <div class="task">Library prep</div>
        <div class="track">
          <div class="bar g2 l2" style="left:22%;width:22%;background:#A6D2F4"><span>Library prep</span></div>
        </div>
      </div>
      <div class="row">
        <div class="task">Sequencing run</div>
        <div class="track">
          <div class="bar g3 l3" style="left:42%;width:20%;background:#D6B5F0"><span>Sequencing run</span></div>
        </div>
      </div>
      <div class="row">
        <div class="task">QC and analysis</div>
        <div class="track">
          <div class="bar g4 l4" style="left:60%;width:24%;background:#FFD2B0"><span>QC and analysis</span></div>
        </div>
      </div>
      <div class="row">
        <div class="task">Manuscript draft</div>
        <div class="track">
          <div class="bar g5 l5" style="left:80%;width:18%;background:#FFF1A8"><span>Draft</span></div>
        </div>
      </div>
    </div>

    <div class="today" style="left:calc(158px + 22px + (100% - 158px - 44px) * 0.62)"></div>
  </div>
</div>
</body>
</html>
