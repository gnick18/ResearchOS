<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Sequences (plasmid map)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:820px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1aa0e6 0%,#7f77dd 100%);display:flex;align-items:center;justify-content:center}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#1283c9;background:#e6f1fb;padding:3px 10px;border-radius:999px}
  .body{padding:6px 22px 14px;display:flex;justify-content:center}
  svg.map{width:520px;height:464px;display:block}

  /* Backbone + ticks + spin */
  .spin{transform-box:view-box;transform-origin:262px 232px;animation:spin 11s linear 1s infinite}
  .ring{fill:none;stroke:#b8c2d4;stroke-width:2.4;opacity:0;animation:fade .5s ease .1s forwards}
  .ring2{fill:none;stroke:#dde4f0;stroke-width:1.2;opacity:0;animation:fade .5s ease .15s forwards}
  .minor{opacity:0;animation:fade .5s ease .3s forwards}
  .feat{fill:none;stroke-width:13;stroke-linecap:butt;animation:draw .55s ease forwards}
  .arrow{opacity:0;animation:fade .25s ease forwards}
  .cut{stroke:#15243b;stroke-width:2;stroke-linecap:round;opacity:0;animation:fade .3s ease forwards}

  /* Labels counter-rotate so they stay upright while the map spins */
  .lbl{opacity:0;animation:fade .35s ease forwards}
  .lbl text{transform-box:fill-box;transform-origin:center;animation:spinrev 11s linear 1s infinite}
  .flab text{font-size:13px;font-weight:700}
  .elab .ename{font-size:12.5px;font-weight:700;fill:#15243b}
  .elab .ebp{font-size:10px;font-weight:600;fill:#7a869b}

  /* Center label (does not spin) */
  .center-name{font-size:21px;font-weight:700;fill:#15243b;opacity:0;animation:fade .5s ease .7s forwards}
  .center-bp{font-size:13px;font-weight:600;fill:#7a869b;opacity:0;animation:fade .5s ease .8s forwards}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes spinrev{to{transform:rotate(-360deg)}}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{to{opacity:1}}
  @keyframes push{to{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">
    <div class="hd">
      <div class="hd-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6.2" stroke="#fff" stroke-width="1.6" opacity=".95"/>
          <circle cx="9" cy="2.8" r="1.5" fill="#fff"/>
          <circle cx="14.6" cy="11.2" r="1.3" fill="#fff" opacity=".9"/>
          <circle cx="4" cy="12.4" r="1.1" fill="#fff" opacity=".85"/>
        </svg>
      </div>
      <div><b>Sequences</b><div class="sub">pUC19, cloning vector</div></div>
      <div class="hd-right"><span class="badge">2686 bp</span></div>
    </div>
    <div class="body">
      <svg class="map" viewBox="0 0 524 464" aria-label="pUC19 circular plasmid map">
        <g class="spin">
          <circle class="ring" cx="262" cy="232" r="118"/>
          <circle class="ring2" cx="262" cy="232" r="109"/>
          <g class="minor"><line x1="262" y1="120" x2="262" y2="108" stroke="#c7d2e3" stroke-width="1.4"/><line x1="318" y1="135.01" x2="324" y2="124.61" stroke="#c7d2e3" stroke-width="1.4"/><line x1="358.99" y1="176" x2="369.39" y2="170" stroke="#c7d2e3" stroke-width="1.4"/><line x1="374" y1="232" x2="386" y2="232" stroke="#c7d2e3" stroke-width="1.4"/><line x1="358.99" y1="288" x2="369.39" y2="294" stroke="#c7d2e3" stroke-width="1.4"/><line x1="318" y1="328.99" x2="324" y2="339.39" stroke="#c7d2e3" stroke-width="1.4"/><line x1="262" y1="344" x2="262" y2="356" stroke="#c7d2e3" stroke-width="1.4"/><line x1="206" y1="328.99" x2="200" y2="339.39" stroke="#c7d2e3" stroke-width="1.4"/><line x1="165.01" y1="288" x2="154.61" y2="294" stroke="#c7d2e3" stroke-width="1.4"/><line x1="150" y1="232" x2="138" y2="232" stroke="#c7d2e3" stroke-width="1.4"/><line x1="165.01" y1="176" x2="154.61" y2="170" stroke="#c7d2e3" stroke-width="1.4"/><line x1="206" y1="135.01" x2="200" y2="124.61" stroke="#c7d2e3" stroke-width="1.4"/></g>
          <path class="feat f0" d="M 294.53 118.57 A 118 118 0 0 1 378.21 211.51" stroke="#a78bfa" style="stroke-dasharray:134;stroke-dashoffset:134;animation-delay:0.5s"/><path class="feat f1" d="M 379.93 227.88 A 118 118 0 0 1 376.49 260.55" stroke="#fbbf24" style="stroke-dasharray:35;stroke-dashoffset:35;animation-delay:0.7s"/><path class="feat f2" d="M 371.41 276.2 A 118 118 0 0 1 298.46 344.22" stroke="#818cf8" style="stroke-dasharray:105;stroke-dashoffset:105;animation-delay:0.9s"/><path class="feat f3" d="M 229.47 345.43 A 118 118 0 0 1 174.31 153.04" stroke="#34d399" style="stroke-dasharray:241;stroke-dashoffset:241;animation-delay:1.1s"/>
          <polygon class="arrow ar0" points="379.35,219.67 385.1,210.29 371.31,212.73" fill="#a78bfa" style="animation-delay:0.95s"/><polygon class="arrow ar3" points="180.03,147.12 169.11,148.36 179.51,157.73" fill="#34d399" style="animation-delay:1.55s"/>
          <line class="cut c0" x1="273.18" y1="125.59" x2="275.48" y2="103.71" style="animation-delay:1.45s"/><line class="cut c1" x1="360.49" y1="190.19" x2="380.75" y2="181.6" style="animation-delay:1.55s"/><line class="cut c2" x1="265.73" y1="338.93" x2="266.5" y2="360.92" style="animation-delay:1.65s"/><line class="cut c3" x1="202.17" y1="143.29" x2="189.86" y2="125.05" style="animation-delay:1.75s"/>
          <g class="lbl flab" style="animation-delay:1.40s"><text x="333.34" y="167.76" fill="#a78bfa" text-anchor="middle" dominant-baseline="middle">lacZα</text></g><g class="lbl flab" style="animation-delay:1.60s"><text x="357.47" y="242.03" fill="#fbbf24" text-anchor="middle" dominant-baseline="middle">P_lac</text></g><g class="lbl flab" style="animation-delay:1.80s"><text x="327.47" y="302.21" fill="#818cf8" text-anchor="middle" dominant-baseline="middle">ori</text></g><g class="lbl flab" style="animation-delay:2.00s"><text x="169.72" y="258.46" fill="#34d399" text-anchor="middle" dominant-baseline="middle">AmpR</text></g>
          <g class="lbl elab" style="animation-delay:1.60s"><text class="ename" x="277.05" y="84.79" text-anchor="middle" dominant-baseline="middle">EcoRI</text><text class="ebp" x="277.05" y="97.79" text-anchor="middle" dominant-baseline="middle">396</text></g><g class="lbl elab" style="animation-delay:1.70s"><text class="ename" x="394.55" y="171.73" text-anchor="middle" dominant-baseline="middle">BamHI</text><text class="ebp" x="394.55" y="184.73" text-anchor="middle" dominant-baseline="middle">375</text></g><g class="lbl elab" style="animation-delay:1.80s"><text class="ename" x="267.03" y="371.91" text-anchor="middle" dominant-baseline="middle">HindIII</text><text class="ebp" x="267.03" y="384.91" text-anchor="middle" dominant-baseline="middle">447</text></g><g class="lbl elab" style="animation-delay:1.90s"><text class="ename" x="181.48" y="108.62" text-anchor="middle" dominant-baseline="middle">PstI</text><text class="ebp" x="181.48" y="121.62" text-anchor="middle" dominant-baseline="middle">1186</text></g>
        </g>
        <text class="center-name" x="262" y="228" text-anchor="middle" dominant-baseline="middle">pUC19</text>
        <text class="center-bp" x="262" y="248" text-anchor="middle" dominant-baseline="middle">2686 bp</text>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
