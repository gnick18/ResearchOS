<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Companion app</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}

  /* Phone device */
  .phone{position:relative;width:320px;height:652px;background:#11161f;border-radius:46px;padding:11px;box-shadow:0 30px 70px rgba(20,40,80,.20),0 4px 12px rgba(20,40,80,.12)}
  .screen{position:relative;width:100%;height:100%;background:#fff;border-radius:36px;overflow:hidden;display:flex;flex-direction:column}

  /* Status bar */
  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:13px 24px 4px;font-size:13px;font-weight:600;color:#15243b}
  .statusbar .right{display:flex;align-items:center;gap:5px}
  .batt{width:22px;height:11px;border:1.5px solid #15243b;border-radius:3px;position:relative}
  .batt::after{content:"";position:absolute;top:2px;left:2px;bottom:2px;width:13px;background:#15243b;border-radius:1px}
  .batt-tip{width:2px;height:5px;background:#15243b;border-radius:0 2px 2px 0}

  /* Rainbow signature bar */
  .rainbow{height:4px;width:100%;background:linear-gradient(90deg,#FFD2B0,#FFF1A8,#B7EBB1,#A6D2F4,#D6B5F0)}

  /* App header */
  .apphd{padding:14px 18px 8px}
  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b8;text-transform:uppercase}
  .apptitle{display:flex;align-items:center;gap:9px;margin-top:2px}
  .apptitle h1{font-size:23px;font-weight:700;color:#15243b}
  .livechip{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#0e7a44;background:#e6f7ef;padding:4px 11px;border-radius:999px;opacity:0;animation:fade .4s ease .6s forwards}
  .pulse{position:relative;width:8px;height:8px;border-radius:50%;background:#16A34A}
  .pulse::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid #16A34A;opacity:.6;animation:pulsering 1.7s ease-out .8s infinite}

  .body{flex:1;padding:6px 18px;display:flex;flex-direction:column;gap:12px}

  /* Quick capture buttons */
  .quick{display:flex;gap:10px}
  .qbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:15px 8px;border-radius:16px;background:rgba(26,160,230,0.10);border:1px solid rgba(26,160,230,0.16)}
  .qbtn .ic{width:30px;height:30px;border-radius:9px;background:#1AA0E6;display:flex;align-items:center;justify-content:center}
  .qbtn span{font-size:12.5px;font-weight:600;color:#15243b}
  .q1{opacity:0;animation:rise .4s ease .8s forwards}
  .q2{opacity:0;animation:rise .4s ease .92s forwards}

  /* Capture outbox */
  .outbox{border:1px solid #e7edf6;border-radius:16px;background:#fafbfe;overflow:hidden}
  .outbox-hd{font-size:11px;font-weight:700;letter-spacing:.06em;color:#9aa6b8;text-transform:uppercase;padding:11px 14px 7px}
  .cap-row{display:flex;align-items:center;gap:11px;padding:10px 14px;border-top:1px solid #eef1f7}
  .thumb{width:42px;height:42px;border-radius:10px;flex:0 0 auto;background:linear-gradient(135deg,#cfe0ee,#e7eef6)}
  .thumb.g2{background:linear-gradient(135deg,#dcd0ee,#ece7f6)}
  .cap-meta{flex:1;min-width:0;display:flex;flex-direction:column}
  .cap-meta .t{display:block;font-size:14px;font-weight:600;color:#15243b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cap-meta .s{font-size:11.5px;color:#7a869b;margin-top:1px}
  .r1{opacity:0;animation:rise .4s ease 1.05s forwards}
  .r2{opacity:0;animation:rise .45s ease 1.30s forwards}

  /* Status badges (crossfade Queued -> Sending -> Sent) */
  .badge-slot{position:relative;width:74px;height:24px;flex:0 0 auto}
  .bdg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:700;border-radius:999px;opacity:0}
  .bdg .dot{width:6px;height:6px;border-radius:50%}
  .b-sent-static{background:#e6f7ef;color:#0e7a44;opacity:0;animation:fade .3s ease 1.45s forwards}
  .b-sent-static .dot{background:#16A34A}
  .b-queued{background:#fef3e8;color:#b56a00;animation:fade .25s ease 1.55s forwards, fadeout .2s ease 2.05s forwards}
  .b-queued .dot{background:#F59E0B}
  .b-sending{background:#fef3e8;color:#b56a00;animation:fade .25s ease 2.05s forwards, fadeout .2s ease 2.62s forwards}
  .b-sending .spin{width:11px;height:11px;border-radius:50%;border:2px solid #f1c98a;border-top-color:#F59E0B;animation:rot .6s linear infinite}
  .b-sent{background:#e6f7ef;color:#0e7a44;animation:fade .3s ease 2.62s forwards}
  .b-sent .ck{display:flex;animation:pop .35s cubic-bezier(.2,1.4,.4,1) 2.66s both}

  /* Sent-to-lab toast */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(8px);display:flex;align-items:center;gap:7px;background:#15243b;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:0 8px 20px rgba(20,40,80,.22);opacity:0;animation:toastin .4s cubic-bezier(.2,.8,.2,1) 2.7s forwards}
  .toast .ck{width:15px;height:15px;border-radius:50%;background:#16A34A;display:flex;align-items:center;justify-content:center}

  /* Floating glass tab bar */
  .tabbar{position:absolute;left:14px;right:14px;bottom:14px;height:60px;background:rgba(255,255,255,0.94);border:1px solid #e2e8f3;border-radius:22px;box-shadow:0 10px 26px rgba(20,40,80,.14);display:flex;align-items:center;justify-content:space-around;padding:0 8px}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
  .tab span{font-size:9.5px;font-weight:600;color:#939DAD}
  .tab.active span{color:#1AA0E6}
  .tab svg{stroke:#939DAD;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab.active svg{stroke:#1AA0E6}
  .fab{width:50px;height:50px;border-radius:16px;background:#1AA0E6;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(26,160,230,.45);margin-top:-22px;flex:0 0 auto}

  @keyframes fade{to{opacity:1}}
  @keyframes fadeout{to{opacity:0}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:none}}
  @keyframes toastin{to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes pulsering{to{transform:scale(2.3);opacity:0}}
  @keyframes rot{to{transform:rotate(360deg)}}
  @keyframes push{to{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="scene">
  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="right">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="#15243b"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0.5" width="3" height="11.5" rx="1" opacity=".35"/></svg>
          <span class="batt"></span><span class="batt-tip"></span>
        </span>
      </div>
      <div class="rainbow"></div>

      <div class="apphd">
        <div class="eyebrow">At the bench</div>
        <div class="apptitle">
          <h1>Notebook</h1>
          <span class="livechip"><span class="pulse"></span>Live</span>
        </div>
      </div>

      <div class="body">
        <div class="quick">
          <div class="qbtn q1">
            <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 012-2h2l1.5-2h7L17 6h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><circle cx="12" cy="12.5" r="3.2"/></svg></span>
            <span>Take a photo</span>
          </div>
          <div class="qbtn q2">
            <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 00-3-3L5 17z"/><path d="M13.5 8l3 3"/></svg></span>
            <span>Quick note</span>
          </div>
        </div>

        <div class="outbox">
          <div class="outbox-hd">Recent captures</div>
          <div class="cap-row r1">
            <span class="thumb"></span>
            <span class="cap-meta"><span class="t">Microscope 40x</span><span class="s">2 min ago</span></span>
            <span class="badge-slot">
              <span class="bdg b-sent-static"><span class="dot"></span>Sent</span>
            </span>
          </div>
          <div class="cap-row r2">
            <span class="thumb g2"></span>
            <span class="cap-meta"><span class="t">Gel lane 3</span><span class="s">just now</span></span>
            <span class="badge-slot">
              <span class="bdg b-queued"><span class="dot"></span>Queued</span>
              <span class="bdg b-sending"><span class="spin"></span>Sending</span>
              <span class="bdg b-sent"><span class="ck"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0e7a44" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>Sent</span>
            </span>
          </div>
        </div>
      </div>

      <div class="toast"><span class="ck"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>Sent to your lab</div>

      <div class="tabbar">
        <div class="tab"><svg width="21" height="21" viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg><span>Home</span></div>
        <div class="tab active"><svg width="21" height="21" viewBox="0 0 24 24"><path d="M5 4h10a3 3 0 013 3v13H7a2 2 0 01-2-2z"/><path d="M9 8h6M9 12h6"/></svg><span>Notebook</span></div>
        <div class="fab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="tab"><svg width="21" height="21" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M12 4v16"/></svg><span>Methods</span></div>
        <div class="tab"><svg width="21" height="21" viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg><span>Inventory</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
