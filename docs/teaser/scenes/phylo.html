<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Phylo Tree</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:820px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}

  /* Header */
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1aa0e6 0%,#7f77dd 100%);display:flex;align-items:center;justify-content:center}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#7f77dd;background:#f0eeff;padding:3px 10px;border-radius:999px}

  /* Tree canvas */
  .tree-wrap{padding:18px 22px 22px;background:#fafbfe}

  /* SVG branch animations: each branch is a <path> with stroke-dasharray + stroke-dashoffset animated to 0 */
  /* Clade highlight bands */
  .clade-fumigati{opacity:0;animation:fade .3s ease .25s forwards}
  .clade-flavi{opacity:0;animation:fade .3s ease .25s forwards}

  /* Root stem */
  .b-root{stroke-dasharray:60;stroke-dashoffset:60;animation:draw 0.25s ease .10s forwards}

  /* Left subtree trunk (vertical connector from root to Fumigati/right split) */
  .b-trunk-v{stroke-dasharray:90;stroke-dashoffset:90;animation:draw 0.25s ease .30s forwards}

  /* Fumigati clade horizontal to mrca */
  .b-fum-h{stroke-dasharray:80;stroke-dashoffset:80;animation:draw 0.28s ease .52s forwards}
  /* Fumigati vertical connector */
  .b-fum-v{stroke-dasharray:50;stroke-dashoffset:50;animation:draw 0.20s ease .75s forwards}
  /* A. fumigatus branch */
  .b-fum1{stroke-dasharray:100;stroke-dashoffset:100;animation:draw 0.30s ease .90s forwards}
  /* A. fischeri branch */
  .b-fum2{stroke-dasharray:100;stroke-dashoffset:100;animation:draw 0.30s ease .95s forwards}

  /* Right-side vertical from trunk to bottom section */
  .b-right-v{stroke-dasharray:130;stroke-dashoffset:130;animation:draw 0.30s ease .52s forwards}
  /* Flavi clade h */
  .b-flavi-h{stroke-dasharray:70;stroke-dashoffset:70;animation:draw 0.25s ease .80s forwards}
  /* Flavi vertical */
  .b-flavi-v{stroke-dasharray:40;stroke-dashoffset:40;animation:draw 0.18s ease .98s forwards}
  /* A. flavus */
  .b-flavi1{stroke-dasharray:95;stroke-dashoffset:95;animation:draw 0.28s ease 1.12s forwards}
  /* A. oryzae */
  .b-flavi2{stroke-dasharray:95;stroke-dashoffset:95;animation:draw 0.28s ease 1.17s forwards}

  /* Nidulantes+Nigri subtree */
  .b-nid-h{stroke-dasharray:55;stroke-dashoffset:55;animation:draw 0.22s ease .80s forwards}
  .b-nid-v{stroke-dasharray:60;stroke-dashoffset:60;animation:draw 0.22s ease 1.00s forwards}
  /* A. nidulans */
  .b-nid1{stroke-dasharray:105;stroke-dashoffset:105;animation:draw 0.30s ease 1.18s forwards}
  /* Nigri+outgroup subtree h */
  .b-nigri-h{stroke-dasharray:50;stroke-dashoffset:50;animation:draw 0.20s ease 1.20s forwards}
  .b-nigri-v{stroke-dasharray:35;stroke-dashoffset:35;animation:draw 0.18s ease 1.38s forwards}
  /* A. niger */
  .b-niger{stroke-dasharray:90;stroke-dashoffset:90;animation:draw 0.26s ease 1.52s forwards}
  /* P. chrysogenum */
  .b-pchry{stroke-dasharray:105;stroke-dashoffset:105;animation:draw 0.28s ease 1.57s forwards}

  /* Tip label fade-ins */
  .tlabel{opacity:0}
  .tl1{animation:fade .25s ease 1.22s forwards}
  .tl2{animation:fade .25s ease 1.27s forwards}
  .tl3{animation:fade .25s ease 1.44s forwards}
  .tl4{animation:fade .25s ease 1.49s forwards}
  .tl5{animation:fade .25s ease 1.50s forwards}
  .tl6{animation:fade .25s ease 1.80s forwards}
  .tl7{animation:fade .25s ease 1.85s forwards}

  /* Support value labels */
  .supp{opacity:0;animation:fade .2s ease 1.60s forwards}

  /* Scale bar */
  .scalebar{opacity:0;animation:fade .25s ease 1.90s forwards}

  /* Strip color column */
  .strip{opacity:0;animation:fade .25s ease 1.95s forwards}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{to{opacity:1}}
  @keyframes push{to{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">

    <div class="hd">
      <div class="hd-icon">
        <!-- Phylo tree icon: a simple dendrogram glyph -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <line x1="3" y1="9" x2="6" y2="9" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="6" y1="4.5" x2="6" y2="13.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="6" y1="4.5" x2="10" y2="4.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="6" y1="13.5" x2="10" y2="13.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="10" y1="3" x2="10" y2="6" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="10" y1="3" x2="15" y2="3" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="10" y1="6" x2="15" y2="6" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="10" y1="12" x2="10" y2="15" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="10" y1="12" x2="15" y2="12" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="10" y1="15" x2="15" y2="15" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div><b>Phylo Tree</b><div class="sub">ITS2 marker, 7-taxon Aspergillus</div></div>
      <div class="hd-right"><span class="badge">rectangular</span></div>
    </div>

    <div class="tree-wrap">
      <!--
        Layout (all coords in px within a 776 x 260 viewBox):
        Root at x=28, y=130 (midpoint).
        Tips at x=480 (before label strip gap).
        7 tips spaced 30px apart, y=40..220 (6 gaps x 30 = 180px, center at 130).

        Tip y positions (top to bottom):
          A. fumigatus   y=40
          A. fischeri    y=70
          A. flavus      y=110
          A. oryzae      y=140
          A. nidulans    y=175
          A. niger       y=205
          P. chrysogenum y=230

        Clades:
          Fumigati: fumigatus+fischeri, mrca x=340, y midpoint=55
          Flavi: flavus+oryzae, mrca x=360, y midpoint=125
          Nidulantes+Nigri: nidulans+niger+pchry, mrca x=310, y midpoint=202
          Top split (Fumigati vs rest): mrca x=200, y midpoint=130
          Bottom 3 split: mrca x=240, y midpoint=175

        Elbow path convention from real renderer:
          M parentX parentY V childY H childX
          (go to parent X at parent Y, drop vertical to child Y, go horizontal to child X)
      -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 776 264" width="776" height="264" font-family="system-ui,sans-serif">

        <!-- Clade highlight bands (behind edges, rgba fill, stroke none to avoid default border) -->
        <!-- Fumigati band: y 28..83, x from 330 to 486 -->
        <rect class="clade-fumigati" x="330" y="28" width="156" height="55" rx="6" fill="rgba(166,210,244,0.22)" stroke="none"/>
        <!-- Flavi band: y 98..153, x from 350 to 486 -->
        <rect class="clade-flavi" x="350" y="98" width="136" height="55" rx="6" fill="rgba(183,235,177,0.22)" stroke="none"/>
        <!-- Nigri+outgroup band: y 193..242, x from 380 to 486 -->
        <rect class="clade-nigri" x="380" y="193" width="106" height="52" rx="6" fill="rgba(255,210,176,0.22)" stroke="none" style="opacity:0;animation:fade .3s ease .25s forwards"/>

        <!--
          BRANCHES (drawn left to right, root to tips, staggered)
          Real renderer elbow: M parentX parentY V childY H childX
          stroke: #1f2937, stroke-width: 1.5
        -->

        <!-- Root stem: horizontal from x=16 to x=28 at y=130 -->
        <path class="b-root" d="M16 130 H60" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Root vertical connector: from (60,55) V 202 — spans Fumigati mrca y=55 to bottom cluster y=202 -->
        <path class="b-trunk-v" d="M60 55 V202" fill="none" stroke="#1f2937" stroke-width="1.5"/>

        <!-- Fumigati subtree: horizontal from root (60,55) to Fumigati mrca (340,55) -->
        <path class="b-fum-h" d="M60 55 H340" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Fumigati internal vertical: 340,40 V 70 -->
        <path class="b-fum-v" d="M340 40 V70" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. fumigatus: M340 40 H480 -->
        <path class="b-fum1" d="M340 40 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. fischeri: M340 70 H480 -->
        <path class="b-fum2" d="M340 70 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>

        <!-- Right-side main cluster: from (60,202) H 150 = right trunk anchor, then V covers 110..230 -->
        <!-- Bottom large subtree root x=150, y midpoint=175 (covers flavus=110 to pchry=230) -->
        <path class="b-right-v" d="M60 110 V230" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Flavi subtree: M60 110 H 360 (mrca x=360, y=125) — two step elbow -->
        <path class="b-flavi-h" d="M60 125 H360" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Flavi internal vertical: 360,110 V140 -->
        <path class="b-flavi-v" d="M360 110 V140" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. flavus: M360 110 H480 -->
        <path class="b-flavi1" d="M360 110 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. oryzae: M360 140 H480 -->
        <path class="b-flavi2" d="M360 140 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>

        <!-- Nidulantes+Nigri cluster: mrca x=200, y=202 (midpoint 175..230) -->
        <!-- Horizontal from main trunk (60,202) to cluster mrca (200,202) — split here into nidulans vs (niger+pchry) -->
        <path class="b-nid-h" d="M60 202 H200" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Internal vertical: 200,175 V230 -->
        <path class="b-nid-v" d="M200 175 V230" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. nidulans: M200 175 H480 -->
        <path class="b-nid1" d="M200 175 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Niger+pchry subtree: mrca x=380, midpoint y=218 -->
        <!-- Horizontal M200 218 H380 -->
        <path class="b-nigri-h" d="M200 218 H380" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- Vertical 380,205 V230 -->
        <path class="b-nigri-v" d="M380 205 V230" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- A. niger: M380 205 H480 -->
        <path class="b-niger" d="M380 205 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>
        <!-- P. chrysogenum: M380 230 H480 -->
        <path class="b-pchry" d="M380 230 H480" fill="none" stroke="#1f2937" stroke-width="1.5"/>

        <!-- Tip color strip (categorical section column) -->
        <g class="strip">
          <rect x="488" y="33" width="11" height="14" fill="#A6D2F4"/>
          <rect x="488" y="63" width="11" height="14" fill="#A6D2F4"/>
          <rect x="488" y="103" width="11" height="14" fill="#B7EBB1"/>
          <rect x="488" y="133" width="11" height="14" fill="#B7EBB1"/>
          <rect x="488" y="168" width="11" height="14" fill="#D6B5F0"/>
          <rect x="488" y="198" width="11" height="14" fill="#FFD2B0"/>
          <rect x="488" y="223" width="11" height="14" fill="#eef1f7"/>
        </g>

        <!-- Tip labels (italic, species convention, font-size 11) -->
        <text class="tlabel tl1" x="506" y="44"  font-size="11" font-style="italic" fill="#1f2937">A. fumigatus</text>
        <text class="tlabel tl2" x="506" y="74"  font-size="11" font-style="italic" fill="#1f2937">A. fischeri</text>
        <text class="tlabel tl3" x="506" y="114" font-size="11" font-style="italic" fill="#1f2937">A. flavus</text>
        <text class="tlabel tl4" x="506" y="144" font-size="11" font-style="italic" fill="#1f2937">A. oryzae</text>
        <text class="tlabel tl5" x="506" y="179" font-size="11" font-style="italic" fill="#1f2937">A. nidulans</text>
        <text class="tlabel tl6" x="506" y="209" font-size="11" font-style="italic" fill="#1f2937">A. niger</text>
        <text class="tlabel tl7" x="506" y="234" font-size="11" font-style="italic" fill="#64748b">P. chrysogenum</text>

        <!-- Support values on key internal nodes -->
        <text class="supp" x="342" y="36"  font-size="9" fill="#64748b">100</text>
        <text class="supp" x="362" y="106" font-size="9" fill="#64748b">96</text>
        <text class="supp" x="202" y="171" font-size="9" fill="#64748b">85</text>
        <text class="supp" x="382" y="201" font-size="9" fill="#64748b">90</text>

        <!-- Clade labels -->
        <text class="clade-fumigati" x="334" y="26" font-size="9" font-weight="700" fill="#1283c9">Fumigati</text>
        <text class="clade-flavi" x="354" y="96" font-size="9" font-weight="700" fill="#0e7a44">Flavi</text>

        <!-- Scale bar -->
        <g class="scalebar">
          <line x1="60" y1="250" x2="160" y2="250" stroke="#64748b" stroke-width="1"/>
          <line x1="60" y1="245" x2="60" y2="255" stroke="#64748b" stroke-width="1"/>
          <line x1="160" y1="245" x2="160" y2="255" stroke="#64748b" stroke-width="1"/>
          <text x="110" y="262" font-size="9" fill="#64748b" text-anchor="middle">0.5 substitutions/site</text>
        </g>

      </svg>
    </div>

  </div>
</div>
</body>
</html>
