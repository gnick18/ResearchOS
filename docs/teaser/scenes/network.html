<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Network</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:860px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}

  /* Header */
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#0284c7 0%,#9333ea 100%);display:flex;align-items:center;justify-content:center}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#1283c9;background:#e6f1fb;padding:3px 10px;border-radius:999px}

  /* Two-panel layout -- position:relative so the flying card can span across */
  .panels{
    display:grid;
    grid-template-columns:1fr 100px 1fr;
    align-items:center;
    gap:0;
    padding:22px 22px 26px;
    position:relative;
  }
  .gap-track{width:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

  /* Lab panels */
  .lab-panel{border:1px solid #e2e8f3;border-radius:14px;background:#fafbfe;padding:16px;display:flex;flex-direction:column;gap:10px}
  .lab-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#7a869b;margin-bottom:2px}
  .lab-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex:0 0 auto}
  .lab-name{font-size:14px;font-weight:600;color:#15243b;line-height:1.2}
  .lab-inst{font-size:11px;color:#7a869b;margin-top:1px}
  .lab-row{display:flex;align-items:center;gap:10px}
  .trust-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .trust-chip{display:inline-flex;align-items:center;gap:4px;border:1px solid #e2e8f3;background:#fff;border-radius:999px;padding:2px 8px;font-size:10.5px;font-weight:500;color:#3a475c}
  .trust-chip svg{flex:0 0 auto}

  /* Share object card */
  .obj-card{border:1px solid #e2e8f3;border-radius:10px;background:#fff;padding:9px 12px;display:flex;align-items:center;gap:9px}
  .obj-icon{width:28px;height:28px;border-radius:7px;background:#f0f4fb;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .obj-title{font-size:12px;font-weight:600;color:#15243b}
  .obj-type{font-size:10px;color:#7a869b;margin-top:1px}
  .send-btn{margin-top:8px;width:100%;background:#1283c9;color:#fff;border:none;border-radius:8px;padding:7px 0;font-size:12px;font-weight:600;cursor:default;display:flex;align-items:center;justify-content:center;gap:6px}

  /*
    Flying sealed object.
    Positioned absolute relative to .panels (the full-width grid container).
    Starts at left:22px (just inside sender panel), slides to left:calc(50% + 20px)
    which lands it right at the start of the recipient panel.
    top is measured from the panels container top to vertically center in the card.
  */
  .flying-obj{
    position:absolute;
    top:50%;
    margin-top:-20px;
    left:22px;
    width:100px;
    background:#fff;
    border:1.5px solid #0284c7;
    border-radius:10px;
    padding:7px 10px;
    display:flex;align-items:center;gap:7px;
    box-shadow:0 4px 16px rgba(2,132,199,.22);
    font-size:11px;font-weight:600;color:#0284c7;
    opacity:0;
    pointer-events:none;
    white-space:nowrap;
    z-index:10;
    /* two animations in sequence: appear, then slide */
    animation:
      obj-appear .2s cubic-bezier(.2,.9,.3,1) .5s forwards,
      obj-slide .7s cubic-bezier(.4,0,.2,1) .7s forwards,
      obj-land-fade .25s ease 1.4s forwards;
  }
  .flying-obj .lock-wrap{
    width:18px;height:18px;border-radius:5px;
    background:linear-gradient(135deg,#0284c7,#9333ea);
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }

  /* Horizontal arrow line in the gap */
  .gap-arrow{
    width:60px;height:2px;background:linear-gradient(90deg,#e2e8f3,#0284c7 60%,#9333ea);
    border-radius:999px;position:relative;
  }
  .gap-arrow::after{
    content:"";position:absolute;right:-1px;top:-3px;
    border:4px solid transparent;border-left:6px solid #9333ea;
  }

  /* Trail dots inside gap-track (position:relative), evenly spaced L to R */
  .gap-track{overflow:visible}
  .trail-dot{
    position:absolute;
    top:50%;margin-top:-3px;
    width:7px;height:7px;border-radius:50%;opacity:0;
    pointer-events:none;z-index:9;
  }
  .td1{background:#f97316;left:10%;animation:trail-pop .18s ease .68s forwards,trail-fade .35s ease .86s forwards}
  .td2{background:#e8920b;left:28%;animation:trail-pop .18s ease .74s forwards,trail-fade .35s ease .92s forwards}
  .td3{background:#16a34a;left:46%;animation:trail-pop .18s ease .80s forwards,trail-fade .35s ease .98s forwards}
  .td4{background:#0284c7;left:64%;animation:trail-pop .18s ease .86s forwards,trail-fade .35s ease 1.04s forwards}
  .td5{background:#9333ea;left:82%;animation:trail-pop .18s ease .92s forwards,trail-fade .35s ease 1.10s forwards}

  /* Delivery confirmation on recipient side */
  .delivered{
    margin-top:8px;
    width:100%;
    background:#e6f7ef;
    border:1px solid #16a34a;
    border-radius:8px;
    padding:7px 10px;
    display:flex;align-items:center;gap:7px;
    font-size:12px;font-weight:600;color:#0e7a44;
    opacity:0;
    transform:translateY(6px) scale(.97);
    animation:delivered-pop .4s cubic-bezier(.2,1.3,.3,1) 1.5s forwards;
  }
  .delivered-check{
    width:18px;height:18px;border-radius:50%;background:#16a34a;
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }

  /* Seal confirmed line */
  .seal-row{
    margin-top:4px;
    font-size:10.5px;color:#7a869b;
    display:flex;align-items:center;gap:5px;
    opacity:0;
    animation:fade .3s ease 1.9s forwards;
  }

  @keyframes push{to{transform:scale(1.04)}}
  @keyframes fade{to{opacity:1}}
  @keyframes obj-appear{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  @keyframes obj-slide{to{transform:translateX(calc(50vw - 22px))}}
  @keyframes obj-land-fade{to{opacity:0}}
  @keyframes trail-pop{to{opacity:.85}}
  @keyframes trail-fade{to{opacity:0}}
  @keyframes delivered-pop{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">

    <!-- Header -->
    <div class="hd">
      <div class="hd-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="4" cy="9" r="2.5" fill="#fff" opacity=".9"/>
          <circle cx="14" cy="4.5" r="2.5" fill="#fff" opacity=".9"/>
          <circle cx="14" cy="13.5" r="2.5" fill="#fff" opacity=".9"/>
          <line x1="6.2" y1="8.2" x2="11.8" y2="5.3" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity=".85"/>
          <line x1="6.2" y1="9.8" x2="11.8" y2="12.7" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity=".85"/>
        </svg>
      </div>
      <div><b>Network</b><div class="sub">Share across labs</div></div>
      <div class="hd-right"><span class="badge">End-to-end sealed</span></div>
    </div>

    <!-- Two-panel share round-trip -->
    <div class="panels">

      <!-- LEFT: Sender lab -->
      <div class="lab-panel">
        <div class="lab-label">Your lab</div>
        <div class="lab-row">
          <div class="lab-avatar" style="background:#f97316">GN</div>
          <div>
            <div class="lab-name">Nickles Lab</div>
            <div class="lab-inst">University of Wisconsin-Madison</div>
          </div>
        </div>

        <div class="obj-card">
          <div class="obj-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="2" y="2" width="12" height="12" rx="2" fill="#A6D2F4"/>
              <line x1="4.5" y1="5.5" x2="11.5" y2="5.5" stroke="#1283c9" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="4.5" y1="8" x2="9" y2="8" stroke="#1283c9" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="4.5" y1="10.5" x2="10" y2="10.5" stroke="#1283c9" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <div class="obj-title">CRISPR-Cas9 knockout protocol</div>
            <div class="obj-type">Method</div>
          </div>
        </div>

        <button class="send-btn" tabindex="-1" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M2 6.5h9M7.5 3l4 3.5-4 3.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Send sealed
        </button>
      </div>

      <!-- CENTER: gap with arrow and trail dots -->
      <div class="gap-track">
        <div class="gap-arrow"></div>
        <div class="trail-dot td1"></div>
        <div class="trail-dot td2"></div>
        <div class="trail-dot td3"></div>
        <div class="trail-dot td4"></div>
        <div class="trail-dot td5"></div>
      </div>

      <!-- RIGHT: Recipient lab -->
      <div class="lab-panel">
        <div class="lab-label">Recipient lab</div>
        <div class="lab-row">
          <div class="lab-avatar" style="background:#9333ea">SB</div>
          <div>
            <div class="lab-name">Singh-Bremer Lab</div>
            <div class="lab-inst">Stanford University</div>
          </div>
        </div>

        <div class="trust-row">
          <span class="trust-chip">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
              <path d="M5.5 1 L10 3v3c0 2.5-2 4-4.5 4.5C3 10 1 8.5 1 6V3z" fill="#A6D2F4" stroke="#1283c9" stroke-width="1"/>
              <polyline points="3.5,5.5 5,7 7.5,4" stroke="#1283c9" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Verified, stanford.edu
          </span>
          <span class="trust-chip" style="font-family:monospace;font-size:10px;color:#7a869b">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
              <rect x="1.5" y="4.5" width="7" height="5" rx="1.2" stroke="#7a869b" stroke-width="1"/>
              <path d="M3 4.5V3.2a2 2 0 0 1 4 0V4.5" stroke="#7a869b" stroke-width="1" stroke-linecap="round"/>
            </svg>
            7f:2a:d1:8c
          </span>
        </div>

        <div class="delivered">
          <div class="delivered-check">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
              <polyline points="2,5 4.5,7.5 8,3" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          Delivered to inbox
        </div>

        <div class="seal-row">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
            <rect x="1.5" y="4.5" width="7" height="5" rx="1.2" fill="#B7EBB1" stroke="#16a34a" stroke-width="1"/>
            <path d="M3 4.5V3.2a2 2 0 0 1 4 0V4.5" stroke="#16a34a" stroke-width="1" stroke-linecap="round"/>
          </svg>
          Signed, sealed, integrity verified
        </div>
      </div>

      <!-- Flying sealed object (positioned over panels, spans full width) -->
      <div class="flying-obj" aria-hidden="true">
        <div class="lock-wrap">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
            <rect x="1.5" y="4.5" width="7" height="5" rx="1.2" fill="#fff"/>
            <path d="M3 4.5V3.2a2 2 0 0 1 4 0V4.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
            <circle cx="5" cy="7" r=".8" fill="#0284c7"/>
          </svg>
        </div>
        Sealed
      </div>


    </div>
  </div>
</div>
</body>
</html>
