<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Ask BeakerBot</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:780px;max-width:94vw;transform-origin:center;animation:push 1.4s cubic-bezier(.4,0,.2,1) 7.4s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .body{padding:20px 22px;display:flex;flex-direction:column;gap:13px}
  .uq{align-self:flex-end;max-width:80%;background:#1283c9;color:#fff;padding:11px 16px;border-radius:16px 16px 4px 16px;font-size:16px;opacity:0;transform:translateY(10px);animation:pop .4s cubic-bezier(.2,.8,.2,1) 3.1s forwards}
  .embed{border:1px solid #e7edf6;border-radius:14px;background:#fafbfe;overflow:hidden;opacity:0;transform:translateY(12px) scale(.99)}
  .plan{animation:pop .5s cubic-bezier(.2,.8,.2,1) 3.6s forwards}
  .eh{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid #eef1f7;font-size:13px;font-weight:600;color:#3a475c}
  .eh .tag{margin-left:auto;font-size:11px;font-weight:600;color:#1283c9;background:#e6f1fb;padding:3px 9px;border-radius:999px}
  .pstep{display:flex;align-items:center;gap:11px;font-size:15px;padding:9px 15px;opacity:0;transform:translateX(-8px)}
  .p1{animation:slide .35s ease 3.9s forwards}.p2{animation:slide .35s ease 4.1s forwards}.p3{animation:slide .35s ease 4.3s forwards}
  .dot{position:relative;width:20px;height:20px;border-radius:50%;border:2px solid #c7d2e3;flex:0 0 auto}
  .dot .ck{position:absolute;inset:-2px;border-radius:50%;background:#1283c9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transform:scale(.4)}
  .c1{animation:check .3s cubic-bezier(.2,1.3,.4,1) 5.0s forwards}.c2{animation:check .3s cubic-bezier(.2,1.3,.4,1) 5.55s forwards}.c3{animation:check .3s cubic-bezier(.2,1.3,.4,1) 6.1s forwards}
  .pbar{height:6px;margin:8px 15px 14px;background:#e9eef6;border-radius:999px;overflow:hidden}
  .pfill{height:100%;width:0;background:linear-gradient(90deg,#1aa0e6,#7f77dd);border-radius:999px;animation:fill 1.7s cubic-bezier(.4,0,.2,1) 4.6s forwards}
  .result{animation:pop .5s cubic-bezier(.2,.8,.2,1) 6.5s forwards}
  .chart{display:flex;align-items:flex-end;gap:18px;height:120px;padding:18px 22px 14px}
  .bar{flex:1;border-radius:7px 7px 0 0;transform:scaleY(0);transform-origin:bottom}
  .bar.b1{height:64px;background:#FFD2B0;animation:grow .55s cubic-bezier(.2,.9,.3,1) 6.8s forwards}
  .bar.b2{height:96px;background:#B7EBB1;animation:grow .55s cubic-bezier(.2,.9,.3,1) 6.95s forwards}
  .bar.b3{height:78px;background:#A6D2F4;animation:grow .55s cubic-bezier(.2,.9,.3,1) 7.1s forwards}
  .bar.b4{height:112px;background:#D6B5F0;animation:grow .55s cubic-bezier(.2,.9,.3,1) 7.25s forwards}
  .input{display:flex;align-items:center;gap:10px;margin:0 22px 22px;padding:12px 16px;border:1.5px solid #dbe3ef;border-radius:14px;background:#fafbfe}
  .typed{font-size:16px;color:#15243b;white-space:nowrap;overflow:hidden;border-right:2px solid #1283c9;width:0;animation:type 2.1s steps(30,end) .9s forwards, caret .7s step-end 8, clearcaret 0s linear 3.0s forwards, cleartext .25s ease 3.05s forwards}
  .send{margin-left:auto;width:34px;height:34px;border-radius:10px;background:#1283c9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  @keyframes type{to{width:30ch}}
  @keyframes caret{50%{border-color:transparent}}
  @keyframes clearcaret{to{border-color:transparent}}
  @keyframes cleartext{to{opacity:0}}
  @keyframes pop{to{opacity:1;transform:none}}
  @keyframes slide{to{opacity:1;transform:none}}
  @keyframes check{to{opacity:1;transform:none}}
  @keyframes grow{to{transform:scaleY(1)}}
  @keyframes fill{to{width:100%}}
  @keyframes push{to{transform:scale(1.05)}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">
    <div class="hd">
      <svg viewBox="8 3 24 31" width="30" height="38" fill="none" stroke="#1AA0E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <defs><linearGradient id="liq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD2B0"/><stop offset="25%" stop-color="#FFF1A8"/><stop offset="50%" stop-color="#B7EBB1"/><stop offset="75%" stop-color="#A6D2F4"/><stop offset="100%" stop-color="#D6B5F0"/></linearGradient></defs>
        <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z" fill="white" stroke="none"/>
        <path d="M 12 19 Q 14 17.8, 16 19 T 20 19 T 24 19 T 28 19 L 28 24 C 28 30, 24 32, 20 32 C 16 32, 12 30, 12 24 L 12 19 Z" fill="url(#liq)" stroke="none"/>
        <path d="M22 8 C 22 6, 24 4, 26 6"/><path d="M12 12 L12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L28 12"/><path d="M11 12 L29 12"/>
        <circle cx="17" cy="18" r="1.2" fill="#1AA0E6" stroke="none"/><circle cx="23" cy="18" r="1.2" fill="#1AA0E6" stroke="none"/><path d="M18 22 Q 20 24, 22 22"/>
      </svg>
      <div><b>BeakerBot</b><div class="sub">your lab copilot</div></div>
    </div>
    <div class="body">
      <div class="uq">Plan my qPCR run for Friday</div>
      <div class="embed plan">
        <div class="eh">Experiment plan<span class="tag">running</span></div>
        <div class="pstep p1"><span class="dot"><span class="ck c1">&#10003;</span></span>Reserve the qPCR machine, Fri 9 to 11am</div>
        <div class="pstep p2"><span class="dot"><span class="ck c2">&#10003;</span></span>Prep reagent mix, 24 wells plus controls</div>
        <div class="pstep p3"><span class="dot"><span class="ck c3">&#10003;</span></span>Add to GANTT and notify the lab</div>
        <div class="pbar"><div class="pfill"></div></div>
      </div>
      <div class="embed result">
        <div class="eh">Reagent volumes (uL)<span class="tag">chart</span></div>
        <div class="chart"><div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div><div class="bar b4"></div></div>
      </div>
    </div>
    <div class="input"><span class="typed">Plan my qPCR run for Friday</span><span class="send">&#8593;</span></div>
  </div>
</div>
</body>
</html>
