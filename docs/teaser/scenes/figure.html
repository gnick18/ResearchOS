<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scene: Figure Composer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#eef2f9;color:#15243b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{width:860px;max-width:94vw;transform-origin:center;animation:push 1.0s cubic-bezier(.4,0,.2,1) 2.9s forwards}
  .card{background:#fff;border:1px solid #e2e8f3;border-radius:20px;box-shadow:0 24px 60px rgba(20,40,80,.10);overflow:hidden}

  /* Header */
  .hd{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid #eef1f7}
  .hd-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1aa0e6 0%,#D6B5F0 100%);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .hd b{font-size:17px;font-weight:600}.hd .sub{font-size:13px;color:#7a869b}
  .hd-right{margin-left:auto}
  .badge{font-size:11px;font-weight:600;color:#7c4ddd;background:#f0ebff;padding:3px 10px;border-radius:999px}

  /* Canvas area: pasteboard + page sheet */
  .canvas-area{background:#e8ecf3;padding:18px 24px 22px;display:flex;justify-content:center}
  .page-sheet{background:#fff;border:1px solid #d8dee9;box-shadow:0 4px 18px rgba(0,0,0,.18);border-radius:4px;width:700px;height:380px;position:relative;overflow:hidden}

  /* Panel slots */
  .panel{position:absolute;border-radius:6px;overflow:hidden;border:1.5px solid #e2e8f3;background:#fafbfe;opacity:0;transform:scale(.72) translateY(18px)}
  /* staggered slide-in for 4 panels */
  .pa{animation:panel-in .42s cubic-bezier(.2,.9,.3,1) .30s forwards}
  .pb{animation:panel-in .42s cubic-bezier(.2,.9,.3,1) .52s forwards}
  .pc{animation:panel-in .42s cubic-bezier(.2,.9,.3,1) .74s forwards}
  .pd{animation:panel-in .42s cubic-bezier(.2,.9,.3,1) .96s forwards}

  /* Panel A: top-left, bar chart */
  .panel-a{left:20px;top:20px;width:306px;height:168px}
  /* Panel B: top-right, scatter / dot plot */
  .panel-b{left:342px;top:20px;width:338px;height:168px}
  /* Panel C: bottom-left, heatmap block */
  .panel-c{left:20px;top:204px;width:200px;height:156px}
  /* Panel D: bottom-right wide, labeled diagram */
  .panel-d{left:236px;top:204px;width:444px;height:156px}

  /* Panel letter labels (A/B/C/D) */
  .panel-letter{position:absolute;top:5px;left:7px;font-size:13px;font-weight:800;color:#15243b;letter-spacing:-.01em;opacity:0;animation:fade .25s ease forwards}
  .la{animation-delay:.72s}.lb{animation-delay:.94s}.lc{animation-delay:1.16s}.ld{animation-delay:1.38s}

  /* Panel inner visuals */
  .panel-inner{width:100%;height:100%;padding:20px 12px 10px;position:relative}

  /* Bar chart (Panel A) */
  .bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 8px}
  .bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .bar-rect{width:100%;border-radius:4px 4px 0 0;transform:scaleY(0);transform-origin:bottom}
  .bar-label{font-size:9px;color:#7a869b;font-weight:500}
  .b1{animation:bar-grow .35s cubic-bezier(.2,.9,.3,1) 1.0s forwards}
  .b2{animation:bar-grow .35s cubic-bezier(.2,.9,.3,1) 1.1s forwards}
  .b3{animation:bar-grow .35s cubic-bezier(.2,.9,.3,1) 1.2s forwards}
  .b4{animation:bar-grow .35s cubic-bezier(.2,.9,.3,1) 1.3s forwards}
  .b5{animation:bar-grow .35s cubic-bezier(.2,.9,.3,1) 1.4s forwards}
  .axis-line{height:1px;background:#e2e8f3;margin:0 8px}
  .panel-title{font-size:10px;font-weight:700;color:#3a475c;letter-spacing:.03em;text-transform:uppercase;margin-bottom:6px;padding-left:8px}

  /* Scatter (Panel B) */
  .scatter{position:relative;height:120px;margin:0 6px}
  .dot{position:absolute;border-radius:50%;opacity:0;transform:scale(0)}
  .d1{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.05s forwards}
  .d2{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.12s forwards}
  .d3{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.19s forwards}
  .d4{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.26s forwards}
  .d5{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.33s forwards}
  .d6{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.40s forwards}
  .d7{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.47s forwards}
  .d8{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.54s forwards}
  .d9{animation:dot-pop .3s cubic-bezier(.2,1.4,.4,1) 1.61s forwards}
  .scatter-axis-x{position:absolute;bottom:0;left:0;right:0;height:1px;background:#e2e8f3}
  .scatter-axis-y{position:absolute;top:0;bottom:0;left:0;width:1px;background:#e2e8f3}

  /* Heatmap (Panel C) */
  .heatmap{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:4px}
  .heat-cell{border-radius:3px;height:20px;opacity:0;transform:scale(.5)}
  /* cells fade in in waves */
  .hc1{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.1s forwards}
  .hc2{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.15s forwards}
  .hc3{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.2s forwards}
  .hc4{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.25s forwards}
  .hc5{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.3s forwards}
  .hc6{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.35s forwards}
  .hc7{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.4s forwards}
  .hc8{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.45s forwards}
  .hc9{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.5s forwards}
  .hc10{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.55s forwards}
  .hc11{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.6s forwards}
  .hc12{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.65s forwards}
  .hc13{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.7s forwards}
  .hc14{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.75s forwards}
  .hc15{animation:cell-pop .2s cubic-bezier(.2,1.3,.4,1) 1.8s forwards}
  .row-label{font-size:8px;color:#7a869b;writing-mode:horizontal-tb;margin-right:3px;font-weight:500}
  .hmap-row{display:flex;align-items:center;gap:2px;padding:0 4px}

  /* Labeled diagram (Panel D) */
  .diagram{position:relative;height:110px;margin:0 10px}
  .diag-circle{position:absolute;border-radius:50%;opacity:0;transform:scale(.4)}
  .circ1{animation:cell-pop .38s cubic-bezier(.2,1.3,.4,1) 1.1s forwards}
  .circ2{animation:cell-pop .38s cubic-bezier(.2,1.3,.4,1) 1.24s forwards}
  .circ3{animation:cell-pop .38s cubic-bezier(.2,1.3,.4,1) 1.38s forwards}
  .diag-line{position:absolute;height:2px;background:#e2e8f3;transform-origin:left center;opacity:0}
  .dl1{animation:line-in .3s ease 1.55s forwards}
  .dl2{animation:line-in .3s ease 1.65s forwards}
  .diag-tag{position:absolute;font-size:9px;font-weight:700;color:#3a475c;background:#f0f4fb;border:1px solid #e2e8f3;border-radius:4px;padding:2px 6px;opacity:0;white-space:nowrap}
  .dt1{animation:fade .25s ease 1.72s forwards}
  .dt2{animation:fade .25s ease 1.82s forwards}
  .dt3{animation:fade .25s ease 1.92s forwards}

  /* Snap guides: horizontal + vertical dashed guide lines that appear briefly */
  .guide-h{position:absolute;left:10px;right:10px;height:1px;border-top:1.5px dashed #1283c9;opacity:0;top:50%}
  .guide-v{position:absolute;top:10px;bottom:10px;width:1px;border-left:1.5px dashed #1283c9;opacity:0;left:50%}
  .guide-h{animation:guide-flash .4s ease 1.50s forwards}
  .guide-v{animation:guide-flash .4s ease 1.55s forwards}

  /* Export badge that fades in at 2.2s */
  .export-bar{display:flex;align-items:center;gap:10px;padding:10px 22px;border-top:1px solid #eef1f7;opacity:0;animation:fade .35s ease 2.2s forwards}
  .export-bar .note{font-size:12px;color:#7a869b}
  .export-bar .exp-btn{margin-left:auto;font-size:12px;font-weight:700;color:#1283c9;background:#e6f1fb;padding:4px 12px;border-radius:999px;border:none;cursor:default}

  @keyframes panel-in{to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes fade{to{opacity:1}}
  @keyframes bar-grow{to{transform:scaleY(1)}}
  @keyframes dot-pop{to{opacity:1;transform:scale(1)}}
  @keyframes cell-pop{to{opacity:1;transform:scale(1)}}
  @keyframes line-in{to{opacity:1}}
  @keyframes guide-flash{0%{opacity:0} 30%{opacity:.7} 100%{opacity:0}}
  @keyframes push{to{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="scene">
  <div class="card">

    <!-- Header -->
    <div class="hd">
      <div class="hd-icon">
        <!-- figure-composer icon: 4-panel grid -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#fff" opacity=".95"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#fff" opacity=".85"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#fff" opacity=".85"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="#fff" opacity=".75"/>
        </svg>
      </div>
      <div><b>Figure Composer</b><div class="sub">Flux vs. substrate, 4-panel figure</div></div>
      <div class="hd-right"><span class="badge">Ready to export</span></div>
    </div>

    <!-- Canvas: pasteboard with page sheet -->
    <div class="canvas-area">
      <div class="page-sheet">

        <!-- Snap guides (flash briefly at ~1.5s) -->
        <div class="guide-h"></div>
        <div class="guide-v"></div>

        <!-- Panel A: bar chart (top-left) -->
        <div class="panel panel-a pa">
          <div class="panel-letter la">A</div>
          <div class="panel-inner">
            <div class="panel-title">Enzyme activity</div>
            <div class="bars">
              <div class="bar-col">
                <div class="bar-rect b1" style="height:68px;background:#B7EBB1"></div>
                <div class="bar-label">WT</div>
              </div>
              <div class="bar-col">
                <div class="bar-rect b2" style="height:92px;background:#A6D2F4"></div>
                <div class="bar-label">R42A</div>
              </div>
              <div class="bar-col">
                <div class="bar-rect b3" style="height:48px;background:#FFD2B0"></div>
                <div class="bar-label">K78E</div>
              </div>
              <div class="bar-col">
                <div class="bar-rect b4" style="height:106px;background:#D6B5F0"></div>
                <div class="bar-label">OE</div>
              </div>
              <div class="bar-col">
                <div class="bar-rect b5" style="height:34px;background:#FFF1A8"></div>
                <div class="bar-label">KO</div>
              </div>
            </div>
            <div class="axis-line"></div>
          </div>
        </div>

        <!-- Panel B: scatter plot (top-right) -->
        <div class="panel panel-b pb">
          <div class="panel-letter lb">B</div>
          <div class="panel-inner">
            <div class="panel-title">Flux vs. substrate (mM)</div>
            <div class="scatter">
              <div class="scatter-axis-x"></div>
              <div class="scatter-axis-y"></div>
              <!-- dots: left%, bottom%, size, color -->
              <div class="dot d1" style="left:8%;bottom:18%;width:10px;height:10px;background:#A6D2F4"></div>
              <div class="dot d2" style="left:18%;bottom:32%;width:12px;height:12px;background:#A6D2F4"></div>
              <div class="dot d3" style="left:30%;bottom:50%;width:11px;height:11px;background:#B7EBB1"></div>
              <div class="dot d4" style="left:42%;bottom:62%;width:10px;height:10px;background:#B7EBB1"></div>
              <div class="dot d5" style="left:54%;bottom:72%;width:13px;height:13px;background:#D6B5F0"></div>
              <div class="dot d6" style="left:65%;bottom:78%;width:10px;height:10px;background:#D6B5F0"></div>
              <div class="dot d7" style="left:74%;bottom:84%;width:11px;height:11px;background:#FFD2B0"></div>
              <div class="dot d8" style="left:82%;bottom:88%;width:12px;height:12px;background:#FFD2B0"></div>
              <div class="dot d9" style="left:90%;bottom:91%;width:10px;height:10px;background:#FFF1A8"></div>
            </div>
          </div>
        </div>

        <!-- Panel C: heatmap (bottom-left) -->
        <div class="panel panel-c pc">
          <div class="panel-letter lc">C</div>
          <div class="panel-inner" style="padding:20px 8px 6px">
            <div class="panel-title">Gene expression</div>
            <div style="display:flex;flex-direction:column;gap:3px">
              <div class="hmap-row">
                <div class="row-label">FKS1</div>
                <div class="heatmap" style="flex:1">
                  <div class="heat-cell hc1" style="background:#B7EBB1;opacity:.9"></div>
                  <div class="heat-cell hc2" style="background:#A6D2F4;opacity:.7"></div>
                  <div class="heat-cell hc3" style="background:#D6B5F0;opacity:.5"></div>
                  <div class="heat-cell hc4" style="background:#FFD2B0;opacity:.8"></div>
                  <div class="heat-cell hc5" style="background:#FFF1A8;opacity:.6"></div>
                </div>
              </div>
              <div class="hmap-row">
                <div class="row-label">ERG6</div>
                <div class="heatmap" style="flex:1">
                  <div class="heat-cell hc6" style="background:#D6B5F0;opacity:.8"></div>
                  <div class="heat-cell hc7" style="background:#B7EBB1;opacity:.6"></div>
                  <div class="heat-cell hc8" style="background:#A6D2F4;opacity:.9"></div>
                  <div class="heat-cell hc9" style="background:#FFF1A8;opacity:.7"></div>
                  <div class="heat-cell hc10" style="background:#FFD2B0;opacity:.5"></div>
                </div>
              </div>
              <div class="hmap-row">
                <div class="row-label">YPT7</div>
                <div class="heatmap" style="flex:1">
                  <div class="heat-cell hc11" style="background:#FFD2B0;opacity:.6"></div>
                  <div class="heat-cell hc12" style="background:#D6B5F0;opacity:.9"></div>
                  <div class="heat-cell hc13" style="background:#FFF1A8;opacity:.5"></div>
                  <div class="heat-cell hc14" style="background:#B7EBB1;opacity:.8"></div>
                  <div class="heat-cell hc15" style="background:#A6D2F4;opacity:.7"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Panel D: labeled diagram (bottom-right) -->
        <div class="panel panel-d pd">
          <div class="panel-letter ld">D</div>
          <div class="panel-inner" style="padding:20px 14px 6px">
            <div class="panel-title">Signaling pathway</div>
            <div class="diagram">
              <!-- circles representing pathway nodes -->
              <div class="diag-circle circ1" style="width:56px;height:56px;background:#A6D2F4;top:10px;left:20px"></div>
              <div class="diag-circle circ2" style="width:50px;height:50px;background:#D6B5F0;top:18px;left:160px"></div>
              <div class="diag-circle circ3" style="width:46px;height:46px;background:#B7EBB1;top:22px;left:290px"></div>
              <!-- connecting lines -->
              <div class="diag-line dl1" style="top:36px;left:76px;width:84px;transform:rotate(-2deg)"></div>
              <div class="diag-line dl2" style="top:40px;left:210px;width:80px;transform:rotate(-4deg)"></div>
              <!-- labels -->
              <div class="diag-tag dt1" style="top:72px;left:10px">Receptor</div>
              <div class="diag-tag dt2" style="top:72px;left:148px">Kinase</div>
              <div class="diag-tag dt3" style="top:72px;left:278px">Target</div>
            </div>
          </div>
        </div>

      </div><!-- end page-sheet -->
    </div><!-- end canvas-area -->

    <!-- Export bar -->
    <div class="export-bar">
      <span class="note">4-panel figure, 6.5 x 3.8 in</span>
      <div class="exp-btn">Export SVG</div>
    </div>

  </div>
</div>
</body>
</html>
