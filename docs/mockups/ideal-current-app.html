<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ResearchOS mobile, current-app ideals</title>
<style>
  :root{
    --sky:#1AA0E6; --purple:#5B47D6; --ink:#0b1320; --ink-2:#3c4656; --ink-3:#8a93a3;
    --bg:#f2f3f7; --group:#ffffff; --sep:rgba(60,67,86,.10);
    --card-shadow:0 1px 2px rgba(16,24,40,.05), 0 8px 24px rgba(16,24,40,.06);
    --tabbar:rgba(248,249,252,.72);
    --ok:#1a9c5b; --ok-bg:#e4f7ec; --danger:#e5484d; --danger-bg:#fdecec; --warn:#d98a0b; --warn-bg:#fdf3e2;
    --r1:#FFD2B0; --r2:#FFF1A8; --r3:#B7EBB1; --r4:#A6D2F4; --r5:#D6B5F0;
    --radius:18px; --page:#e9ebf1;
  }
  [data-theme="dark"]{
    --sky:#3aa6e8; --purple:#8170e6; --ink:#f5f7fb; --ink-2:#c3ccda; --ink-3:#7e8696;
    --bg:#000000; --group:#15171c; --sep:rgba(255,255,255,.10);
    --card-shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.5);
    --tabbar:rgba(22,24,30,.66);
    --ok:#3ddc8c; --ok-bg:rgba(45,160,100,.18); --danger:#ff6b6f; --danger-bg:rgba(229,72,77,.16); --warn:#f4b740; --warn-bg:rgba(217,138,11,.18);
    --r1:#F97316; --r2:#E8920B; --r3:#16A34A; --r4:#0284C7; --r5:#9333EA; --page:#0a0b0e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .top{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--page) 88%,transparent);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sep);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.02em}.top .sub{font-size:12.5px;color:var(--ink-3)}
  .spacer{flex:1}
  .tbtn{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--sep);background:var(--group);color:var(--ink);border-radius:980px;padding:8px 15px;cursor:pointer}
  .tbtn.brand{background:linear-gradient(135deg,var(--sky),var(--purple));color:#fff;border:none}
  .legend{display:flex;gap:12px;font-size:12px;color:var(--ink-3);align-items:center;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}.dot.ok{background:#1a9c5b}.dot.warn{background:#d98a0b}.dot.none{background:#c4ccd6}
  .wrap{max-width:1200px;margin:0 auto;padding:20px 20px 120px}
  .intro{font-size:13px;color:var(--ink-2);max-width:900px;line-height:1.6;margin:8px 0 6px}
  .grid{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start;margin-top:16px;justify-content:center}
  .cell{width:330px}
  .cap{display:flex;align-items:baseline;gap:8px;margin:0 2px 9px}.cap .n{font-size:14px;font-weight:700}.cap .d{font-size:12px;color:var(--ink-3)}
  .badge{font-size:10.5px;font-weight:700;border-radius:980px;padding:2px 8px}
  .badge.new{background:color-mix(in srgb,var(--purple) 16%,transparent);color:var(--purple)}
  .badge.chg{background:var(--warn-bg);color:var(--warn)}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}
  .phone{width:330px;height:680px;border-radius:46px;background:var(--bg);position:relative;overflow:hidden;border:10px solid #0c0d10;box-shadow:0 30px 60px rgba(16,24,40,.22),0 6px 16px rgba(16,24,40,.12)}
  [data-theme="dark"] .phone{border-color:#23262d}
  .phone::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5));z-index:20}
  .scr{position:absolute;inset:0;display:flex;flex-direction:column}
  .statusbar{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:13px;font-weight:600}
  .statusbar .r{display:flex;gap:6px;align-items:center}
  .content{flex:1;overflow:hidden;position:relative}
  .scroll{position:absolute;inset:0;overflow:auto;padding:0 18px 96px}.scroll::-webkit-scrollbar{display:none}
  .rainbow{height:4px;background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5))}
  .largetitle{font-size:32px;font-weight:800;letter-spacing:-.03em;margin:6px 2px 4px}
  .subtitle{font-size:14px;color:var(--ink-3);margin:0 2px 16px;line-height:1.45}
  .group{background:var(--group);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:16px}
  .row{display:flex;align-items:center;gap:13px;padding:14px 16px;position:relative}
  .row + .row::before{content:"";position:absolute;top:0;left:52px;right:0;height:1px;background:var(--sep)}
  .row .ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
  .row .tx{flex:1;min-width:0}.row .t{font-size:15px;font-weight:600;letter-spacing:-.01em}.row .s{font-size:12.5px;color:var(--ink-3);margin-top:1px}
  .chev{color:var(--ink-3);opacity:.5}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:980px}.pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.muted{background:var(--sep);color:var(--ink-3)}.pill.danger{background:var(--danger-bg);color:var(--danger)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:15px;padding:15px;font:inherit;font-size:16px;font-weight:650;cursor:pointer;transition:transform .12s}
  .btn:active{transform:scale(.97)}.btn.primary{background:var(--sky);color:#fff}.btn.secondary{background:var(--group);color:var(--sky);box-shadow:var(--card-shadow)}.btn.tinted{background:color-mix(in srgb,var(--sky) 14%,transparent);color:var(--sky)}
  .sec-h{font-size:13px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em;margin:6px 8px 8px}
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:84px;background:var(--tabbar);backdrop-filter:saturate(180%) blur(22px);border-top:1px solid var(--sep);display:flex;padding:8px 2px 26px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-3);font-size:10px;font-weight:600}.tab.active{color:var(--sky)}.tab svg{width:24px;height:24px}
  .bot .eye{transform-box:fill-box;transform-origin:center;animation:blink 5.2s infinite}@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  .botwrap{animation:sway 6.5s ease-in-out infinite;transform-origin:50% 90%}@keyframes sway{0%,100%{transform:translateY(0) rotate(-1.6deg)}50%{transform:translateY(-1.5%) rotate(1.6deg)}}
  .splash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .rainbowbg{position:absolute;inset:0;background:linear-gradient(100deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5));opacity:.9}
  .lockup{position:relative;display:flex;align-items:center;gap:16px;z-index:2}.lockup .wm{font-size:34px;font-weight:800;letter-spacing:-.03em;color:#0b1320}
  /* hub tabs */
  .display{font-size:52px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;text-align:center;color:var(--sky)}.display .hint{display:block;font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.08em;margin-top:2px}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:8px}.key{aspect-ratio:1.7;border:1px solid var(--sep);background:var(--group);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:600;font-variant-numeric:tabular-nums}
  .qr{width:168px;height:168px;display:grid;grid-template-columns:repeat(13,1fr);gap:2px;background:#fff;padding:11px;border-radius:16px;margin:0 auto}.qr i{background:#0b1320;border-radius:1px}.qr i.off{background:transparent}
  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin:2px 2px 16px}.chip{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--group);box-shadow:var(--card-shadow);border-radius:980px;padding:7px 12px;display:flex;align-items:center;gap:6px}
  .thumb{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#23304a,#0e1626);flex-shrink:0}
  /* calc tabs */
  .ctabs{display:flex;gap:7px;overflow:auto;padding:2px 2px 12px}.ctabs::-webkit-scrollbar{display:none}
  .ctab{flex:0 0 auto;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:980px;background:var(--group);box-shadow:var(--card-shadow);color:var(--ink-2);white-space:nowrap}
  .ctab.on{background:var(--sky);color:#fff;box-shadow:none}
  .field{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;position:relative}.field+.field::before{content:"";position:absolute;top:0;left:16px;right:0;height:1px;background:var(--sep)}
  .field .l{font-size:14px;font-weight:500}.field .v{font-size:15px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:6px}
  .field .u{font-size:11px;font-weight:700;color:var(--sky);background:color-mix(in srgb,var(--sky) 12%,transparent);border-radius:7px;padding:3px 7px}
  .result{background:linear-gradient(135deg,color-mix(in srgb,var(--sky) 12%,transparent),color-mix(in srgb,var(--purple) 10%,transparent));border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px}
  .result .big{font-size:30px;font-weight:800;letter-spacing:-.02em}.result .lab{font-size:12px;color:var(--ink-3);margin-top:2px}
  .validated{font-size:11.5px;color:var(--ok);display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:14px}
  /* wiki */
  .search{display:flex;align-items:center;gap:9px;background:var(--group);box-shadow:var(--card-shadow);border-radius:13px;padding:11px 14px;margin-bottom:6px;color:var(--ink-3);font-size:15px}
  .ask{display:flex;align-items:center;gap:8px;border-radius:13px;padding:12px 14px;margin:8px 2px 16px;background:linear-gradient(135deg,color-mix(in srgb,var(--sky) 14%,transparent),color-mix(in srgb,var(--purple) 12%,transparent));font-size:13.5px;font-weight:600}
  /* bulk */
  .selgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
  .selcell{aspect-ratio:1;border-radius:12px;background:linear-gradient(135deg,#23304a,#0e1626);position:relative;overflow:hidden}
  .selcell .ck{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--sky);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 0 0 2px #fff}
  .selcell.off .ck{background:rgba(255,255,255,.5);box-shadow:0 0 0 2px rgba(255,255,255,.7)}
  .review{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--sep);border-radius:9px;overflow:hidden}.seg button{font:inherit;font-size:12px;padding:6px 11px;border:none;background:var(--group);color:var(--ink-3);cursor:pointer}.seg button.on.ok{background:#1a9c5b;color:#fff}.seg button.on.warn{background:#d98a0b;color:#fff}.seg button.on.none{background:#64748b;color:#fff}
  .cmt{width:100%;margin-top:8px;font:inherit;font-size:12.5px;border:1px dashed var(--sep);border-radius:9px;background:var(--group);color:var(--ink);padding:8px 10px;resize:vertical;min-height:30px}
  .why{font-size:12px;color:var(--ink-2);line-height:1.5;margin:8px 2px 0;border-left:2px solid var(--sky);padding-left:10px}
  svg{display:block}
  #exm{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}#exm .box{background:var(--group);border-radius:16px;max-width:680px;width:100%;padding:18px;border:1px solid var(--sep)}#exm textarea{width:100%;min-height:240px;font-family:ui-monospace,Menlo,monospace;font-size:12px;border:1px solid var(--sep);border-radius:8px;background:var(--bg);color:var(--ink);padding:10px}

:root{--coral:#FF6F61;--amber:#F59E0B}</style></head><body><div class="wrap"><div class="grid" id="grid"></div></div><script>
function bot(size){return `<span class="bot botwrap" style="width:${size*0.78}px;height:${size}px"><svg viewBox="8 0 24 34" width="${size*0.78}" height="${size}" fill="none"><defs><linearGradient id="liq" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--r1)"/><stop offset=".25" stop-color="var(--r2)"/><stop offset=".5" stop-color="var(--r3)"/><stop offset=".75" stop-color="var(--r4)"/><stop offset="1" stop-color="var(--r5)"/></linearGradient></defs><path d="M13 12 L13 27 Q13 31 17 31 L23 31 Q27 31 27 27 L27 12 Z" fill="#fff"/><path d="M13 21 L13 27 Q13 31 17 31 L23 31 Q27 31 27 27 L27 21 Z" fill="url(#liq)"/><path d="M11 12 L29 12" stroke="var(--sky)" stroke-width="2" stroke-linecap="round"/><path d="M13 12 L13 27 Q13 31 17 31 L23 31 Q27 31 27 27 L27 12" stroke="var(--sky)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 8 C 22 5, 25 3, 27 6" stroke="var(--sky)" stroke-width="2" stroke-linecap="round"/><circle class="eye" cx="17.5" cy="18" r="1.25" fill="var(--sky)"/><circle class="eye" cx="22.5" cy="18" r="1.25" fill="var(--sky)"/><path d="M17.5 22 Q20 24.5 22.5 22" stroke="var(--sky)" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg></span>`;}
const I={
 cam:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.3"/></svg>',
 lib:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>',
 chev:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
 sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>',
 send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>',
 calc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M8 11h0M12 11h0M16 11h0M8 15h0M12 15h0M16 15v2"/></svg>',
 timer:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>',
 book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M19 19v2"/></svg>',
 srch:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
 spark:'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"/></svg>',
 check:'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
 ok:'<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
 bolt:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>',
};
function sb(){return `<div class="statusbar"><span>9:41</span><span class="r">${I.bolt}<svg width="17" height="12" viewBox="0 0 24 16" fill="currentColor"><rect x="0" y="6" width="4" height="10" rx="1"/><rect x="6" y="3" width="4" height="13" rx="1"/><rect x="12" y="0" width="4" height="16" rx="1"/></svg></span></div>`;}

I.note='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4a2 2 0 0 1 2-2h8l4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/><path d="M9 8h5M9 12h7M9 16h4"/></svg>';
I.box='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg>';
I.edit='<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
function tabbar5(active){const t=[['notebook','Notebook',I.note],['inventory','Inventory',I.box],['calc','Calc',I.calc],['timer','Timer',I.timer],['wiki','Wiki',I.book]];return `<div class="tabbar">${t.map(x=>`<div class="tab ${x[0]===active?'active':''}">${x[2]}<span>${x[1]}</span></div>`).join('')}</div>`;}
function keycell(lab,bg,col,fs){return `<div style="aspect-ratio:1.35;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:${fs||20}px;font-weight:600;background:${bg};color:${col};box-shadow:var(--card-shadow)">${lab}</div>`;}

const screens=[{n:'Notebook',html:`<div class="scr">${sb()}<div class="content"><div class="scroll" style="padding-top:8px"><div class="largetitle">Notebook</div><div class="subtitle">Capture the bench into your lab notebook.</div><div class="group"><div class="row"><span class="ico" style="background:var(--ok)">${I.ok}</span><div class="tx"><div class="t">Tremblay Lab</div><div class="s">Connected</div></div><span style="color:var(--sky);font-size:13px;font-weight:600">Unpair</span></div></div><div style="display:flex;gap:11px;margin-bottom:11px"><button class="btn primary" style="flex:1;flex-direction:column;gap:6px;padding:18px 12px">${I.cam}<span style="font-size:15px">Take a photo</span></button><button class="btn" style="flex:1;flex-direction:column;gap:6px;padding:18px 12px;background:var(--coral);color:#fff">${I.edit}<span style="font-size:15px">Quick note</span></button></div><button class="btn secondary" style="margin-bottom:18px;color:var(--amber)">${I.lib} Upload from camera roll</button><div class="sec-h" style="display:flex;justify-content:space-between"><span>Outbox</span><span style="color:var(--sky)">Send all</span></div><div class="group"><div class="row"><span class="thumb"></span><div class="tx"><div class="t">Post-trypsin suspension</div><div class="s">6:42 PM</div></div><span class="pill muted">Queued</span></div><div class="row"><span class="thumb"></span><div class="tx"><div class="t">Plate 4 brightfield, GFP</div><div class="s">6:42 PM</div></div><span class="pill muted">Queued</span></div></div></div></div>${tabbar5('notebook')}</div>`},{n:'Inventory',html:`<div class="scr">${sb()}<div class="content"><div class="scroll" style="padding-top:8px"><div class="largetitle">Inventory</div><div class="subtitle">Track stock and reorder from the bench.</div><div class="sec-h" style="display:flex;justify-content:space-between"><span>Tracked items</span><span style="color:var(--amber)">Reorder low</span></div><div class="group"><div class="row"><span rgb,var(--sky) 12%,transparent)'};color:${i===0?'#fff':'var(--sky)'}">${f}</span>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px">${keycell('AC','var(--coral)','#fff',18)}${keycell('del','var(--sky)','#fff',18)}${keycell('Ans','var(--sky)','#fff',18)}${keycell('÷','color-mix(in srgb,var(--sky) 12%,transparent)','var(--sky)')}${keycell('7','var(--group)','var(--ink)')}${keycell('8','var(--group)','var(--ink)')}${keycell('9','var(--group)','var(--ink)')}${keycell('×','color-mix(in srgb,var(--sky) 12%,transparent)','var(--sky)')}${keycell('4','var(--group)','var(--ink)')}${keycell('5','var(--group)','var(--ink)')}${keycell('6','var(--group)','var(--ink)')}${keycell('−','color-mix(in srgb,var(--sky) 12%,transparent)','var(--sky)')}${keycell('1','var(--group)','var(--ink)')}${keycell('2','var(--group)','var(--ink)')}${keycell('3','var(--group)','var(--ink)')}${keycell('+','color-mix(in srgb,var(--sky) 12%,transparent)','var(--sky)')}<div style="grid-column:span 2;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;background:var(--group);box-shadow:var(--card-shadow)">0</div>${keycell('.','var(--group)','var(--ink)')}${keycell('=','var(--amber)','#fff',22)}</div></div></div>${tabbar5('calc')}</div>`},{n:'Timer',html:`<div class="scr">${sb()}<div class="content"><div class="scroll" style="padding-top:8px"><div class="largetitle">Timers</div><div class="subtitle">Start a countdown and get an alert when it finishes.</div><div class="group" style="padding:15px 16px"><div style="display:flex;align-items:center;gap:13px"><span class="ico" style="background:var(--amber)">${I.timer}</span><div class="tx"><div class="t" style="font-size:21px;font-variant-numeric:tabular-nums">08:24</div><div class="s">Gel running</div></div><span style="color:var(--coral);font-size:13px;font-weight:600">Stop</span></div></div><div class="sec-h">Quick start</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 2px 16px">${['1 min','5 min','10 min','30 min','1 hr'].map(t=>`<span style="font-size:13px;font-weight:600;color:var(--sky);border:1px solid color-mix(in srgb,var(--sky) 38%,transparent);border-radius:980px;padding:8px 14px">${t}</span>`).join('')}</div><div class="display" style="font-size:42px">00:00:00<span class="hint">HOURS : MIN : SEC</span></div><div class="keypad" style="margin-top:12px">${['1','2','3','4','5','6','7','8','9','00','0','del'].map(k=>`<div class="key">${k}</div>`).join('')}</div></div></div>${tabbar5('timer')}</div>`},{n:'Wiki',html:`<div class="scr">${sb()}<div class="content"><div class="scroll" style="padding-top:8px"><div class="largetitle">Wiki</div><div class="subtitle">Guides and help, searchable across every page.</div><div class="search">${I.srch} Search the wiki...</div><div class="ask">${I.spark} Ask: how do I pair my phone?</div><div class="sec-h">Start here</div><div class="group"><div class="row"><span class="ico" style="background:var(--sky)">${I.book}</span><div class="tx"><div class="t">Read this one first</div><div class="s">The 7 things worth knowing up front</div></div>${I.chev}</div></div><div class="sec-h">Getting started</div><div class="group"><div class="row"><div class="tx"><div class="t">Overview</div></div>${I.chev}</div><div class="row"><div class="tx"><div class="t">Connecting your folder</div></div>${I.chev}</div><div class="row"><div class="tx"><div class="t">Creating a user</div></div>${I.chev}</div></div></div></div>${tabbar5('wiki')}</div>`}];

</script></body></html>
