<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Freehand tool icon — 5 options</title>
<style>
  :root[data-theme="light"] {
    --surface-raised:#fff; --surface-sunken:#f8fafc; --foreground:#171717;
    --foreground-muted:#6b7280; --border:#e5e7eb; --page:#eef2f7;
  }
  :root[data-theme="dark"] {
    --surface-raised:#131c2e; --surface-sunken:#0d1424; --foreground:#f1f5f9;
    --foreground-muted:#b4bfd0; --border:rgba(255,255,255,.22); --page:#0a0e1a;
  }
  :root { --brand-action:#1283c9; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--page); color:var(--foreground); padding:32px; }
  h1 { font-size:20px; margin:0 0 4px; }
  p { color:var(--foreground-muted); margin:0 0 24px; font-size:14px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; max-width:1100px; }
  .card { background:var(--surface-raised); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:0 8px 24px -12px rgba(2,8,23,.3); }
  .card h2 { font-size:14px; margin:0 0 2px; }
  .card .sub { font-size:12px; color:var(--foreground-muted); margin:0 0 14px; }
  .row { display:flex; align-items:center; gap:14px; }
  /* toolbar-accurate button */
  .tbtn { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:9px;
    color:var(--foreground-muted); background:transparent; }
  .tbtn.active { background:var(--brand-action); color:#fff; }
  .big { width:56px; height:56px; color:var(--foreground); }
  .big svg { width:34px; height:34px; }
  .toolbar { display:flex; gap:6px; align-items:center; background:var(--surface-sunken); border:1px solid var(--border);
    border-radius:12px; padding:6px 8px; margin-top:14px; }
  .toolbar .ctx { color:var(--foreground-muted); }
  .toggle { position:fixed; top:16px; right:16px; display:flex; gap:6px; background:var(--surface-raised);
    border:1px solid var(--border); border-radius:999px; padding:6px; box-shadow:0 8px 24px -12px rgba(2,8,23,.4); }
  .toggle button { border:0; cursor:pointer; border-radius:999px; padding:6px 14px; font-weight:600; font-size:13px;
    background:transparent; color:var(--foreground-muted); }
  .toggle button.on { background:var(--brand-action); color:#fff; }
  svg { display:block; }
</style>
</head>
<body>
  <div class="toggle">
    <button id="tl" class="on" onclick="setT('light')">Light</button>
    <button id="td" onclick="setT('dark')">Dark</button>
  </div>

  <h1>Freehand tool icon — 5 options</h1>
  <p>Each shown at real toolbar size (inactive + active) and enlarged. The other toolbar icons are inline SVGs too (not in the brand library); say the word and I can give the same treatment to any of them. Tell me the option number you want.</p>

  <div class="grid" id="grid"></div>

  <script>
    const ic = 'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"';
    const options = [
      { name: "1. Current (squiggle wave)", note: "what ships now",
        path: `<path d="M4 18c3 .5 4-3 6-3s2 2 4 1 3-7 6-7"/>` },
      { name: "2. Pencil on a stroke", note: "pencil tip drawing a line",
        path: `<path d="M14.5 4.5l5 5"/><path d="M17 3l4 4-10 10-4 1 1-4z"/><path d="M3 21c2-1 4-1 6 0"/>` },
      { name: "3. Scribble loop", note: "hand-drawn loose scribble",
        path: `<path d="M4 16c2-6 5 4 7-1s4-7 6-3-2 7 1 7"/>` },
      { name: "4. Fountain-pen nib", note: "nib + drawn curve",
        path: `<path d="M5 19c3 0 5-2 7-5"/><path d="M13 13l5-9 3 3-9 5z"/><path d="M13 13l2 2"/>` },
      { name: "5. Marker stroke", note: "felt-tip drawing a wavy mark",
        path: `<path d="M3 20q4-1.5 8 0t8 0"/><path d="M15.5 5.5l3 3"/><path d="M9 14l6-8 3 3-8 6-3 1z"/>` },
    ];

    const grid = document.getElementById('grid');
    for (const o of options) {
      const svg = (cls) => `<svg ${ic} class="${cls}" width="18" height="18">${o.path}</svg>`;
      grid.insertAdjacentHTML('beforeend', `
        <div class="card">
          <h2>${o.name}</h2>
          <div class="sub">${o.note}</div>
          <div class="row">
            <div class="tbtn">${svg('')}</div>
            <div class="tbtn active">${svg('')}</div>
            <div class="big"><svg ${ic}>${o.path}</svg></div>
          </div>
          <div class="toolbar">
            <span class="ctx tbtn"><svg ${ic} width="18" height="18"><path d="M5 3l6 18 2.5-7.5L21 11z"/></svg></span>
            <span class="ctx tbtn"><svg ${ic} width="18" height="18"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg></span>
            <span class="tbtn active">${svg('')}</span>
            <span class="ctx tbtn"><svg ${ic} width="18" height="18"><path d="M12 3l8 6-3 9H7L4 9z"/></svg></span>
            <span class="ctx tbtn"><svg ${ic} width="18" height="18"><path d="M5 6h14M12 6v12M9 18h6"/></svg></span>
          </div>
        </div>`);
    }

    function setT(t){ document.documentElement.setAttribute('data-theme', t);
      document.getElementById('tl').classList.toggle('on', t==='light');
      document.getElementById('td').classList.toggle('on', t==='dark'); }
  </script>
</body>
</html>
