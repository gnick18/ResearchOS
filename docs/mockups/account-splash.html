<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ResearchOS splash - liquid fill (polished)</title>
<style>
  /* Branded palette (verbatim from mobile/lib/design.ts) */
  :root{
    --canvas:#E6F4FE;        /* skyLight - the branded light canvas */
    --canvas-deep:#d4ecfb;   /* a hair deeper for a soft radial */
    --sky:#1AA0E6;           /* BeakerBot signature */
    --ink:#0c1830;           /* wordmark on light (SuccessBurst wordColor) */
    --muted:#6b7280;
    --elev-border:#d4e2ee;
    /* soft pastel ramp matches the liquid inside the beaker, used everywhere */
    --liquid:linear-gradient(180deg,#FFD2B0,#FFF1A8,#B7EBB1,#A6D2F4,#D6B5F0);
    --liquid-h:linear-gradient(95deg,#FFD2B0,#FFF1A8,#B7EBB1,#A6D2F4,#D6B5F0);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}

  .stage{position:fixed;inset:0;display:grid;place-items:center;
    background:radial-gradient(120% 110% at 50% 38%, #ffffff 0%, var(--canvas) 46%, var(--canvas-deep) 100%);}
  .stage::before{content:"";position:absolute;inset:0;opacity:.5;
    background-image:radial-gradient(rgba(26,160,230,.14) 1.1px,transparent 1.1px);background-size:30px 30px}

  .center{position:relative;display:flex;flex-direction:column;align-items:center;z-index:2}

  .bot{width:min(32vmin,290px);height:auto;overflow:visible;
    filter:drop-shadow(0 10px 24px rgba(26,160,230,.22))}
  .outline path,.outline circle{stroke:var(--sky);fill:none}
  .draw{stroke-dasharray:120;stroke-dashoffset:120;animation:draw .8s cubic-bezier(.65,0,.2,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .face{opacity:0;animation:faceOn .45s cubic-bezier(.2,.8,.2,1) forwards;animation-delay:1.55s}
  @keyframes faceOn{from{opacity:0;transform:translateY(1px) scale(.85)}to{opacity:1;transform:none}}
  .eye{transform-box:fill-box;transform-origin:center}
  .blink{animation:blink 4.2s 2.4s infinite}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}

  .wm{margin-top:4.5vmin;font-size:min(7vmin,54px);font-weight:800;letter-spacing:-.022em;color:var(--ink);
    opacity:0;transform:translateY(16px);animation:rise .7s cubic-bezier(.16,.84,.24,1) forwards;animation-delay:1.75s}
  .wm .os{background:var(--liquid-h);-webkit-background-clip:text;background-clip:text;color:transparent}
  @keyframes rise{to{opacity:1;transform:none}}
  .tag{margin-top:1.4vmin;color:var(--muted);font-size:min(2.3vmin,16px);opacity:0;
    animation:rise .7s ease forwards;animation-delay:1.95s}

  .pct{position:fixed;right:5vmin;bottom:4.2vmin;color:var(--sky);font-size:min(8.5vmin,86px);font-weight:800;
    letter-spacing:-.03em;z-index:2;font-variant-numeric:tabular-nums;opacity:.9;transition:opacity .35s}
  .pct.hide{opacity:0}
  .pct b{font-size:.45em;font-weight:700;color:var(--muted);margin-left:.15em;vertical-align:.25em}

  /* exit rainbow flood with a wavy crest */
  .flood{position:fixed;left:0;bottom:0;width:100%;height:0;z-index:5;background:var(--liquid);pointer-events:none}
  .flood svg{position:absolute;top:-4.2vmin;left:0;width:100%;height:4.4vmin}

  .reveal{position:fixed;inset:0;z-index:1;display:grid;place-items:center;opacity:0;
    background:radial-gradient(120% 110% at 50% 38%, #fff 0%, var(--canvas) 60%, var(--canvas-deep) 100%)}
  .reveal h2{font-size:min(4vmin,30px);font-weight:800;color:var(--ink);margin:0 0 3vmin;text-align:center}
  .reveal .tiles{display:flex;gap:2vmin}
  .reveal .t{width:min(26vmin,210px);height:min(23vmin,196px);border-radius:16px;border:1.5px solid var(--elev-border);
    background:#fff;box-shadow:0 14px 40px rgba(26,160,230,.12);display:flex;flex-direction:column;justify-content:flex-end;padding:3vmin}
  .reveal .t b{font-size:min(2.6vmin,18px);color:var(--ink)}
  .reveal .t span{font-size:min(1.9vmin,13px);color:var(--muted);margin-top:.5vmin}
  .reveal .dot{width:38px;height:38px;border-radius:11px;margin-bottom:auto}

  .controls{position:fixed;left:4vmin;bottom:4vmin;z-index:30;display:flex;gap:10px;align-items:center}
  .btn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;padding:8px 14px;
    border:1px solid var(--elev-border);background:#fff;color:var(--ink);box-shadow:0 2px 10px rgba(26,160,230,.10)}
  .btn:hover{border-color:var(--sky)}
  .btn.on{background:var(--sky);color:#fff;border-color:var(--sky)}
  .label{color:var(--muted);font-size:12px;margin-right:2px}
  .note{position:fixed;top:3vmin;left:50%;transform:translateX(-50%);z-index:30;color:var(--muted);font-size:13px;
    background:#fff;padding:7px 14px;border-radius:999px;box-shadow:0 2px 12px rgba(26,160,230,.14)}

  @media (prefers-reduced-motion:reduce){
    .draw,.face,.wm,.tag{animation:none!important;opacity:1!important;stroke-dashoffset:0!important;transform:none!important}
  }
</style>
</head>
<body>
<div class="note">Liquid fill &middot; polished &middot; branded light canvas (#E6F4FE)</div>

<div class="stage">
  <div class="center">
    <svg class="bot" viewBox="6 1 28 34" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFD2B0"/><stop offset="25%" stop-color="#FFF1A8"/>
          <stop offset="50%" stop-color="#B7EBB1"/><stop offset="75%" stop-color="#A6D2F4"/>
          <stop offset="100%" stop-color="#D6B5F0"/>
        </linearGradient>
        <clipPath id="inside">
          <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z"/>
        </clipPath>
      </defs>

      <!-- white beaker body so it reads on the light canvas -->
      <path d="M 12 12 L 12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L 28 12 Z" fill="#fff"/>

      <!-- rising rainbow liquid, clipped to the interior, 3 wave layers -->
      <g clip-path="url(#inside)">
        <g id="water" transform="translate(0,22)">
          <path id="w1" d="M-12,3 Q -7,0.6 -2,3 T 8,3 T 18,3 T 28,3 T 38,3 T 48,3 L48,34 L-12,34 Z" fill="url(#liq)"/>
          <path id="w2" d="M-12,3 Q -7,5 -2,3 T 8,3 T 18,3 T 28,3 T 38,3 T 48,3 L48,34 L-12,34 Z" fill="url(#liq)" opacity=".55"/>
          <path id="w3" d="M-12,2.6 Q -7,4.4 -2,2.6 T 8,2.6 T 18,2.6 T 28,2.6 T 38,2.6 T 48,2.6 L48,34 L-12,34 Z" fill="url(#liq)" opacity=".35"/>
        </g>
      </g>

      <!-- outline draws on (sky), neck spout + body + lip -->
      <g class="outline" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path class="draw" d="M22 8 C 22 6, 24 4, 26 6"/>
        <path class="draw" style="animation-delay:.1s" d="M12 12 L12 24 C 12 30, 16 32, 20 32 C 24 32, 28 30, 28 24 L28 12"/>
        <path class="draw" style="animation-delay:.24s" d="M11 12 L29 12"/>
      </g>
      <!-- face wakes -->
      <g class="face">
        <circle class="eye blink" cx="17" cy="18" r="1.25" fill="var(--sky)" stroke="none"/>
        <circle class="eye blink" cx="23" cy="18" r="1.25" fill="var(--sky)" stroke="none"/>
        <path d="M18 22 Q 20 24, 22 22" stroke="var(--sky)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </svg>

    <div class="wm">Research<span class="os">OS</span></div>
    <div class="tag">Your lab, your data, your machine.</div>
  </div>

  <div class="pct" id="pct">0<b>%</b></div>
</div>

<!-- exit flood -->
<div class="flood" id="flood">
  <svg viewBox="0 0 120 12" preserveAspectRatio="none"><path d="M0,12 V6 Q15,0 30,6 T60,6 T90,6 T120,6 V12 Z" fill="#FFD2B0"/></svg>
</div>

<!-- revealed chooser -->
<div class="reveal" id="reveal">
  <div>
    <h2>How will you use ResearchOS?</h2>
    <div class="tiles">
      <div class="t"><div class="dot" style="background:#9ca3af"></div><b>Just me, local</b><span>Free &middot; fully on your disk</span></div>
      <div class="t"><div class="dot" style="background:var(--sky)"></div><b>Free account</b><span>Free &middot; share externally</span></div>
      <div class="t"><div class="dot" style="background:#5B47D6"></div><b>Lab</b><span>Paid &middot; team + cloud</span></div>
    </div>
  </div>
</div>

<div class="controls">
  <span class="label">Speed</span>
  <button class="btn on" data-spd="1">1x</button>
  <button class="btn" data-spd="2">0.5x</button>
  <button class="btn" id="replay" style="margin-left:8px">&#8635; Replay</button>
</div>

<script>
const water=document.getElementById('water'), pct=document.getElementById('pct');
const flood=document.getElementById('flood'), reveal=document.getElementById('reveal');
const w1=document.getElementById('w1'), w2=document.getElementById('w2'), w3=document.getElementById('w3');
let speed=1, timers=[], raf=null, t0=0;

function clearAll(){timers.forEach(clearTimeout);timers=[];if(raf)cancelAnimationFrame(raf)}
function T(fn,ms){timers.push(setTimeout(fn,ms*speed))}
function dur(ms){return ms*speed}

// continuous meniscus drift (3 layers, different phase/speed)
function waveLoop(now){
  const t=now/ (380*speed);
  w1.setAttribute('transform',`translate(${Math.sin(t)*2.2},0)`);
  w2.setAttribute('transform',`translate(${Math.sin(t+1.7)*-2.6},0)`);
  w3.setAttribute('transform',`translate(${Math.sin(t+3.1)*1.6},0)`);
  raf=requestAnimationFrame(waveLoop);
}
function level(y){water.setAttribute('transform',`translate(0,${y})`)}

function run(){
  clearAll();
  reveal.style.transition='none'; reveal.style.opacity=0;
  flood.style.transition='none'; flood.style.height='0'; flood.style.opacity='1';
  pct.classList.remove('hide'); pct.innerHTML='0<b>%</b>';
  level(22);
  // restart CSS-driven bits
  document.querySelectorAll('.draw,.face,.wm,.tag').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation=''});
  raf=requestAnimationFrame(waveLoop);

  // fill + percentage tied together (SPYLT): starts ~.45s, runs ~1.7s
  const fillStart=450, fillDur=1700;
  T(()=>{
    const start=performance.now();
    function fill(now){
      const k=Math.min(1,(now-start)/dur(fillDur));
      const e=1-Math.pow(1-k,2.2);           // easeOut
      level(22-22*e);
      pct.innerHTML=Math.round(e*100)+'<b>%</b>';
      if(k<1) timers.push(requestAnimationFrame(fill));
    }
    requestAnimationFrame(fill);
  }, fillStart);

  // exit rainbow flood after wordmark settles
  const exitAt=2550;
  T(()=>{
    pct.classList.add('hide');
    reveal.style.transition=`opacity ${dur(550)}ms ease ${dur(200)}ms`; reveal.style.opacity=1;
    flood.style.transition=`height ${dur(950)}ms cubic-bezier(.72,0,.2,1)`; flood.style.height='135%';
  }, exitAt);
  T(()=>{ flood.style.transition=`opacity ${dur(450)}ms ease`; flood.style.opacity='0'; }, exitAt+1050);
}

document.querySelectorAll('.btn[data-spd]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.btn[data-spd]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); speed=+b.dataset.spd; run();
});
document.getElementById('replay').onclick=run;
run();
</script>
</body>
</html>
