<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PI Mode, a lab-first experience, decisions</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --raised:#ffffff; --sunken:#eef1f5;
    --ink:#111827; --muted:#6b7280; --faint:#9ca3af; --border:#e5e7eb;
    --sky:#1AA0E6; --action:#1283C9; --amber:#F59E0B; --coral:#FF6F61; --green:#16a34a; --red:#dc2626; --violet:#5B47D6;
    --chipbg:#eef2f7;
  }
  .dark{
    --bg:#0a0e1a; --panel:#1c2638; --raised:#1c2638; --sunken:#141b2b;
    --ink:#e7ecf3; --muted:#9aa6b8; --faint:#6b7890; --border:#2a3650;
    --chipbg:#28344c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Inter,system-ui,sans-serif}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .spacer{margin-left:auto}
  button.tool{background:var(--sunken);color:var(--ink);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer}
  button.tool:hover{border-color:var(--action)}
  .estat{font-size:12px;color:var(--muted)}

  /* shell layout */
  .shell{display:flex;max-width:1280px;margin:0 auto;align-items:flex-start}
  nav.rail{position:sticky;top:55px;width:212px;flex:none;padding:20px 12px 60px;align-self:flex-start}
  nav.rail .rgroup{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:700;margin:14px 10px 6px}
  nav.rail a{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:9px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
  nav.rail a:hover{background:var(--sunken);color:var(--ink)}
  nav.rail a.on{background:var(--chipbg);color:var(--ink)}
  nav.rail a .num{margin-left:auto;font-size:10px;font-weight:700;color:#fff;background:var(--action);border-radius:999px;padding:1px 7px;min-width:18px;text-align:center}
  nav.rail a.done .num{background:var(--green)}
  main{flex:1;min-width:0;padding:24px 22px 110px;max-width:1040px}

  .surface{display:none}
  .surface.active{display:block}
  h2.surftitle{font-size:20px;margin:0 0 4px;font-weight:800;letter-spacing:-.3px}
  .lead{color:var(--muted);font-size:13px;max-width:780px;margin:2px 0 18px}
  .rationale{background:var(--sunken);border:1px solid var(--border);border-left:3px solid var(--action);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--muted);margin:0 0 18px}
  .rationale b{color:var(--ink)}

  /* before/after screens */
  .ba{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
  @media (max-width:880px){.ba{grid-template-columns:1fr}}
  .screen{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .scaph{padding:9px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px;background:var(--sunken)}
  .scaph .tag{margin-left:auto;font-size:10px;font-weight:700;border-radius:999px;padding:2px 9px}
  .tag.before{background:var(--chipbg);color:var(--muted)}
  .tag.after{background:var(--sky);color:#fff}
  .scbody{padding:13px;display:flex;flex-direction:column;gap:9px}

  /* generic UI sketch atoms */
  .cardrow{border:1px solid var(--border);border-radius:10px;padding:9px 11px;background:var(--raised)}
  .ttl{font-weight:700;font-size:12.5px}
  .meta{color:var(--faint);font-size:11px;margin-top:2px}
  .pi-uniform{border:1px solid var(--border);border-radius:10px;background:var(--raised)}
  .pi-uniform .ph{padding:8px 11px;border-bottom:1px solid var(--border);font-weight:700;font-size:12px;background:var(--sunken);border-radius:10px 10px 0 0}
  .pi-uniform .pb{padding:9px 11px;color:var(--muted);font-size:11.5px}
  .dim{color:var(--faint);font-size:11px}

  /* nav lineup chips */
  .navset{display:flex;flex-wrap:wrap;gap:6px}
  .navchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:600;background:var(--raised)}
  .navchip.on{background:var(--chipbg);border-color:var(--action);color:var(--ink)}
  .navchip.muteit{color:var(--faint);opacity:.7}
  .navchip .sq{width:13px;height:13px;display:grid;place-items:center;color:var(--muted)}
  .moretag{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 2px}
  .mywork{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--action);border-radius:999px;padding:5px 12px;font-size:11.5px;font-weight:700;background:rgba(18,131,201,.08);color:var(--action)}
  .seg2{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;font-size:11px;font-weight:700}
  .seg2 span{padding:5px 12px;background:var(--raised);color:var(--muted)}
  .seg2 span.on{background:var(--action);color:#fff}

  /* needs-you hero */
  .hero{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--raised)}
  .hero .hh{padding:8px 12px;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);background:rgba(245,158,11,.10);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:11px}
  .htile{border:1px solid var(--border);border-radius:9px;padding:9px 10px;background:var(--panel);display:flex;flex-direction:column;gap:2px}
  .htile .big{font-size:20px;font-weight:800;line-height:1}
  .htile .lbl{font-size:11px;color:var(--muted);font-weight:600}
  .htile.amber .big{color:var(--amber)}.htile.red .big{color:var(--red)}.htile.sky .big{color:var(--sky)}.htile.violet .big{color:var(--violet)}

  .strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .stat{border:1px solid var(--border);border-radius:9px;padding:8px 9px;background:var(--raised);text-align:center}
  .stat .n{font-size:16px;font-weight:800}.stat .k{font-size:10px;color:var(--faint);font-weight:600;margin-top:1px}

  .feedrow{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
  .feedrow:last-child{border-bottom:none}
  .av{width:24px;height:24px;border-radius:999px;flex:none;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff}
  .feedrow .ft{font-size:12px}.feedrow .fm{font-size:10.5px;color:var(--faint)}

  .person{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border)}
  .person:last-child{border-bottom:none}
  .person .pn{font-size:12px;font-weight:600}.person .pr{font-size:10.5px;color:var(--faint)}
  .bar{height:6px;border-radius:999px;background:var(--sunken);overflow:hidden;flex:1;max-width:90px;margin-left:auto}
  .bar i{display:block;height:100%;background:var(--action)}
  .badge{font-size:9.5px;font-weight:700;border-radius:999px;padding:2px 7px}
  .b-ok{background:rgba(22,163,74,.14);color:var(--green)}
  .b-warn{background:rgba(245,158,11,.16);color:#b45309}
  .dark .b-warn{color:#fbbf24}
  .b-miss{background:rgba(220,38,38,.13);color:var(--red)}

  /* tabs */
  .tabs{display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:7px}
  .tab{padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:700;color:var(--muted)}
  .tab.on{background:var(--chipbg);color:var(--ink)}
  .tab.mut{color:var(--faint);opacity:.7}

  /* approvals queue */
  .qrow{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:9px;padding:8px 10px;background:var(--raised)}
  .qico{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff;flex:none}
  .qico.buy{background:var(--amber)}.qico.sup{background:var(--sky)}.qico.flag{background:var(--coral)}
  .qact{margin-left:auto;display:flex;gap:5px}
  .mini{font-size:10px;font-weight:700;border-radius:7px;padding:4px 9px;border:1px solid var(--border);background:var(--panel);color:var(--muted)}
  .mini.go{background:var(--green);color:#fff;border-color:var(--green)}
  .scatter{display:flex;gap:7px;flex-wrap:wrap}
  .scatter .route{border:1px dashed var(--border);border-radius:8px;padding:6px 9px;font-size:11px;color:var(--muted);background:var(--sunken)}

  /* funding */
  .grant{border:1px solid var(--border);border-radius:10px;padding:10px 11px;background:var(--raised)}
  .grant .gt{font-weight:700;font-size:12.5px}.grant .gs{font-size:10.5px;color:var(--faint);margin-top:1px}
  .gbar{height:8px;border-radius:999px;background:var(--sunken);overflow:hidden;margin-top:7px}
  .gbar i{display:block;height:100%}
  .gnum{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:4px}

  /* concise after-direction cards */
  .dir{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:6px 0 24px}
  .dircard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
  .dircard h3{margin:0 0 3px;font-size:13.5px;font-weight:800}
  .dircard .ds{font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .dircard p{margin:0;font-size:12px;color:var(--muted)}

  /* decision blocks */
  .dwrap{margin-top:8px}
  .dhead{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:26px 0 6px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:11px}
  .card .top{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .did{font-size:10.5px;color:var(--faint);font-weight:700}
  .ctitle{font-weight:700;font-size:13.5px;letter-spacing:-.1px}
  .rec{margin-left:auto;font-size:10px;font-weight:800;color:#fff;background:var(--green);border-radius:999px;padding:2px 8px}
  .why{font-size:12px;color:var(--muted);margin:3px 0 4px}
  .why b{color:var(--ink)}
  .decide{display:flex;align-items:center;gap:9px;margin-top:9px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--muted);border:none;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer}
  .seg button+button{border-left:1px solid var(--border)}
  .seg button.on[data-v="approve"]{background:var(--green);color:#fff}
  .seg button.on[data-v="modify"]{background:var(--amber);color:#1a1205}
  .seg button.on[data-v="reject"]{background:var(--red);color:#fff}
  .decide input{flex:1;min-width:190px;background:var(--sunken);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--ink);font-size:12px}
  .qopen{font-size:11px;color:var(--action);font-weight:700;margin:14px 0 4px}
  .foot{color:var(--faint);font-size:11px;text-align:center;margin-top:36px}
  code{background:var(--chipbg);border-radius:5px;padding:1px 5px;font-size:12px}
  svg.ic{width:14px;height:14px;display:block}
</style>
</head>
<body>
<header>
  <div>
    <h1>PI Mode, a lab-first experience across every surface</h1>
    <div class="sub">Pick a surface on the left, review each before to after change, approve or mark up. Decisions persist locally. Export when done and paste back into chat.</div>
  </div>
  <div class="spacer"></div>
  <span class="estat" id="estat">No decisions yet</span>
  <button class="tool" id="themeBtn">Toggle dark</button>
  <button class="tool" id="exportBtn">Export decisions</button>
</header>

<div class="shell">
  <nav class="rail" id="rail"></nav>
  <main id="main"></main>
</div>

<script>
// ───────────────────────────────────────────────────────────────────────────
// Small inline icon set (no emoji). Returns an SVG string.
// ───────────────────────────────────────────────────────────────────────────
function ic(name){
  const s='stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  const M={
    home:`<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>`,
    people:`<circle cx="9" cy="8" r="3"/><path d="M2 21v-1a5 5 0 0 1 10 0v1"/><path d="M16 8a3 3 0 1 0-1-5.8"/><path d="M22 21v-1a5 5 0 0 0-4-4.9"/>`,
    work:`<path d="M9 3h6"/><path d="M10 3v6.5L4.5 18a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 9.5V3"/><path d="M7 14h10"/>`,
    check:`<path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/>`,
    activity:`<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>`,
    fund:`<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2.5 2 0 0 1 5 0c0 2-5 2-5 4a2.5 2 0 0 0 5 0"/>`,
    flask:`<path d="M9 3h6"/><path d="M10 3v6.5L4.5 18a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 9.5V3"/>`,
    cal:`<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>`,
    gantt:`<path d="M4 6h10M4 12h7M4 18h13"/>`,
    box:`<path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/>`,
    note:`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>`,
    shield:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
    flag:`<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/>`,
    at:`<circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>`,
    clock:`<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>`,
    arrow:`<path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>`,
    grid:`<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>`,
    link:`<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>`
  };
  return `<svg class="ic" viewBox="0 0 24 24" ${s} aria-hidden="true">${M[name]||''}</svg>`;
}
function av(initials,color){return `<span class="av" style="background:${color}">${initials}</span>`;}

// ───────────────────────────────────────────────────────────────────────────
// Surfaces. Each has: id, label, navIcon, decisions[], and a render() of the
// before/after sketch + rationale.
// FakeYeast lab: Mira PI, Alex & Nia postdocs, Morgan & Sam grads,
// Remy/Theo/Ivy undergrads.
// ───────────────────────────────────────────────────────────────────────────
const C={mira:'#1283C9',alex:'#0ea5a3',nia:'#5B47D6',morgan:'#F59E0B',sam:'#FF6F61',remy:'#16a34a',theo:'#8b5cf6',ivy:'#ec4899'};

const SURFACES=[
{
  id:"nav", label:"Global nav", icon:"grid",
  lead:"The researcher tab list today versus a PI-first lineup, with a persistent My work toggle and the researcher-only tabs dropping to More.",
  rationale:"<b>Why:</b> a PI account inherits the bench-researcher nav and never uses half of it. PI Mode reorders the primary tabs to the lab-oversight surfaces a PI actually lives in, and keeps the personal workspace one click away via My work for the PIs who still bench.",
  render:()=>`
    <div class="ba">
      <div class="screen">
        <div class="scaph">Today, the researcher tab list <span class="tag before">Before</span></div>
        <div class="scbody">
          <div class="dim">Same lineup for everyone, the only PI adaptation is Home relabeled to Lab Overview.</div>
          <div class="navset">
            ${['Lab Overview','Workbench','GANTT','Methods','Sequences','Chemistry','Data Hub','Inventory','Purchases','Calendar','Links'].map((t,i)=>`<span class="navchip ${i===0?'on':''}"><span class="sq">${ic(i===0?'home':'work')}</span>${t}</span>`).join('')}
          </div>
          <div class="dim" style="margin-top:6px">Approvals, roster, lab browse, audit, funding are not in the nav. They are reached by stray link-outs from Lab Overview, or by typing the route.</div>
        </div>
      </div>
      <div class="screen">
        <div class="scaph">PI Mode, the lab-first lineup <span class="tag after">After</span></div>
        <div class="scbody">
          <div class="navset">
            <span class="navchip on"><span class="sq">${ic('home')}</span>Lab Overview</span>
            <span class="navchip"><span class="sq">${ic('people')}</span>People</span>
            <span class="navchip"><span class="sq">${ic('work')}</span>Lab Work</span>
            <span class="navchip"><span class="sq">${ic('check')}</span>Approvals <b style="color:var(--amber)">3</b></span>
            <span class="navchip"><span class="sq">${ic('activity')}</span>Activity</span>
            <span class="navchip"><span class="sq">${ic('fund')}</span>Funding</span>
          </div>
          <div class="moretag">More</div>
          <div class="navset">
            ${['Methods','Calendar','GANTT','Inventory','Data Hub','Sequences','Chemistry','Links','Compliance'].map(t=>`<span class="navchip muteit"><span class="sq">${ic('box')}</span>${t}</span>`).join('')}
          </div>
          <div style="margin-top:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="mywork">${ic('work')} My work</span>
            <span class="dim">Switches to the personal researcher tabs. The mode is remembered.</span>
          </div>
        </div>
      </div>
    </div>`,
  decisions:[
    {id:"NAV-1",title:"PI-first primary lineup and order",rec:true,
     why:"The six primary tabs become Lab Overview, People, Lab Work, Approvals, Activity, Funding, in that order. This is the locked nav lineup from the IA. Researcher-only tabs drop to More."},
    {id:"NAV-2",title:"My work toggle is a persistent header chip",rec:true,
     why:"A single labeled chip in the header (not buried in More, not an account-menu switch) flips a PI to the personal researcher tab set and back. The chosen mode is remembered across sessions. Open question O4 asks if header chip is the right home for it."},
    {id:"NAV-3",title:"Researcher-only tabs move to a More overflow",rec:true,
     why:"Sequences, Chemistry, Data Hub, GANTT, Inventory, Links, Compliance stay reachable under More rather than crowding the PI primary lineup. Nothing is removed."}
  ]
},
{
  id:"overview", label:"Lab Overview", icon:"home",
  lead:"The current uniform card stack versus a command center that leads with what needs the PI.",
  rationale:"<b>Why:</b> today the landing is a vertical run of same-weight cards (action bar, link-outs, PI tools, Announcements, an embedded roster, then feeds). Nothing is prioritized, and the roster is buried mid-page. The command center promotes a Needs-you hero, a compact stat strip, then the activity feed beside a people snapshot, so a PI sees the actionable items first.",
  render:()=>`
    <div class="ba">
      <div class="screen">
        <div class="scaph">Today, a uniform card stack <span class="tag before">Before</span></div>
        <div class="scbody">
          <div class="pi-uniform"><div class="ph">What needs you</div><div class="pb">3 approvals, 1 flagged, 2 mentions, an amber action bar</div></div>
          <div class="pi-uniform"><div class="ph">Link-outs</div><div class="pb">Browse lab experiments, Browse lab notes</div></div>
          <div class="pi-uniform"><div class="ph">PI tools</div><div class="pb">Lab roster, Audit trail, Pending approvals, Flag queue</div></div>
          <div class="pi-uniform"><div class="ph">Announcements</div><div class="pb">Composer plus recent posts</div></div>
          <div class="pi-uniform"><div class="ph">Lab roster</div><div class="pb">Embedded full roster, the whole team, mid-page</div></div>
          <div class="pi-uniform"><div class="ph">Lab activity, Today, Workload</div><div class="pb">Feed plus right rail, at the very bottom</div></div>
          <div class="dim">Every block is the same weight. The reader scrolls to find what matters.</div>
        </div>
      </div>
      <div class="screen">
        <div class="scaph">PI Mode, the command center <span class="tag after">After</span></div>
        <div class="scbody">
          <div class="hero">
            <div class="hh">${ic('shield')} Needs you</div>
            <div class="hgrid">
              <div class="htile amber"><span class="big">3</span><span class="lbl">approvals pending</span></div>
              <div class="htile red"><span class="big">1</span><span class="lbl">flagged record</span></div>
              <div class="htile sky"><span class="big">2</span><span class="lbl">at-mentions</span></div>
              <div class="htile violet"><span class="big">2</span><span class="lbl">blocked or overdue</span></div>
            </div>
          </div>
          <div class="strip">
            <div class="stat"><div class="n">8</div><div class="k">members</div></div>
            <div class="stat"><div class="n">14</div><div class="k">in flight</div></div>
            <div class="stat"><div class="n">5</div><div class="k">notes this wk</div></div>
            <div class="stat"><div class="n">2</div><div class="k">grants</div></div>
          </div>
          <div class="cardrow" style="display:grid;grid-template-columns:1.4fr 1fr;gap:12px">

const OPENQ={
  nav:"Open question O4, exact My work toggle placement, header chip versus the More menu versus an account-menu switch.",
  labwork:"Open question O1, does Lab Work fully replace the Workbench label for a PI, or is Workbench kept and re-tabbed?",

// ───────────────────────────────────────────────────────────────────────────
// Harness
// ───────────────────────────────────────────────────────────────────────────
const KEY="piModeDecisions";
const DEC=JSON.parse(localStorage.getItem(KEY)||"{}");
const ALLD=SURFACES.flatMap(s=>s.decisions);
let active=SURFACES[0].id;
function save(){localStorage.setItem(KEY,JSON.stringify(DEC));stat();renderRail();}

function renderRail(){
  document.getElementById("rail").innerHTML=
    `<div class="rgroup">Full before to after</div>`+
    SURFACES.slice(0,6).map(railLink).join("")+
    `<div class="rgroup">After direction</div>`+
    SURFACES.slice(6).map(railLink).join("");
  document.querySelectorAll("nav.rail a").forEach(a=>a.onclick=()=>{active=a.dataset.id;renderRail();renderMain();window.scrollTo(0,0);});
}
function railLink(s){
  const total=s.decisions.length;
  const done=s.decisions.filter(d=>DEC[d.id]&&DEC[d.id].v).length;
  const allDone=done===total&&total>0;
  return `<a data-id="${s.id}" class="${active===s.id?'on':''} ${allDone?'done':''}">${ic(s.icon)}${s.label}<span class="num">${done}/${total}</span></a>`;
}

function renderMain(){
  const s=SURFACES.find(x=>x.id===active);
  let html=`<h2 class="surftitle">${s.label}</h2><p class="lead">${s.lead}</p>`+
    `<div class="rationale">${s.rationale}</div>`+
    s.render();
  if(OPENQ[s.id]) html+=`<div class="qopen">${OPENQ[s.id]}</div>`;
  html+=`<div class="dwrap"><div class="dhead">Decisions, mark up each</div>`+
    s.decisions.map(decCard).join("")+`</div>`;
  html+=`<div class="foot">Self-contained, nothing leaves your machine until you Export. PI Mode IA mockup, 2026-06-12.</div>`;
  document.getElementById("main").innerHTML=html;
  bind();
}
function decCard(d){
  const cur=DEC[d.id]||{};
  return `<div class="card">
    <div class="top"><span class="did">${d.id}</span><span class="ctitle">${d.title}</span>${d.rec?'<span class="rec">recommended</span>':'<span class="rec" style="background:var(--amber);color:#1a1205">your call</span>'}</div>
    <div class="why">${d.why}</div>
    <div class="decide">
      <span class="seg" data-id="${d.id}">
        <button data-v="approve" class="${cur.v==='approve'?'on':''}">Approve</button>
        <button data-v="modify" class="${cur.v==='modify'?'on':''}">Modify</button>
        <button data-v="reject" class="${cur.v==='reject'?'on':''}">Reject</button>
      </span>
      <input data-note="${d.id}" placeholder="note or what you would change (optional)" value="${(cur.note||'').replace(/"/g,'&quot;')}"/>
    </div>
  </div>`;
}
function bind(){
  document.querySelectorAll(".seg").forEach(seg=>{
    seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      const id=seg.dataset.id;DEC[id]=DEC[id]||{};DEC[id].v=b.dataset.v;
      seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");save();
    });
  });
  document.querySelectorAll("[data-note]").forEach(i=>i.oninput=()=>{
    const id=i.dataset.note;DEC[id]=DEC[id]||{};DEC[id].note=i.value;save();
  });
}
function stat(){
  const n=ALLD.filter(d=>DEC[d.id]&&DEC[d.id].v).length;
  document.getElementById("estat").textContent=n?`${n} of ${ALLD.length} decided`:"No decisions yet";
}

document.getElementById("themeBtn").onclick=()=>document.documentElement.classList.toggle("dark");
document.getElementById("exportBtn").onclick=()=>{
  const lines=["# PI Mode IA, decisions","",`_Marked up ${new Date().toISOString().slice(0,10)}_`,""];
  SURFACES.forEach(s=>{
    lines.push(`## ${s.label}`);
    s.decisions.forEach(d=>{
      const c=DEC[d.id]||{};
      const v=c.v?c.v.toUpperCase():"(undecided)";
      lines.push(`- ${d.id} ${d.title}  ->  ${v}${d.rec?"":" (your call)"}${c.note?"  Note: "+c.note:""}`);
    });
    lines.push("");
  });
  const txt=lines.join("\n");
  navigator.clipboard.writeText(txt).then(()=>{},()=>{});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([txt],{type:"text/markdown"}));
  a.download="pi-mode-decisions.md";a.click();
};

renderRail();renderMain();stat();
</script>
