<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BeakerBot tier illustrations</title>
<style>
  :root{
    --canvas:#E6F4FE; --canvas-deep:#d4ecfb; --sky:#1AA0E6; --ink:#0c1830; --muted:#6b7280;
    --elev-border:#d4e2ee; --surface:#fff; --coral:#FF6F61; --purple:#5B47D6;
  }
  [data-theme="dark"]{--canvas:#0a0e1a;--canvas-deep:#0d1424;--ink:#f1f5f9;--muted:#b4bfd0;--elev-border:#28344c;--surface:#1c2638}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 110% at 50% 30%, #fff 0%, var(--canvas) 55%, var(--canvas-deep) 100%);color:var(--ink)}
  [data-theme="dark"] body{background:radial-gradient(120% 110% at 50% 30%, #14203a 0%, var(--canvas) 60%, var(--canvas-deep) 100%)}
  .bar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--elev-border)}
  .bar h1{font-size:15px;margin:0;font-weight:800}
  .bar .s{font-size:12px;color:var(--muted)}
  .sp{flex:1}
  .btn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;padding:7px 12px;border:1px solid var(--elev-border);background:var(--surface);color:var(--ink)}
  .wrap{max-width:1000px;margin:0 auto;padding:30px 22px 60px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:30px 0 14px}
  .heroes{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .hero{background:var(--surface);border:1px solid var(--elev-border);border-radius:18px;padding:22px;text-align:center;box-shadow:0 12px 36px rgba(26,160,230,.10)}
  .hero svg{width:160px;height:160px}
  .hero b{display:block;margin-top:8px;font-size:15px}
  .hero span{font-size:12px;color:var(--muted)}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:6px}
  .tile{background:var(--surface);border:1.5px solid var(--elev-border);border-radius:16px;padding:20px;min-height:230px;display:flex;flex-direction:column;text-align:left;box-shadow:0 10px 30px rgba(26,160,230,.08)}
  .tile .art{width:92px;height:92px;margin-bottom:6px}
  .tile h3{margin:6px 0 2px;font-size:17px;font-weight:800}
  .tile .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;align-self:flex-start;margin-bottom:6px}
  .pill.free{background:rgba(22,163,74,.14);color:#16a34a}
  .pill.paid{background:rgba(91,71,214,.15);color:#5B47D6}
  .tile p{font-size:13px;color:var(--muted);margin:6px 0 0}
  /* comparison table */
  .cmp{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--elev-border);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(26,160,230,.08)}
  .cmp th,.cmp td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--elev-border);font-size:13px;vertical-align:middle}
  .cmp tbody tr:last-child td{border-bottom:none}
  .cmp thead th{background:var(--canvas);text-align:center}
  .cmp thead th:first-child{text-align:left}
  .cmp thead .art{width:46px;height:46px;display:block;margin:0 auto 2px}
  .cmp thead .tn{font-weight:800;font-size:15px}
  .cmp thead .tp{font-size:11px;font-weight:700;color:var(--muted)}
  .cmp td.feat{font-weight:600;color:var(--ink);width:40%}
  .cmp td.c{text-align:center}
  .yes{color:#16a34a;font-weight:800;font-size:15px}
  .no{color:#cbd5e1;font-size:15px}
  [data-theme="dark"] .no{color:#3a4a66}
  .val{color:var(--muted);font-size:12.5px}
  /* guidance cards */
  .guide{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .gcard{background:var(--surface);border:1px solid var(--elev-border);border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(26,160,230,.07)}
  .gcard .pick{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--sky)}
  .gcard h4{margin:4px 0 6px;font-size:16px;font-weight:800}
  .gcard p{margin:0;font-size:13px;color:var(--muted);line-height:1.55}
  .tipbar{margin-top:16px;background:var(--canvas);border:1px solid var(--elev-border);border-radius:12px;padding:13px 16px;font-size:13.5px;color:var(--ink)}
  .tipbar b{color:var(--sky)}
</style>
</head>
<body>
<div class="bar">
  <h1>BeakerBot tier illustrations</h1>
  <span class="s">distinct characters &middot; girl beaker, PI + team &mdash; built from the real BeakerBot geometry</span>
  <span class="sp"></span>
  <button class="btn" id="themeBtn">Dark</button>
</div>

<div class="wrap">
  <h2>The three illustrations</h2>
  <div class="heroes" id="heroes"></div>
  <h2>In the chooser tiles</h2>
  <div class="tiles" id="tiles"></div>

  <h2>Compare the tiers</h2>
  <table class="cmp"><thead id="cmpHead"></thead><tbody id="cmpBody"></tbody></table>

  <h2>Which tier is for you?</h2>
  <div class="guide" id="guide"></div>
  <div class="tipbar" id="tip"></div>
</div>

<script>
// reusable BeakerBot centered at (0,0); accessories make distinct characters.
// opts: {x,y,s,sw,gid, glasses, lips, lashes, bowtie, plain}
function bot(o={}){
  const {x=0,y=0,s=1,sw=1.4,gid='liq',glasses=false,lips=false,lashes=false,bowtie=false}=o;
  const liquid = `<path d="M -8 1 Q -6 -0.2, -4 1 T 0 1 T 4 1 T 8 1 L 8 6 C 8 12, 4 14, 0 14 C -4 14, -8 12, -8 6 L -8 1 Z" fill="url(#${gid})" stroke="none"/>`;
  // mouth: lips (coral) for the girl, otherwise the simple smile
  const mouth = lips
    ? `<path d="M -2.4 4 Q 0 6.6 2.4 4 Q 0 5.2 -2.4 4 Z" fill="var(--coral)" stroke="none"/>
       <path d="M -2.4 4 Q -1.2 3.2 0 4 Q 1.2 3.2 2.4 4" stroke="var(--coral)" stroke-width="0.5" fill="none"/>`
    : `<path d="M -2 4 Q 0 6, 2 4"/>`;
  const lash = lashes
    ? `<g stroke="var(--sky)" stroke-width="0.5" stroke-linecap="round">
        <path d="M -4.4 -1.3 l -0.9 -0.7"/><path d="M -3 -1.6 l -0.3 -0.9"/>
        <path d="M 4.4 -1.3 l 0.9 -0.7"/><path d="M 3 -1.6 l 0.3 -0.9"/></g>`
    : '';
  const specs = glasses
    ? `<g stroke="var(--sky)" stroke-width="0.7" fill="none">
        <circle cx="-3" cy="0" r="2.1"/><circle cx="3" cy="0" r="2.1"/>
        <path d="M -0.9 0 L 0.9 0"/><path d="M -5.1 -0.3 L -6.2 -0.7"/><path d="M 5.1 -0.3 L 6.2 -0.7"/></g>`
    : '';
  const tie = bowtie
    ? `<g fill="var(--purple)" stroke="none"><path d="M -2.4 -7 L 0 -6 L -2.4 -5 Z"/><path d="M 2.4 -7 L 0 -6 L 2.4 -5 Z"/><circle cx="0" cy="-6" r="0.7"/></g>`
    : '';
  return `<g transform="translate(${x} ${y}) scale(${s})" stroke="var(--sky)" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6 Z" fill="var(--surface)" stroke="none"/>
    ${liquid}
    <path d="M 2 -10 C 2 -12, 4 -14, 6 -12"/>
    <path d="M -8 -6 L -8 6 C -8 12, -4 14, 0 14 C 4 14, 8 12, 8 6 L 8 -6"/>
    <path d="M -9 -6 L 9 -6"/>
    <circle cx="-3" cy="0" r="1.2" fill="var(--sky)" stroke="none"/>
    <circle cx="3" cy="0" r="1.2" fill="var(--sky)" stroke="none"/>
    ${lash}${specs}${mouth}${tie}
    <path d="M -6 8 L -4.5 8"/><path d="M 4.5 8 L 6 8"/>
  </g>`;
}
const GRAD = id=>`<linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#FFD2B0"/><stop offset="25%" stop-color="#FFF1A8"/><stop offset="50%" stop-color="#B7EBB1"/>
  <stop offset="75%" stop-color="#A6D2F4"/><stop offset="100%" stop-color="#D6B5F0"/></linearGradient>`;

// 1. SOLO - plain BeakerBot alone
function solo(u){return `<svg viewBox="-24 -22 48 46" xmlns="http://www.w3.org/2000/svg">
  <defs>${GRAD('s1'+u)}</defs>
  <ellipse cx="0" cy="16" rx="11" ry="2.2" fill="var(--sky)" opacity=".10"/>
  ${bot({gid:'s1'+u})}
</svg>`}

// 2. FREE - girl BeakerBot (lips + lashes) at a laptop, sharing out
function comp(u){return `<svg viewBox="-26 -24 52 50" xmlns="http://www.w3.org/2000/svg">
  <defs>${GRAD('s2'+u)}${GRAD('s2b'+u)}</defs>
  <ellipse cx="0" cy="19" rx="17" ry="2.4" fill="var(--sky)" opacity=".10"/>
  ${bot({x:0,y:-5,s:.92,gid:'s2'+u})}
  <g stroke="var(--sky)" stroke-width="1.1" stroke-linecap="round" fill="none" opacity=".75">
    <path d="M 11 -12 q 4 0 4 4"/><path d="M 13.5 -13.5 q 6 0 6 6"/></g>
  <g stroke="var(--sky)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" fill="var(--surface)">
    <rect x="-11" y="6" width="22" height="13.5" rx="1.6"/>
    <path d="M -15 19.5 L 15 19.5 L 12.5 22.5 L -12.5 22.5 Z"/></g>
  <!-- the researcher being shared with, shown on screen: the girl beaker -->
  <g transform="translate(0 12.7) scale(.42)">${bot({liquid:true,gid:'s2b'+u,sw:2.0,lips:true,lashes:true})}</g>
</svg>`}

// 3. LAB - PI BeakerBot (bowtie, bigger) leading a team; one teammate has glasses
function lab(u){return `<svg viewBox="-28 -24 56 50" xmlns="http://www.w3.org/2000/svg">
  <defs>${GRAD('s3'+u)}${GRAD('s3l'+u)}${GRAD('s3r'+u)}</defs>
  <path d="M -22 18.5 L 22 18.5" stroke="var(--sky)" stroke-width="1.4" stroke-linecap="round"/>
  <ellipse cx="0" cy="19.6" rx="20" ry="1.8" fill="var(--sky)" opacity=".08"/>
  <!-- team: left has glasses, right is plain -->
  ${bot({x:-13.5,y:5.5,s:.5,gid:'s3l'+u,glasses:true})}
  ${bot({x:13.5,y:5.5,s:.5,gid:'s3r'+u})}
  <!-- the PI: just a bigger normal BeakerBot, front & center leading the team -->
  ${bot({x:0,y:1,s:1.12,gid:'s3'+u})}
</svg>`}

const DATA=[
  {key:'solo',art:solo,h:'Just me, local',pill:'free',price:'Free',p:'BeakerBot alone. Fully on your disk, no account.'},
  {key:'free',art:comp,h:'Free account',pill:'free',price:'Free',p:'BeakerBot at a computer, sharing out to other researchers.'},
  {key:'lab',art:lab,h:'Lab',pill:'paid',price:'Paid',p:'A PI BeakerBot leading a whole lab. Team + cloud.'},
];
document.getElementById('heroes').innerHTML = DATA.map(d=>`<div class="hero">${d.art(d.key)}<b>${d.h}</b><span>${d.p}</span></div>`).join('');
document.getElementById('tiles').innerHTML = DATA.map(d=>`<div class="tile"><div class="art">${d.art(d.key+'t')}</div><span class="pill ${d.pill}">${d.price}</span><h3>${d.h}</h3><p>${d.p}</p></div>`).join('');
// ---- comparison table ----
// each feature row: [label, local, free, lab]  (true/false = check/dash, string = value)
const FEAT=[
  ['The account itself','Free (no account)','Free','Free to create'],
  ['Sign-in required',false,'Yes (Google etc.)','Yes (Google etc.)'],
  ['Local-first: your data lives on your disk',true,true,true],
  ['Cloud is only an intermediary (relays sync/sharing)','Never used','For external sends','Keeps the team in sync'],
  ['Full app: Gantt, methods, notes, sequences, calculators',true,true,true],
  ['Works fully offline',true,true,'Local-first; collab needs internet'],
  ['Findable in the researcher directory',false,true,true],
  ['Send & receive notes / methods / files with outside researchers',false,true,true],
  ['Real-time co-editing inside a lab',false,false,true],
  ['Shared lab workspace + PI oversight',false,false,true],
  ['Sign in & restore on a new device',false,true,true],
  ['Free cloud (sharing + collab)','—','1 GB','1 GB per member (pooled)'],
  ['At the free cap','Never reached','Usage pauses, you are never billed','Usage pauses unless the cap is raised'],
  ['Want more (opt-in)','—','Raise your cap; pay only for what you use, up to a ceiling you set ($0.30/GB-mo)','PI raises one lab cap; one consolidated bill'],
  ['Upgrade later','Add an account or lab anytime','Create or join a lab anytime','—'],
];
function cell(v){
  if(v===true) return '<td class="c"><span class="yes">✓</span></td>';
  if(v===false) return '<td class="c"><span class="no">—</span></td>';
  return `<td class="c"><span class="val">${v}</span></td>`;
}
document.getElementById('cmpHead').innerHTML =
  `<tr><th></th>
    <th>${solo('h1')}<div class="tn">Just me, local</div><div class="tp">Free</div></th>
    <th>${comp('h2')}<div class="tn">Free account</div><div class="tp">Free</div></th>
    <th>${lab('h3')}<div class="tn">Lab</div><div class="tp">Paid</div></th></tr>`;
// shrink the header illustrations
document.querySelectorAll('#cmpHead svg').forEach(s=>s.setAttribute('class','art'));
document.getElementById('cmpBody').innerHTML = FEAT.map(r=>
  `<tr><td class="feat">${r[0]}</td>${cell(r[1])}${cell(r[2])}${cell(r[3])}</tr>`).join('');

// ---- which tier is for you ----
const GUIDE=[
  {h:'Just me, local',p:'You work on your own, want zero setup, and want everything to stay on your computer. No account, no internet required, the most private option.'},
  {h:'Free account',p:'You mostly work solo but want to share notes, methods or files with collaborators at other labs, or be findable by other researchers. The account is free and your data still lives on your disk. You get 1 GB of cloud free; if you hit it, sharing just pauses (old sends auto-expire after 30 days, freeing space) and you are never charged. Want more headroom? Raise your cap and pay only for what you use, never more than the ceiling you set.'},
  {h:'Lab',p:'You run or belong to a lab and want the whole team together: a shared workspace, real-time co-editing, and PI oversight. It is still local-first, every member\'s data lives on their own disk; the cloud is only the intermediary that keeps the team in sync, and that is what the PI funds. Creating a lab is free, with a 1 GB pooled allowance per member. If the lab needs more, the PI raises one cap and pays only for actual use ($0.30/GB-mo), capped at a ceiling they set. A small or light lab stays at $0.'},
];
document.getElementById('guide').innerHTML = GUIDE.map(g=>
  `<div class="gcard"><div class="pick">Pick this if</div><h4>${g.h}</h4><p>${g.p}</p></div>`).join('');
document.getElementById('tip').innerHTML =
  '<b>Every tier is local-first</b> &mdash; your files always live on your own disk; the cloud is only an intermediary for sharing and team sync. We charge only to cover what that intermediary actually costs us (cost-recovery, never more), and the free allowance is on us. <b>Not sure?</b> Start with Just me, local, you can upgrade any time without moving or losing anything.';

document.getElementById('themeBtn').onclick=function(){const r=document.documentElement;const dark=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',dark?'light':'dark');this.textContent=dark?'Dark':'Light';};
</script>
</body>
</html>
