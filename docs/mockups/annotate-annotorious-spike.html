<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Annotate spike: Annotorious (full-viewport + floating tools)</title>

<!-- Annotorious v3 from CDN (no repo install; spike only). -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@annotorious/annotorious@latest/dist/annotorious.css" />

<style>
  :root[data-theme="light"] {
    --surface-raised:#fff; --surface-sunken:#f8fafc; --foreground:#171717;
    --foreground-muted:#6b7280; --border:#e5e7eb; --page:#e7ecf2; --stage:#dfe5ec;
  }
  :root[data-theme="dark"] {
    --surface-raised:#131c2e; --surface-sunken:#0d1424; --foreground:#f1f5f9;
    --foreground-muted:#b4bfd0; --border:rgba(255,255,255,.22); --page:#0a0e1a; --stage:#070b14;
  }
  :root { --brand-action:#1283c9; --brand-purple:#5b47d6; --shadow:0 16px 40px -12px rgba(2,8,23,.5); }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--page); color:var(--foreground); overflow:hidden;
  }

  /* Full-viewport stage: the image fills the screen, tools float OVER it. */
  .stage {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--stage); padding:0;
  }
  .stage img { max-width:100vw; max-height:100vh; display:block; }

  /* Floating chrome */
  .float { position:fixed; z-index:10; background:var(--surface-raised); color:var(--foreground);
    border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); }

  /* Top-left tool palette */
  .tools { top:16px; left:16px; display:flex; flex-direction:column; gap:6px; padding:8px; }
  .tools .row { display:flex; gap:6px; }
  .tool { width:38px; height:38px; border:0; cursor:pointer; border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:var(--foreground-muted); background:transparent; }
  .tool:hover { background:var(--surface-sunken); color:var(--foreground); }
  .tool.active { background:var(--brand-action); color:#fff; }
  .sep { height:1px; background:var(--border); margin:2px 4px; }
  .swatches { display:flex; gap:6px; padding:2px; }
  .sw { width:22px; height:22px; border-radius:999px; border:1px solid var(--border); cursor:pointer; padding:0; }
  .sw.sel { outline:2px solid var(--brand-action); outline-offset:2px; transform:scale(1.1); border-color:transparent; }

  /* Top-right actions */
  .actions { top:16px; right:16px; display:flex; align-items:center; gap:8px; padding:8px 8px 8px 14px; }
  .actions .ttl { font-size:13px; font-weight:600; margin-right:6px; }
  .actions .sub { font-size:12px; color:var(--foreground-muted); }
  .btn-ghost { border:0; cursor:pointer; padding:7px 12px; border-radius:9px; font-size:13px; font-weight:500; color:var(--foreground-muted); background:transparent; }
  .btn-ghost:hover { background:var(--surface-sunken); color:var(--foreground); }
  .btn-brand { border:0; cursor:pointer; padding:7px 14px; border-radius:9px; font-size:13px; font-weight:600; color:#fff;
    background:linear-gradient(135deg,var(--brand-action),var(--brand-purple)); }

  /* Bottom-left data panel (shows the decoupled JSON state live) */
  .data { left:16px; bottom:16px; width:380px; max-height:38vh; overflow:auto; padding:10px 12px; }
  .data h4 { margin:0 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--foreground-muted); }
  .data pre { margin:0; font-size:11px; line-height:1.4; white-space:pre-wrap; word-break:break-word; color:var(--foreground); }

  /* Theme toggle bottom-right */
  .theme { right:16px; bottom:16px; display:flex; gap:6px; align-items:center; padding:6px 8px; font-size:12px; }
  .theme button { border:0; cursor:pointer; border-radius:999px; padding:5px 11px; font-size:12px; font-weight:600; background:transparent; color:var(--foreground-muted); }
  .theme button.on { background:var(--brand-action); color:#fff; }
  svg { display:block; }
</style>
</head>
<body>
  <!-- Full-viewport image stage -->
  <div class="stage">
    <img id="anno-img" alt="sample plate" />
  </div>

  <!-- Floating tool palette -->
  <div class="float tools">
    <div class="row">
      <button class="tool active" data-tool="cursor" title="Select / move"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l6 18 2.5-7.5L21 11z"/></svg></button>
      <button class="tool" data-tool="rectangle" title="Rectangle ROI"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg></button>
      <button class="tool" data-tool="polygon" title="Polygon ROI"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 6-3 9H7L4 9z"/></svg></button>
    </div>
    <div class="sep"></div>
    <div class="swatches">
      <button class="sw sel" style="background:#e11d48" data-c="#e11d48"></button>
      <button class="sw" style="background:#f59e0b" data-c="#f59e0b"></button>
      <button class="sw" style="background:#10b981" data-c="#10b981"></button>
      <button class="sw" style="background:#3b82f6" data-c="#3b82f6"></button>
      <button class="sw" style="background:#8b5cf6" data-c="#8b5cf6"></button>
    </div>
  </div>

  <!-- Floating actions -->
  <div class="float actions">
    <div>
      <div class="ttl">Annotate image</div>
      <div class="sub">patch-plate.png</div>
    </div>
    <button class="btn-ghost" onclick="alert('(mock) discard')">Cancel</button>
    <button class="btn-brand" onclick="dumpSave()">Save</button>
  </div>

  <!-- Live data panel: proves state is decoupled JSON, not DOM-read -->
  <div class="float data">
    <h4>Annotation state (Annotorious JSON)</h4>
    <pre id="json">Draw a box or polygon on the image...</pre>
  </div>

  <!-- Theme toggle -->
  <div class="float theme">
    <span style="padding-left:4px">Theme</span>
    <button id="t-light" onclick="setTheme('light')">Light</button>
    <button id="t-dark" class="on" onclick="setTheme('dark')">Dark</button>
  </div>

  <!-- A self-contained data-URI plate image so the spike needs no external image host -->
  <script>
    const plateSVG = `
      <svg xmlns='http://www.w3.org/2000/svg' width='1100' height='800'>
        <rect width='1100' height='800' fill='#f1eee6'/>
        <text x='40' y='56' font-family='sans-serif' font-size='26' font-weight='700' fill='#1f2937'>Patch plate (8 candidate transformants)</text>
        <defs><radialGradient id='p' cx='42%' cy='38%' r='70%'>
          <stop offset='0%' stop-color='#fff7d6'/><stop offset='55%' stop-color='#fcd34d'/><stop offset='100%' stop-color='#eab308'/>
        </radialGradient></defs>
        <circle cx='550' cy='430' r='320' fill='url(#p)' stroke='#111827' stroke-width='4'/>
        <g fill='#a16207' opacity='0.65'>
          <circle cx='430' cy='330' r='9'/><circle cx='620' cy='300' r='8'/><circle cx='700' cy='470' r='10'/>
          <circle cx='470' cy='560' r='7'/><circle cx='560' cy='620' r='9'/><circle cx='380' cy='470' r='8'/>
        </g>
      </svg>`;
    document.getElementById('anno-img').src =
      'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(plateSVG);

    function setTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('t-light').classList.toggle('on', t==='light');
      document.getElementById('t-dark').classList.toggle('on', t==='dark');
    }
    let anno = null, currentColor = '#e11d48';
    function dumpSave(){
      if(!anno){ alert('Annotorious not loaded'); return; }
      const all = anno.getAnnotations();
      document.getElementById('json').textContent = JSON.stringify(all, null, 2);
      alert('(mock) would writeAnnotations() ' + all.length + ' ROI(s) to {file}.annot.json');
    }
  </script>

  <!-- Annotorious v3 UMD bundle -->
  <script src="https://cdn.jsdelivr.net/npm/@annotorious/annotorious@latest/dist/annotorious.js"></script>
  <script>
    window.addEventListener('load', () => {
      try {
        anno = Annotorious.createImageAnnotator('anno-img', {
          style: () => ({ fill: currentColor, fillOpacity: 0.18, stroke: currentColor, strokeWidth: 3 }),
        });

        const render = () => {
          const all = anno.getAnnotations();
          document.getElementById('json').textContent =
            all.length ? JSON.stringify(all, null, 2) : 'Draw a box or polygon on the image...';
        };
        anno.on('createAnnotation', render);
        anno.on('updateAnnotation', render);
        anno.on('deleteAnnotation', render);

        // Floating tools drive the library's drawing engine.
        document.querySelectorAll('.tool').forEach((btn) => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tool').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            const tool = btn.dataset.tool;
            if (tool === 'cursor') { anno.setDrawingEnabled(false); }
            else { anno.setDrawingEnabled(true); anno.setDrawingTool(tool); }
          });
        });
        document.querySelectorAll('.sw').forEach((sw) => {
          sw.addEventListener('click', () => {
            document.querySelectorAll('.sw').forEach((s) => s.classList.remove('sel'));
            sw.classList.add('sel');
            currentColor = sw.dataset.c;
          });
        });
      } catch (e) {
        document.getElementById('json').textContent =
          'Annotorious failed to load from CDN (offline?). Error: ' + e.message;
      }
    });
  </script>
</body>
</html>
