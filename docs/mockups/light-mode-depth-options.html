<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Mode Depth Options</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #e5e7eb;
    padding: 32px 24px 60px;
    min-height: 100vh;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 32px;
  }

  /* ── Option grid ─────────────────────────────────────────── */
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .option-card {
    border: 2.5px solid transparent;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .option-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .option-card.selected {
    border-color: #1283c9;
    box-shadow: 0 0 0 4px rgba(18,131,201,0.15);
  }

  .option-label {
    padding: 12px 16px 10px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .option-label .name {
    font-size: 13px;
    font-weight: 700;
    color: #111827;
  }
  .option-label .desc {
    font-size: 11px;
    color: #6b7280;
    margin-top: 1px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    background: #dbeafe;
    color: #1d4ed8;
    white-space: nowrap;
  }
  .badge.current { background: #f3f4f6; color: #6b7280; }

  .checkmark {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #d1d5db;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: transparent;
    transition: all 0.12s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .option-card.selected .checkmark {
    background: #1283c9;
    border-color: #1283c9;
    color: white;
  }

  /* ── Color swatch row ───────────────────────────────────── */
  .swatches {
    display: flex;
    padding: 10px 14px;
    gap: 6px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
  }
  .swatch {
    flex: 1;
    height: 20px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.1);
    position: relative;
  }
  .swatch-label {
    font-size: 9px;
    color: #9ca3af;
    text-align: center;
    margin-top: 2px;
  }

  /* ── Mini UI preview ────────────────────────────────────── */
  .preview {
    padding: 14px;
  }

  /* the "page" backdrop */
  .mock-page {
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* a card sitting on the page */
  .mock-card {
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    padding: 10px 12px;
  }
  .mock-card-title {
    font-size: 11px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 6px;
  }

  /* input / sunken well inside a card */
  .mock-input {
    border-radius: 5px;
    border: 1px solid #e5e7eb;
    padding: 5px 8px;
    font-size: 10px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  /* two-column row */
  .mock-row { display: flex; gap: 8px; }
  .mock-row .mock-card { flex: 1; }

  /* a "modal" panel */
  .mock-modal {
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    padding: 10px 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }
  .mock-modal-title {
    font-size: 11px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 4px;
  }
  .mock-meta { font-size: 10px; color: #9ca3af; margin-bottom: 8px; }
  .mock-btn {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    background: linear-gradient(135deg, #1283c9, #5B47D6);
    color: white;
    border: none;
  }

  /* legend */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    padding: 8px 14px 10px;
    border-top: 1px solid #e5e7eb;
    background: #f9fafb;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #6b7280;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.12);
  }

  /* ── Diff table ─────────────────────────────────────────── */
  .diff-section {
    background: white;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .diff-section h2 {
    font-size: 13px;
    font-weight: 700;
    color: #111827;
    padding: 12px 16px;
    border-bottom: 1px solid #e5e7eb;
    background: #f9fafb;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th {
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #f3f4f6;
    color: #374151;
    font-family: monospace;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  .color-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .color-pill {
    width: 36px; height: 18px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  td.token-name { color: #1283c9; font-size: 11px; }
  .same-tag {
    font-family: sans-serif;
    font-size: 10px;
    color: #ef4444;
    font-weight: 600;
    background: #fee2e2;
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* ── CTA ────────────────────────────────────────────────── */
  .cta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 16px 20px;
  }
  .cta-bar .msg {
    font-size: 13px;
    color: #374151;
  }
  .cta-bar .msg strong { color: #111827; }
  #approve-btn {
    padding: 9px 22px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #1283c9, #5B47D6);
    color: white;
    transition: opacity 0.15s;
  }
  #approve-btn:hover { opacity: 0.88; }
  #approve-btn:disabled { opacity: 0.4; cursor: default; }
  .result-msg {
    font-size: 13px;
    color: #059669;
    font-weight: 600;
    margin-top: 8px;
    display: none;
    padding: 10px 16px;
    background: #ecfdf5;
    border-radius: 8px;
    border: 1px solid #a7f3d0;
  }
</style>
</head>
<body>

<h1>Light mode depth options</h1>
<p class="subtitle">Today all surface levels are the same white. Pick the depth ramp you like best, then I'll implement it.</p>

<div class="options" id="options"></div>

<div class="diff-section">
  <h2>What changes (vs current)</h2>
  <table>
    <thead>
      <tr>
        <th>Token</th>
        <th>Current (flat)</th>
        <th id="col-a">Option A</th>
        <th id="col-b">Option B</th>
        <th id="col-c">Option C</th>
        <th id="col-d">Option D</th>
      </tr>
    </thead>
    <tbody id="diff-table"></tbody>
  </table>
</div>

<div class="cta-bar">
  <div>
    <div class="msg"><strong id="selection-label">No option selected.</strong></div>
    <div class="msg" id="selection-sub" style="color:#6b7280;font-size:12px;margin-top:2px;"></div>
  </div>
  <button id="approve-btn" disabled>Approve this option</button>
</div>
<div class="result-msg" id="result-msg"></div>

<script>
const CURRENT = {
  surface:         "#ffffff",
  "surface-raised":  "#ffffff",
  "surface-overlay": "#ffffff",
  "surface-sunken":  "#f8fafc",
};

const OPTIONS = [
  {
    id: "a",
    name: "Option A — Industry standard",
    badge: "Most common",
    desc: "Whisper of gray on the canvas; cards stay pure white. Barely perceptible — same pattern as Linear, Notion, Vercel.",
    surface:         "#f9fafb",  // gray-50
    "surface-raised":  "#ffffff",
    "surface-overlay": "#ffffff",
    "surface-sunken":  "#f3f4f6",  // gray-100
  },
  {
    id: "b",
    name: "Option B — Warm off-white",
    badge: "Cozy feel",
    desc: "Warm cream tint on the canvas instead of cold gray. Cards stay pure white. Feels a bit more paper-like.",
    surface:         "#fafaf8",  // warm off-white
    "surface-raised":  "#ffffff",
    "surface-overlay": "#ffffff",
    "surface-sunken":  "#f4f4f0",
    },
  {
    id: "c",
    name: "Option C — Cool slate",
    badge: "Subtle blue",
    desc: "Slate-50 canvas — the faintest blue-gray. Matches the dark mode's cool tone. Cards and modals are pure white.",
    surface:         "#f8fafc",  // slate-50
    "surface-raised":  "#ffffff",
    "surface-overlay": "#ffffff",
    "surface-sunken":  "#f1f5f9",  // slate-100
  },
  {
    id: "d",
    name: "Option D — More depth",
    badge: "Pronounced",
    desc: "Background steps down to gray-100 so cards really pop. More contrast, more obvious depth layering. Slightly more 'app-like'.",
    surface:         "#f3f4f6",  // gray-100
    "surface-raised":  "#ffffff",
    "surface-overlay": "#ffffff",
    "surface-sunken":  "#e9eaec",
  },
];

const TOKEN_LABELS = {
  "surface":         "Page / canvas background",
  "surface-raised":  "Cards, panels",
  "surface-overlay": "Modals, popups",
  "surface-sunken":  "Input wells, insets",
};

let selected = null;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r},${g},${b})`;
}

function buildSwatch(color) {
  return `<div class="swatch" style="background:${color}"></div>`;
}

function buildMockUI(opt) {
  const pg  = opt.surface;
  const card= opt["surface-raised"];
  const ovl = opt["surface-overlay"];
  const sun = opt["surface-sunken"];
  const bdr = "#e5e7eb";

  return `
  <div class="preview">
    <div class="mock-page" style="background:${pg}">
      <div class="mock-row">
        <div class="mock-card" style="background:${card};border-color:${bdr}">
          <div class="mock-card-title">Projects</div>
          <div class="mock-input" style="background:${sun};border-color:${bdr}">Search...</div>
          <div style="font-size:10px;color:#6b7280;">3 active projects</div>
        </div>
        <div class="mock-card" style="background:${card};border-color:${bdr}">
          <div class="mock-card-title">Today</div>
          <div style="font-size:10px;color:#6b7280;line-height:1.6;">
            ↗ PCR setup<br>↗ Data analysis<br>↗ Lab meeting
          </div>
        </div>
      </div>
      <div class="mock-modal" style="background:${ovl};border-color:${bdr}">
        <div class="mock-modal-title">Task detail</div>
        <div class="mock-meta">Assigned to Morgan · Due tomorrow</div>
        <div class="mock-input" style="background:${sun};border-color:${bdr}">Add a note...</div>
        <button class="mock-btn">Save</button>
      </div>
    </div>
  </div>`;
}

function buildLegend(opt) {
  const items = [
    { label: "Canvas", color: opt.surface },
    { label: "Card", color: opt["surface-raised"] },
    { label: "Modal", color: opt["surface-overlay"] },
    { label: "Inset", color: opt["surface-sunken"] },
  ];
  return `<div class="legend">${items.map(i =>
    `<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}: ${i.color}</div>`
  ).join("")}</div>`;
}

// Build option cards
const grid = document.getElementById("options");
OPTIONS.forEach(opt => {
  const card = document.createElement("div");
  card.className = "option-card";
  card.dataset.id = opt.id;

  const swatchColors = [opt.surface, opt["surface-raised"], opt["surface-overlay"], opt["surface-sunken"]];

  card.innerHTML = `
    <div class="option-label">
      <div>
        <div class="name">${opt.name}</div>
        <div class="desc" style="margin-top:2px;font-size:11px;color:#6b7280;max-width:200px;">${opt.desc}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="badge">${opt.badge}</span>
        <div class="checkmark">✓</div>
      </div>
    </div>
    <div class="swatches">${swatchColors.map(c => buildSwatch(c)).join("")}</div>
    ${buildMockUI(opt)}
    ${buildLegend(opt)}
  `;

  card.addEventListener("click", () => {
    document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
    card.classList.add("selected");
    selected = opt;
    document.getElementById("selection-label").textContent = `${opt.name} selected.`;
    document.getElementById("selection-sub").textContent = opt.desc;
    document.getElementById("approve-btn").disabled = false;
    document.getElementById("result-msg").style.display = "none";
    highlightDiffTable();
  });

  grid.appendChild(card);
});

// Build diff table
function buildDiffTable() {
  const tbody = document.getElementById("diff-table");
  const tokens = Object.keys(TOKEN_LABELS);
  tokens.forEach(tok => {
    const tr = document.createElement("tr");
    let cells = `<td class="token-name">--${tok}<br><span style="color:#9ca3af;font-size:10px;font-family:sans-serif">${TOKEN_LABELS[tok]}</span></td>`;

    // current
    cells += `<td><div class="color-cell"><div class="color-pill" style="background:${CURRENT[tok]}"></div>${CURRENT[tok]} <span class="same-tag">all same</span></div></td>`;

    OPTIONS.forEach(opt => {
      const changed = opt[tok] !== CURRENT[tok];
      cells += `<td id="diff-${opt.id}-${tok}">
        <div class="color-cell">
          <div class="color-pill" style="background:${opt[tok]}"></div>
          ${opt[tok]}
          ${changed ? '' : '<span style="font-size:10px;color:#9ca3af;font-family:sans-serif">unchanged</span>'}
        </div>
      </td>`;
    });

    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
}
buildDiffTable();

// Column header badges
OPTIONS.forEach(opt => {
  document.getElementById(`col-${opt.id}`).textContent = `Option ${opt.id.toUpperCase()}`;
});

function highlightDiffTable() {
  OPTIONS.forEach(opt => {
    const isSelected = selected && opt.id === selected.id;
    const tokens = Object.keys(TOKEN_LABELS);
    tokens.forEach(tok => {
      const cell = document.getElementById(`diff-${opt.id}-${tok}`);
      if (cell) {
        cell.style.background = isSelected ? "#eff6ff" : "";
        cell.style.fontWeight = isSelected ? "600" : "";
      }
    });
    const hdr = document.getElementById(`col-${opt.id}`);
    if (hdr) {
      hdr.style.color = isSelected ? "#1283c9" : "";
      hdr.style.fontWeight = isSelected ? "700" : "";
    }
  });
}

document.getElementById("approve-btn").addEventListener("click", () => {
  if (!selected) return;
  const out = {
    option: selected.name,
    tokens: {
      "--surface": selected.surface,
      "--surface-raised": selected["surface-raised"],
      "--surface-overlay": selected["surface-overlay"],
      "--surface-sunken": selected["surface-sunken"],
    }
  };
  const text = `Approved: ${selected.name}\n\n${Object.entries(out.tokens).map(([k,v]) => `${k}: ${v}`).join("\n")}`;

  try {
    navigator.clipboard.writeText(text);
  } catch {}

  const msg = document.getElementById("result-msg");
  msg.textContent = `Approved: ${selected.name}. Token values copied to clipboard — paste back into chat to confirm.`;
  msg.style.display = "block";
  document.getElementById("approve-btn").disabled = true;
});
</script>
</body>
</html>
