  main{max-width:1080px;margin:0 auto;padding:20px 24px 120px}

  .chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em}
  .chip.high{background:#3a0d12;color:#ff9aa6;border:1px solid #5e1a22}
  .chip.medium{background:#3a2a0a;color:#ffcf7a;border:1px solid #5e451a}
  .chip.low{background:#0e2a3a;color:#86d2ff;border:1px solid #1a4a5e}
  .chip.mode{background:#1a2336;color:#bcd;border:1px solid var(--line)}
  .chip.fixed{background:#0c2a1a;color:#7ee0ab;border:1px solid #1a5e3a}
  .chip.pending{background:#2a210c;color:#ffd98a;border:1px solid #5e4a1a}
  .chip.noaction{background:#1a2336;color:#9fb0c7;border:1px solid var(--line)}
  .file{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#cfe0f5}
  .file .ln{color:var(--muted)}
  .el{font-weight:600;margin:2px 0 8px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:10px 0 3px}
  .cls{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:#e3b3a0;white-space:pre-wrap;word-break:break-word}
  .why{color:#e6c6c6}
  .fix{color:#c2e6cf}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .swatch{border-radius:10px;padding:14px;border:1px solid var(--line);position:relative;min-height:64px;display:flex;
    flex-direction:column;justify-content:center}
  .swatch .tag{position:absolute;top:6px;right:8px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;opacity:.8}
  .swatch .sample{font-size:14px;font-weight:600}
  .swatch .ratio{font-size:11px;margin-top:4px;opacity:.95}
  .ratio .ok{color:#5fcf8e}.ratio .bad{color:#ff8a98}
  .struct{margin-top:10px;font-size:13px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);
    border-radius:8px;padding:10px 12px}
  .decide{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .decide .seg button.agree.on{background:#1a8f53;color:#04130a}
  .decide .seg button.keep.on{background:#8a6d1a;color:#1a1304}
  .decide .seg button.discuss.on{background:#1a6b8f;color:#041218}
  .decide input{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);

// ---- contrast ratio ----
function lum(hex){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;
  const f=x=>x<=.03928?x/12.92:Math.pow((x+.055)/1.055,2.4);return .2126*f(r)+.7152*f(g)+.0722*f(b);}
function ratio(a,b){const L1=lum(a),L2=lum(b);return ((Math.max(L1,L2)+.05)/(Math.min(L1,L2)+.05));}
function rtag(fg,bg){const r=ratio(fg,bg);const ok=r>=4.5;return `<span class="${ok?'ok':'bad'}">${r.toFixed(2)}:1 ${ok?'AA pass':'AA fail'}</span>`;}

function previewHTML(p){
  if(!p) return '';
  if(p.t==='struct') return `<div class="struct">${p.note}</div>`;
  if(p.t==='text'){
    return `<div class="grid2">
      <div class="swatch" style="background:${p.bg};color:${p.before}"><span class="tag" style="color:${p.before}">before</span>
        <span class="sample">${p.sample}</span><span class="ratio">${rtag(p.before,p.bg)}</span></div>
      <div class="swatch" style="background:${p.bg};color:${p.after}"><span class="tag" style="color:${p.after}">after</span>
        <span class="sample">${p.sample}</span><span class="ratio">${rtag(p.after,p.bg)}</span></div>
    </div>`;
  }
  if(p.t==='card'){
    const pageBg = p.mode==='dark'?T.d.surface:T.l.surface;
    const fgB = p.mode==='dark'?'#111827':'#171717';
    const fgA = p.mode==='dark'?T.d.fg:T.l.fg;
    return `<div class="grid2">
      <div class="swatch" style="background:${pageBg};padding:18px"><span class="tag">before</span>
        <div style="background:${p.beforeBg};color:${fgB};border:1px solid #e5e7eb;border-radius:10px;padding:12px;font-weight:600">${p.sample}</div></div>
      <div class="swatch" style="background:${pageBg};padding:18px"><span class="tag">after</span>
        <div style="background:${p.afterBg};color:${fgA};border:1px solid ${T.d.border};border-radius:10px;padding:12px;font-weight:600">${p.sample}</div></div>
    </div>`;
  }
  return '';
}

const DEC=JSON.parse(localStorage.getItem('surfaceAuditDecisions')||'{}');
function saveDec(){localStorage.setItem('surfaceAuditDecisions',JSON.stringify(DEC));renderStat();}

function render(){
  const list=document.getElementById('list');
  list.innerHTML=F.map(f=>{
    const d=DEC[f.id]||{};
    return `<div class="card" data-id="${f.id}" data-sev="${f.sev}" data-mode="${f.mode}" data-status="${f.status}"
      data-text="${(f.file+' '+f.el+' '+f.cls+' '+f.why).toLowerCase().replace(/"/g,'')}">
      <div class="row1">
        <span class="chip ${f.sev}">${f.sev}</span>
        <span class="chip mode">${f.mode}</span>
        <span class="chip ${f.status}">${f.status}</span>
        <span class="file">${f.file} <span class="ln">:${f.lines}</span></span>
        <span style="margin-left:auto;color:var(--muted);font-size:11px">${f.id}</span>
      </div>
      <div class="el">${f.el}</div>
      <div class="lbl">Failing class</div><div class="cls">${f.cls.replace(/</g,'&lt;')}</div>
      <div class="lbl">Why</div><div class="why">${f.why}</div>
      <div class="lbl">Suggested fix</div><div class="fix">${f.fix}</div>
      ${previewHTML(f.prev)}
      <div class="decide">
        <span class="seg dseg" data-id="${f.id}">
          <button class="agree ${d.v==='agree'?'on':''}" data-v="agree">Agree</button>
          <button class="keep ${d.v==='keep'?'on':''}" data-v="keep">Keep as-is</button>
          <button class="discuss ${d.v==='discuss'?'on':''}" data-v="discuss">Discuss</button>
        </span>
        <input type="text" placeholder="note (optional)" value="${(d.note||'').replace(/"/g,'&quot;')}" data-note="${f.id}" />
      </div>
    </div>`;
  }).join('');
  bind();applyFilters();renderStat();
}
function bind(){
  document.querySelectorAll('.dseg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      const id=seg.dataset.id;DEC[id]=DEC[id]||{};DEC[id].v=b.dataset.v;
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');saveDec();
    });
  });
  document.querySelectorAll('[data-note]').forEach(inp=>inp.oninput=()=>{
    const id=inp.dataset.note;DEC[id]=DEC[id]||{};DEC[id].note=inp.value;saveDec();
  });
}
const filt={sev:'all',mode:'all',status:'pending',q:''};
function applyFilters(){
  document.querySelectorAll('.card').forEach(c=>{
    const okSev=filt.sev==='all'||c.dataset.sev===filt.sev;
    const okMode=filt.mode==='all'||c.dataset.mode===filt.mode;
    const okStatus=filt.status==='all'||c.dataset.status===filt.status;
    const okQ=!filt.q||c.dataset.text.includes(filt.q);
    c.classList.toggle('hide',!(okSev&&okMode&&okStatus&&okQ));
  });
}
function seg(id,key){document.querySelectorAll('#'+id+' button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('on'));b.classList.add('on');filt[key]=b.dataset.v;applyFilters();});}
seg('fSev','sev');seg('fMode','mode');seg('fStatus','status');
document.getElementById('q').oninput=e=>{filt.q=e.target.value.toLowerCase();applyFilters();};

function renderCounts(){
  const by=(s)=>F.filter(f=>f.sev===s).length;
  const pend=F.filter(f=>f.status==='pending').length, fixed=F.filter(f=>f.status==='fixed').length;
  document.getElementById('counts').innerHTML=
    `<span class="pill"><b>${F.length}</b> findings</span>
     <span class="pill high">high <b>${by('high')}</b></span>
     <span class="pill medium">medium <b>${by('medium')}</b></span>
     <span class="pill low">low <b>${by('low')}</b></span>
     <span class="pill fixed">fixed <b>${fixed}</b></span>
     <span class="pill pending">pending <b>${pend}</b></span>`;
}
function renderStat(){
  const n=Object.values(DEC).filter(d=>d.v).length;
  document.getElementById('estat').textContent=n?`${n} of ${F.length} decided`:'No decisions yet';
}
document.getElementById('exportBtn').onclick=()=>{
  const lines=['Surface audit decisions (2026-06-07)',''];
  ['agree','keep','discuss'].forEach(v=>{
    const items=F.filter(f=>(DEC[f.id]||{}).v===v);
    if(!items.length) return;
    lines.push(`== ${v.toUpperCase()} (${items.length}) ==`);
    items.forEach(f=>{const note=(DEC[f.id]||{}).note;lines.push(`- ${f.id} ${f.file}:${f.lines} ${f.el}${note?'  // '+note:''}`);});
    lines.push('');
  });
  const undecided=F.filter(f=>!(DEC[f.id]||{}).v);
  if(undecided.length){lines.push(`== UNDECIDED (${undecided.length}) ==`);undecided.forEach(f=>lines.push(`- ${f.id} ${f.file}:${f.lines}`));}
  document.getElementById('exportText').value=lines.join('\n');
  document.getElementById('dlg').showModal();
};
document.getElementById('copyBtn').onclick=()=>{const t=document.getElementById('exportText');t.select();document.execCommand('copy');};
document.getElementById('resetBtn').onclick=()=>{if(confirm('Clear all your decisions?')){for(const k in DEC)delete DEC[k];saveDec();render();}};

renderCounts();render();
</script>
</body>
</html>
